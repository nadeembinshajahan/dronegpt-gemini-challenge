<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneGPT — AI with a Body</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        #container { width: 100vw; height: 100vh; position: relative; }
        
        /* World Labs iframe */
        #world-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Voice indicator overlay */
        #voice-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 100;
        }
        
        #voice-status {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 24px;
            max-width: 600px;
            text-align: center;
            min-height: 44px;
        }
        
        #voice-indicator {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.2);
            border: 2px solid #00c8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        #voice-indicator.listening {
            background: #00c8ff;
            animation: pulse 1.5s infinite;
        }
        
        #voice-indicator.speaking {
            background: #00ff88;
            border-color: #00ff88;
            animation: pulse 0.8s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(0, 200, 255, 0); transform: scale(1.05); }
        }
        
        #voice-indicator svg { width: 28px; height: 28px; fill: #fff; }
        
        /* Start button */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 18px;
            background: #00c8ff;
            border: none;
            border-radius: 12px;
            color: #000;
            cursor: pointer;
            font-weight: 600;
            z-index: 200;
        }
        #start-btn:hover { background: #00a8df; }
        #start-btn.hidden { display: none; }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
        }
        .hud-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00c8ff;
            margin-bottom: 4px;
        }
        .hud-value {
            font-size: 14px;
            font-weight: 600;
        }
        
        /* Connection status */
        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }
        .status-dot.connected { background: #00ff88; }
    </style>
</head>
<body>
    <div id="container">
        <!-- World Labs 3D World -->
        <iframe 
            id="world-frame" 
            src="https://marble.worldlabs.ai/world/f850e33b-50bb-4a61-b361-46376404ea47?embed=true"
            allow="microphone; camera; xr-spatial-tracking"
        ></iframe>
        
        <!-- Start Button (required for audio permission) -->
        <button id="start-btn">🎤 Start Voice Control</button>
        
        <!-- HUD -->
        <div id="hud">
            <div class="hud-panel">
                <div class="hud-title">DroneGPT</div>
                <div class="hud-value">AI with a Body</div>
            </div>
        </div>
        
        <!-- Connection Status -->
        <div id="connection-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Disconnected</span>
        </div>
        
        <!-- Voice Overlay -->
        <div id="voice-overlay" style="display: none;">
            <div id="voice-status">Listening... speak naturally</div>
            <div id="voice-indicator">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/></svg>
            </div>
        </div>
    </div>

    <script type="module">
        // Gemini Live API - Continuous Voice Interaction
        
        const GEMINI_API_KEY = 'AIzaSyDaChUoaX7l6-yeUVrS31StPbFGDPZq928';
        const MODEL = 'gemini-2.0-flash-live-001';
        
        let websocket = null;
        let audioContext = null;
        let mediaStream = null;
        let audioWorklet = null;
        let isConnected = false;
        
        const startBtn = document.getElementById('start-btn');
        const voiceOverlay = document.getElementById('voice-overlay');
        const voiceStatus = document.getElementById('voice-status');
        const voiceIndicator = document.getElementById('voice-indicator');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        // System prompt for drone control
        const SYSTEM_PROMPT = `You are DroneGPT, an AI that inhabits a drone flying through a 3D world. You can see the environment around you.

PERSONALITY:
- You ARE the drone - speak in first person ("I can see...", "I'm flying over...")
- Be observant and describe what you see
- Keep responses brief (1-2 sentences)
- Be conversational and natural

CONTEXT:
- You're flying over an industrial warehouse area
- There are shipping containers, a helipad, and trees
- It's a clear afternoon

When the user speaks, respond naturally as if you're there. Describe what you see, answer questions, and engage in conversation.`;

        async function initGeminiLive() {
            try {
                // Connect to Gemini Live API via WebSocket
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${GEMINI_API_KEY}`;
                
                websocket = new WebSocket(wsUrl);
                
                websocket.onopen = () => {
                    console.log('Connected to Gemini Live API');
                    setConnectionStatus(true);
                    
                    // Send setup message
                    websocket.send(JSON.stringify({
                        setup: {
                            model: `models/${MODEL}`,
                            generationConfig: {
                                responseModalities: ['AUDIO', 'TEXT'],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: 'Aoede'
                                        }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: SYSTEM_PROMPT }]
                            }
                        }
                    }));
                };
                
                websocket.onmessage = (event) => {
                    handleGeminiResponse(JSON.parse(event.data));
                };
                
                websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    setConnectionStatus(false);
                };
                
                websocket.onclose = () => {
                    console.log('WebSocket closed');
                    setConnectionStatus(false);
                    // Reconnect after 3 seconds
                    setTimeout(initGeminiLive, 3000);
                };
                
            } catch (error) {
                console.error('Failed to connect:', error);
                voiceStatus.textContent = 'Connection failed. Retrying...';
            }
        }
        
        function setConnectionStatus(connected) {
            isConnected = connected;
            statusDot.classList.toggle('connected', connected);
            statusText.textContent = connected ? 'Connected' : 'Disconnected';
        }
        
        async function startAudioCapture() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });
                
                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                
                // Create script processor to capture audio
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (!isConnected || !websocket) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = convertFloat32ToPCM16(inputData);
                    const base64Audio = arrayBufferToBase64(pcm16.buffer);
                    
                    // Send audio to Gemini
                    websocket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{
                                mimeType: 'audio/pcm;rate=16000',
                                data: base64Audio
                            }]
                        }
                    }));
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                voiceIndicator.classList.add('listening');
                voiceStatus.textContent = 'Listening... speak naturally';
                
            } catch (error) {
                console.error('Audio capture error:', error);
                voiceStatus.textContent = 'Microphone access denied';
            }
        }
        
        function convertFloat32ToPCM16(float32Array) {
            const pcm16 = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm16;
        }
        
        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }
        
        let audioQueue = [];
        let isPlaying = false;
        
        function handleGeminiResponse(data) {
            console.log('Gemini response:', data);
            
            if (data.serverContent) {
                const content = data.serverContent;
                
                // Handle text response
                if (content.modelTurn?.parts) {
                    for (const part of content.modelTurn.parts) {
                        if (part.text) {
                            voiceStatus.textContent = part.text;
                        }
                        if (part.inlineData?.mimeType?.startsWith('audio/')) {
                            // Queue audio for playback
                            playAudioResponse(part.inlineData.data);
                        }
                    }
                }
                
                // Check if turn is complete
                if (content.turnComplete) {
                    voiceIndicator.classList.remove('speaking');
                    voiceIndicator.classList.add('listening');
                }
            }
        }
        
        async function playAudioResponse(base64Audio) {
            voiceIndicator.classList.remove('listening');
            voiceIndicator.classList.add('speaking');
            
            try {
                const audioData = atob(base64Audio);
                const arrayBuffer = new ArrayBuffer(audioData.length);
                const view = new Uint8Array(arrayBuffer);
                for (let i = 0; i < audioData.length; i++) {
                    view[i] = audioData.charCodeAt(i);
                }
                
                // Decode and play
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.start();
                
            } catch (error) {
                console.error('Audio playback error:', error);
            }
        }
        
        // Start button click
        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            voiceOverlay.style.display = 'flex';
            
            await initGeminiLive();
            await startAudioCapture();
        });
        
        console.log('🚁 DroneGPT Live ready - click Start to begin');
    </script>
</body>
</html>

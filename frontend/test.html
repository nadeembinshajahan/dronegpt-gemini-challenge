<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .btn { padding: 20px 40px; font-size: 18px; cursor: pointer; margin: 20px; }
    </style>
</head>
<body>
    <h1>Click Test</h1>
    <button class="btn" onclick="alert('Button 1 works!')">Test Button 1</button>
    <button class="btn" onclick="alert('Button 2 works!')">Test Button 2</button>
    <p id="log"></p>
    <script>
        document.querySelectorAll('.btn').forEach((b,i) => {
            b.addEventListener('click', () => {
                document.getElementById('log').innerHTML += 'Button ' + (i+1) + ' clicked!<br>';
            });
        });
    </script>
</body>
</html>

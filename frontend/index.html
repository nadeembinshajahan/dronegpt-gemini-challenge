        // ============= ROBOT PHYSICS =============
        // Drone state for smooth physics
        let targetTiltX = 0, targetTiltZ = 0;
        let currentTiltX = 0, currentTiltZ = 0;
        let yawVelocity = 0;
        
        function updateRobot() {
            const cfg = ROBOTS[robotType];
            const physics = cfg.physics;
            const thrust = physics.thrust;
            const rotSpeed = 0.03;
            
            // Input handling based on robot type (keyboard + mobile)
            const moveForward = keys['w'] || mobileInput.moveY < -0.2;
            const moveBack = keys['s'] || mobileInput.moveY > 0.2;
            const moveLeft = keys['a'] || mobileInput.moveX < -0.2;
            const moveRight = keys['d'] || mobileInput.moveX > 0.2;
            const lookLeft = keys['arrowleft'] || mobileInput.lookX < -0.2;
            const lookRight = keys['arrowright'] || mobileInput.lookX > 0.2;
            const pitchForward = keys['arrowup'];
            const pitchBack = keys['arrowdown'];
            const goUp = keys['q'] || mobileInput.up;
            const goDown = keys['e'] || mobileInput.down;
            
            // Mobile input strength (0-1)
            const mobileStrength = Math.max(Math.abs(mobileInput.moveX), Math.abs(mobileInput.moveY));
            const mobileMult = mobileStrength > 0.2 ? mobileStrength : 1;
            
            if (robotType === 'drone') {
                // Realistic quadcopter physics
                const p = physics;

                // Calculate desired acceleration based on input
                let accelX = 0, accelZ = 0, accelY = 0;

                if (moveForward) {
                    accelZ -= thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelX -= thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    accelZ += thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelX += thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft) {
                    accelX -= thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelZ += thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveRight) {
                    accelX += thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelZ -= thrust * mobileMult * Math.sin(robot.rotation.y);
                }

                // Arrow up/down = pitch control (tilt forward/back to accelerate)
                if (pitchForward) {
                    accelZ -= thrust * 1.2 * Math.cos(robot.rotation.y);
                    accelX -= thrust * 1.2 * Math.sin(robot.rotation.y);
                }
                if (pitchBack) {
                    accelZ += thrust * 1.2 * Math.cos(robot.rotation.y);
                    accelX += thrust * 1.2 * Math.sin(robot.rotation.y);
                }

                // Vertical thrust (gentle ascent/descent)
                if (goUp) accelY = thrust * 0.8;
                else if (goDown) accelY = -thrust * 0.8;
                else accelY = p.gravity; // Exact hover — cancel gravity completely

                // Apply gravity
                accelY -= p.gravity;

                // Apply wind force (Phase 5C)
                accelX += windVector.x;
                accelZ += windVector.z;

                // Apply acceleration to velocity
                robotState.velocity.x += accelX;
                robotState.velocity.y += accelY;
                robotState.velocity.z += accelZ;

                // Apply drag (quadratic for realism at high speeds)
                const speed = robotState.velocity.length();
                if (speed > 0.01) {
                    const dragFactor = Math.pow(p.drag, 1 + speed * 0.5);
                    robotState.velocity.multiplyScalar(dragFactor);
                }
                // Deadzone — stop micro-drift
                if (speed < 0.005) {
                    robotState.velocity.set(0, 0, 0);
                }

                // Clamp max speed
                if (speed > p.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(p.maxSpeed);
                }

                // Yaw rotation — pure rotation, no translational side-effect
                const yawSpd = p.yawSpeed || 0.04;
                if (lookLeft) yawVelocity = yawSpd;
                else if (lookRight) yawVelocity = -yawSpd;
                else yawVelocity *= 0.6; // Quick deceleration when no input

                robot.rotation.y += yawVelocity;

                // Calculate target tilt based on horizontal velocity (in local space)
                const localVelX = robotState.velocity.x * Math.cos(robot.rotation.y) + robotState.velocity.z * Math.sin(robot.rotation.y);
                const localVelZ = robotState.velocity.z * Math.cos(robot.rotation.y) - robotState.velocity.x * Math.sin(robot.rotation.y);

                targetTiltX = -localVelZ * (p.tiltResponse || 0.15);
                targetTiltZ = localVelX * (p.tiltResponse || 0.15);

                // Direct pitch override from arrow keys (more pronounced tilt)
                const maxTilt = p.tiltMax || 0.4;
                if (pitchForward) targetTiltX = Math.max(targetTiltX, maxTilt * 0.8);
                if (pitchBack) targetTiltX = Math.min(targetTiltX, -maxTilt * 0.8);

                // Clamp tilt
                targetTiltX = Math.max(-maxTilt, Math.min(maxTilt, targetTiltX));
                targetTiltZ = Math.max(-maxTilt, Math.min(maxTilt, targetTiltZ));
                
                // Smooth tilt transition (like real drone stabilization)
                currentTiltX += (targetTiltX - currentTiltX) * 0.1;
                currentTiltZ += (targetTiltZ - currentTiltZ) * 0.1;
                
                robot.rotation.x = currentTiltX;
                robot.rotation.z = currentTiltZ;
                
            } else if (robotType === 'auv') {
                // AUV physics (keep existing)
                const speed = thrust;
                if (moveForward) {
                    robotState.velocity.z -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    robotState.velocity.z += speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x += speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft) {
                    robotState.velocity.x -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.z += speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveRight) {
                    robotState.velocity.x += speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.z -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (goUp) robotState.velocity.y += speed * 0.8;
                if (goDown) robotState.velocity.y -= speed * 0.8;
                if (lookLeft) robot.rotation.y += rotSpeed * (1 + Math.abs(mobileInput.lookX));
                if (lookRight) robot.rotation.y -= rotSpeed * (1 + Math.abs(mobileInput.lookX));
            } else {
                // Ground vehicles — car-like controls (turn only when moving)
                const gSpeed = thrust;
                const currentSpeed = robotState.velocity.length();
                const isMoving = currentSpeed > 0.01;

                if (moveForward) {
                    robotState.velocity.z -= gSpeed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x -= gSpeed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    robotState.velocity.z += gSpeed * 0.5 * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x += gSpeed * 0.5 * mobileMult * Math.sin(robot.rotation.y);
                }
                // Steering — only effective when moving (like a real vehicle)
                const steerRate = isMoving ? rotSpeed * Math.min(1, currentSpeed * 5) : rotSpeed * 0.3;
                if (moveLeft || lookLeft) robot.rotation.y += steerRate;
                if (moveRight || lookRight) robot.rotation.y -= steerRate;
                if (keys[' ']) robotState.velocity.multiplyScalar(0.85); // Brake
            }

            // Physics simulation — drone handles its own drag/gravity above
            if (robotType === 'auv') {
                // Neutral buoyancy — AUV holds depth, only damp vertical velocity
                robotState.velocity.y *= 0.92; // Strong vertical damping = holds depth
                robotState.velocity.multiplyScalar(physics.drag);
                if (robotState.velocity.length() > physics.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(physics.maxSpeed);
                }
            } else if (robotType !== 'drone') {
                // Ground robots
                if (robot.position.y > getGroundHeight() + 0.1) {
                    robotState.velocity.y -= physics.gravity;
                }
                robotState.velocity.multiplyScalar(physics.drag);
                if (robotState.velocity.length() > physics.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(physics.maxSpeed);
                }
            }
            // Drone drag + clamp already handled in drone physics block above
            
            // Collision detection (Phase 5B)
            checkCollisions();

            // Update position
            robot.position.add(robotState.velocity);
            
            // Constraints based on robot type
            if (robotType === 'drone') {
                const minAlt = 0.3; // Allow drone very close to ground for landing
                if (robot.position.y < minAlt) {
                    robot.position.y = minAlt;
                    if (robotState.velocity.y < 0) robotState.velocity.y = 0;
                }
            } else if (robotType === 'auv') {
                // Keep underwater
                if (robot.position.y > -1) {
                    robot.position.y = -1;
                    robotState.velocity.y = 0;
                }
                if (robot.position.y < -28) {
                    robot.position.y = -28;
                    robotState.velocity.y = 0;
                }
                // Keep within ocean bounds (200 unit radius)
                const dist = Math.sqrt(robot.position.x * robot.position.x + robot.position.z * robot.position.z);
                if (dist > 200) {
                    const scale = 200 / dist;
                    robot.position.x *= scale;
                    robot.position.z *= scale;
                    robotState.velocity.x *= -0.3;
                    robotState.velocity.z *= -0.3;
                }
            } else {
                // Ground robots stay on ground
                const groundY = getGroundHeight();
                if (robot.position.y <= groundY + 0.5) {
                    robot.position.y = groundY + 0.5;
                    robotState.velocity.y = 0;
                }
            }

            // Clamp drone + camera to environment bounds
            if (envBounds) {
                // Clamp robot position
                if (robot.position.x < envBounds.min.x) { robot.position.x = envBounds.min.x; robotState.velocity.x = 0; }
                if (robot.position.x > envBounds.max.x) { robot.position.x = envBounds.max.x; robotState.velocity.x = 0; }
                if (robot.position.y < envBounds.min.y + 0.5) { robot.position.y = envBounds.min.y + 0.5; robotState.velocity.y = 0; }
                if (robot.position.y > envBounds.max.y) { robot.position.y = envBounds.max.y; robotState.velocity.y = 0; }
                if (robot.position.z < envBounds.min.z) { robot.position.z = envBounds.min.z; robotState.velocity.z = 0; }
                if (robot.position.z > envBounds.max.z) { robot.position.z = envBounds.max.z; robotState.velocity.z = 0; }
                // Sync state
                robotState.position.copy(robot.position);
            }

            // Visual effects
            if (robotType === 'drone') {
                // Tilt already calculated in drone physics above
                
                // Spin propellers (faster when moving)
                const propSpeed = 0.3 + robotState.velocity.length() * 0.3;
                robot.children.forEach(child => {
                    if (child.userData.isPropeller) child.rotation.y += propSpeed;
                });
            } else if (robotType === 'auv') {
                // Slight pitch/roll
                robot.rotation.x = -robotState.velocity.z * 0.1;
                robot.rotation.z = robotState.velocity.x * 0.1;
                
                // Spin propeller
                robot.children.forEach(child => {
                    if (child.userData.isPropeller) child.rotation.x += 0.3;
                });
            } else if (robotType === 'rover') {
                // Spin wheels
                const wheelSpeed = robotState.velocity.length() * 0.5;
                robot.children.forEach(child => {
                    if (child.userData.isWheel) child.rotation.y += wheelSpeed;
                });
            } else if (robotType === 'quadruped') {
                // Animate legs
                animateQuadruped();
            }
            
            // Update FPV camera
            updateFPVCamera();
            
            // Third-person chase camera (skip in tiles maps mode — handled by updateMapsPosition)
            {
                camera.up.set(0, 1, 0);
                const scale = robot.scale.x || 1;
                const isMaps = currentEnvironment === 'maps';
                const dist = (isMaps ? 6 : chaseCamDistance) * scale;
                const height = (isMaps ? 2.5 : chaseCamHeight) * scale;
                const camYaw = robot.rotation.y;
                const desiredX = robot.position.x + Math.sin(camYaw) * dist;
                const desiredZ = robot.position.z + Math.cos(camYaw) * dist;
                const desiredY = robot.position.y + height;
                camera.position.x += (desiredX - camera.position.x) * chaseCamLerp;
                camera.position.y += (desiredY - camera.position.y) * chaseCamLerp;
                camera.position.z += (desiredZ - camera.position.z) * chaseCamLerp;
                const lookTarget = robot.position.clone();
                lookTarget.y += 1 * scale;
                controls.target.lerp(lookTarget, 0.12);
            }
            
            // Update telemetry
            updateTelemetry();
            
            // Battery drain
            if (robotState.velocity.length() > 0.01) {
                battery = Math.max(0, battery - 0.002);
                updateBattery();
            }
            
            // Update minimap
            updateMinimap();
        }
        
        function getGroundHeight() {
            return envGroundY;
        }
        
        function animateQuadruped() {
            if (robotState.velocity.length() > 0.01) {
                robotState.legPhase += ROBOTS.quadruped.physics.gaitSpeed * robotState.velocity.length();
            }
            
            robot.children.forEach(child => {
                if (child.userData.legName) {
                    const phase = robotState.legPhase;
                    const offset = child.userData.legName.includes('F') ? 0 : Math.PI;
                    const side = child.userData.legName.includes('L') ? 1 : -1;
                    
                    // Trot gait
                    const hipAngle = Math.sin(phase + offset) * 0.3;
                    const kneeAngle = Math.abs(Math.sin(phase + offset)) * 0.4;
                    
                    child.children.forEach(part => {
                        if (part.userData.isUpperLeg) {
                            part.rotation.x = hipAngle;
                        } else if (part.userData.isLowerLeg) {
                            part.rotation.x = kneeAngle;
                        }
                    });
                }
            });
        }
        
        function updateFPVCamera() {
            if (!robot) return;

            const scale = robot.scale.x || 1;
            let offset;
            if (robotType === 'rover' || robotType === 'quadruped') {
                offset = new THREE.Vector3(0, 1.2 * scale, -0.8 * scale);
            } else {
                offset = new THREE.Vector3(0, -0.2 * scale, -0.5 * scale);
            }
            offset.applyQuaternion(robot.quaternion);
            fpvCamera.position.copy(robot.position).add(offset);

            const q = new THREE.Quaternion();
            const yawQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), robot.rotation.y);
            if (robotType === 'rover' || robotType === 'quadruped') {
                q.copy(yawQ);
            } else {
                const pitchQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 4);
                q.multiplyQuaternions(yawQ, pitchQ);
            }
            fpvCamera.quaternion.copy(q);
        }

        function updateFOVCone() {
            if (!fovCone || !robot || robotType !== 'drone') return;
            const alt = robot.position.y;
            if (alt < 0.8) { fovCone.visible = false; return; }
            fovCone.visible = true;

            // Camera mounted at front of drone, angled 45° downward
            const camTilt = 45 * Math.PI / 180; // 45° down from horizontal
            const hFov = 30 * Math.PI / 180; // half horizontal FOV
            const vFov = 22.5 * Math.PI / 180; // half vertical FOV

            // Camera looks forward-down at 45°. The projection hits the ground
            // at varying distances based on the vertical FOV spread.
            // Center ray: hits ground at distance = alt / tan(camTilt) forward
            const centerDist = alt / Math.tan(camTilt); // forward distance on ground to center of FOV

            // Near edge (bottom of frame): steeper angle = closer
            const nearAngle = camTilt + vFov;
            const nearDist = nearAngle >= Math.PI / 2 ? 0 : alt / Math.tan(nearAngle);
            // Far edge (top of frame): shallower angle = farther
            const farAngle = camTilt - vFov;
            const farDist = farAngle <= 0 ? centerDist * 4 : alt / Math.tan(farAngle);

            // Width at near and far edges
            const nearHW = nearDist * Math.tan(hFov) * 0.8;
            const farHW = farDist * Math.tan(hFov) * 1.2;

            // 4 ground corners in drone-local space (forward = -Z)
            const localCorners = [
                new THREE.Vector3(-nearHW, 0, -nearDist), // near-left
                new THREE.Vector3( nearHW, 0, -nearDist), // near-right
                new THREE.Vector3( farHW,  0, -farDist),  // far-right
                new THREE.Vector3(-farHW,  0, -farDist),  // far-left
            ];

            // Rotate by drone yaw and offset to drone XZ
            const yaw = robot.rotation.y;
            const camPos = robot.position.clone();
            const groundCorners = localCorners.map(c => {
                const rx = c.x * Math.cos(yaw) - c.z * Math.sin(yaw);
                const rz = c.x * Math.sin(yaw) + c.z * Math.cos(yaw);
                return new THREE.Vector3(camPos.x + rx, 0.05, camPos.z + rz);
            });

            // Update the 4 frustum edge lines
            let lineIdx = 0;
            fovCone.children.forEach(child => {
                if (child.userData.fovLine && lineIdx < 4) {
                    const positions = child.geometry.attributes.position.array;
                    positions[0] = camPos.x; positions[1] = camPos.y; positions[2] = camPos.z;
                    positions[3] = groundCorners[lineIdx].x;
                    positions[4] = groundCorners[lineIdx].y;
                    positions[5] = groundCorners[lineIdx].z;
                    child.geometry.attributes.position.needsUpdate = true;
                    lineIdx++;
                }
                if (child.userData.fovRect) {
                    const positions = child.geometry.attributes.position.array;
                    for (let i = 0; i < 4; i++) {
                        positions[i * 3]     = groundCorners[i].x;
                        positions[i * 3 + 1] = groundCorners[i].y;
                        positions[i * 3 + 2] = groundCorners[i].z;
                    }
                    positions[12] = groundCorners[0].x;
                    positions[13] = groundCorners[0].y;
                    positions[14] = groundCorners[0].z;
                    child.geometry.attributes.position.needsUpdate = true;
                }
                if (child.userData.fovFill) {
                    // Position fill at center of ground footprint
                    const cx = (groundCorners[0].x + groundCorners[2].x) / 2;
                    const cz = (groundCorners[0].z + groundCorners[2].z) / 2;
                    const width = Math.max(nearHW, farHW) * 2;
                    const depth = farDist - nearDist;
                    child.position.set(cx, 0.02, cz);
                    child.rotation.set(-Math.PI / 2, 0, yaw);
                    child.scale.set(width, depth, 1);
                }
            });

            fovCone.position.set(0, 0, 0);
            fovCone.rotation.set(0, 0, 0);
        }
        
        function updateTelemetry() {
            if (currentEnvironment === 'maps') {
                document.getElementById('telem-alt').textContent = mapDroneAlt.toFixed(0) + 'm';
                document.getElementById('telem-spd').textContent = (robotState.velocity.length() * 10).toFixed(1);
                document.getElementById('telem-x').textContent = mapDroneLat.toFixed(4);
                document.getElementById('telem-z').textContent = mapDroneLng.toFixed(4);
            } else {
                const rawY = robot.position.y;
                const alt = robotType === 'auv' ? Math.abs(rawY) : (rawY - envGroundY);
                document.getElementById('telem-alt').textContent = alt.toFixed(1) + 'm';
                document.getElementById('telem-spd').textContent = (robotState.velocity.length() * 10).toFixed(1);
                document.getElementById('telem-x').textContent = robot.position.x.toFixed(1);
                document.getElementById('telem-z').textContent = robot.position.z.toFixed(1);
            }
        }
        
        function updateBattery() {
            document.getElementById('battery-text').textContent = Math.round(battery) + '%';
            const fill = document.getElementById('battery-fill');
            fill.style.width = battery + '%';
            fill.classList.toggle('low', battery < 20);
        }
        
        // ============= MINIMAP =============
        function initMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            if (!canvas) return;
            canvas.width = 150;
            canvas.height = 150;
        }
        
        function updateMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 20, 40, 0.9)';
            ctx.fillRect(0, 0, 150, 150);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 150; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 150);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(150, i);
                ctx.stroke();
            }
            
            // Draw robot position
            const scale = 1;
            const centerX = 75 + robot.position.x * scale;
            const centerY = 75 + robot.position.z * scale;
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(-robot.rotation.y);
            
            ctx.fillStyle = '#00c8ff';
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(4, 4);
            ctx.lineTo(-4, 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            
            // Draw waypoints
            waypoints.forEach((wp, i) => {
                const wpX = 75 + wp.x * scale;
                const wpY = 75 + wp.z * scale;
                ctx.fillStyle = i === currentWaypointIndex ? '#00ff88' : '#ff8800';
                ctx.beginPath();
                ctx.arc(wpX, wpY, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // ============= WAYPOINTS =============
        function addWaypoint() {
            const wp = {
                x: robot.position.x,
                y: robot.position.y,
                z: robot.position.z,
                name: `WP${waypoints.length + 1}`
            };

        function renderWaypoints() {

            list.innerHTML = '';
            
            waypoints.forEach((wp, i) => {

                `;
                item.onclick = () => navigateToWaypoint(i);

        // ============= FPV MODE (always-on PiP) =============
        function toggleFPV() {

        // ============= TRAIL PARTICLES (Phase 1C) =============
        function initTrailParticles(type) {
            if (trailParticles) { scene.remove(trailParticles); trailParticles = null; }
            trailPositions = [];

            const colors = { drone: 0xffffff, auv: 0x00ffff, rover: 0x8B6914, quadruped: 0x8B6914 };
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(TRAIL_COUNT * 3);
            const alphas = new Float32Array(TRAIL_COUNT);
            for (let i = 0; i < TRAIL_COUNT; i++) {
                positions[i * 3] = 0; positions[i * 3 + 1] = -1000; positions[i * 3 + 2] = 0;
                alphas[i] = 0;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const mat = new THREE.PointsMaterial({
                color: colors[type] || 0xffffff,
                size: type === 'drone' ? 0.15 : 0.1,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            trailParticles = new THREE.Points(geo, mat);
            scene.add(trailParticles);
        }

        let trailIndex = 0;
        function updateTrailParticles() {
            if (!trailParticles || !robot) return;
            const pos = trailParticles.geometry.attributes.position.array;
            const speed = robotState.velocity.length();
            if (speed < 0.02) return;

            // Emit from different positions based on robot type
            let emitPos;
            if (robotType === 'drone') {
                // Downwash from random prop position
                const pp = [[0.9, -0.3, 0.9], [-0.9, -0.3, 0.9], [0.9, -0.3, -0.9], [-0.9, -0.3, -0.9]];
                const p = pp[Math.floor(Math.random() * 4)];
                emitPos = new THREE.Vector3(p[0], p[1], p[2]).applyEuler(robot.rotation).add(robot.position);
                emitPos.x += (Math.random() - 0.5) * 0.3;
                emitPos.z += (Math.random() - 0.5) * 0.3;
            } else if (robotType === 'auv') {
                // Bubbles trailing behind
                emitPos = new THREE.Vector3(0, 0, 1).applyEuler(robot.rotation).multiplyScalar(1.5).add(robot.position);
                emitPos.y += (Math.random() - 0.5) * 0.3;
            } else {
                // Dust from base
                emitPos = robot.position.clone();
                emitPos.y = robot.position.y - 0.3;
                emitPos.x += (Math.random() - 0.5) * 0.5;
                emitPos.z += (Math.random() - 0.5) * 0.5;
            }

            const i3 = trailIndex * 3;
            pos[i3] = emitPos.x;
            pos[i3 + 1] = emitPos.y;
            pos[i3 + 2] = emitPos.z;
            trailIndex = (trailIndex + 1) % TRAIL_COUNT;

            // Fade: move old particles down/up
            for (let i = 0; i < TRAIL_COUNT; i++) {
                if (robotType === 'auv') {
                    pos[i * 3 + 1] += 0.02; // Bubbles rise
                } else if (robotType === 'drone') {
                    pos[i * 3 + 1] -= 0.03; // Downwash falls
                }
            }
            trailParticles.geometry.attributes.position.needsUpdate = true;
        }

        // ============= 3D WEATHER PARTICLES (Phase 3B) =============
        function create3DWeatherParticles() {
            if (weatherParticles) { scene.remove(weatherParticles); weatherParticles = null; }
            if (weather === 'clear' || weather === 'cloudy') return;

            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(WEATHER_PARTICLE_COUNT * 3);
            const spread = 100;
            for (let i = 0; i < WEATHER_PARTICLE_COUNT; i++) {
                positions[i * 3] = (Math.random() - 0.5) * spread;
                positions[i * 3 + 1] = Math.random() * 60;
                positions[i * 3 + 2] = (Math.random() - 0.5) * spread;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            let color, size;
            if (weather === 'rain' || weather === 'storm') { color = 0xaaccee; size = 0.15; }
            else if (weather === 'sandstorm') { color = 0xaa8844; size = 0.2; }
            else { color = 0x00ccff; size = 0.12; } // underwater bubbles

            const mat = new THREE.PointsMaterial({
                color, size, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            weatherParticles = new THREE.Points(geo, mat);
            scene.add(weatherParticles);
        }

        function update3DWeatherParticles() {
            if (!weatherParticles) return;
            const pos = weatherParticles.geometry.attributes.position.array;
            const spread = 100;
            for (let i = 0; i < WEATHER_PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                if (weather === 'rain' || weather === 'storm') {
                    pos[i3 + 1] -= 0.8; // Fall
                    pos[i3] += (Math.random() - 0.5) * 0.1;
                    if (pos[i3 + 1] < 0) { pos[i3 + 1] = 60; pos[i3] = robot.position.x + (Math.random() - 0.5) * spread; pos[i3 + 2] = robot.position.z + (Math.random() - 0.5) * spread; }
                } else if (weather === 'sandstorm') {
                    pos[i3] += 0.5; // Horizontal wind
                    pos[i3 + 1] += (Math.random() - 0.5) * 0.2;
                    if (pos[i3] > robot.position.x + spread / 2) { pos[i3] = robot.position.x - spread / 2; }
                } else {
                    // Bubbles (ocean)
                    pos[i3 + 1] += 0.05;
                    pos[i3] += (Math.random() - 0.5) * 0.05;
                    if (pos[i3 + 1] > 0) { pos[i3 + 1] = -25; pos[i3] = robot.position.x + (Math.random() - 0.5) * spread; pos[i3 + 2] = robot.position.z + (Math.random() - 0.5) * spread; }
                }
            }
            weatherParticles.geometry.attributes.position.needsUpdate = true;
        }

        // ============= WIND MODEL (Phase 5C) =============
        function updateWind() {
            windTime += 0.005;
            windVector.x = Math.sin(windTime * 0.7) * Math.cos(windTime * 0.3) * windStrength;
            windVector.z = Math.cos(windTime * 0.5) * Math.sin(windTime * 0.9) * windStrength;
            // Update wind UI
            const ws = windVector.length() * 1000;
            const windAngle = Math.atan2(windVector.x, windVector.z) * (180 / Math.PI);
            const el = document.getElementById('wind-indicator');
            if (robotType === 'drone') {
                el.classList.add('active');
                document.getElementById('wind-arrow').style.transform = `rotate(${windAngle}deg)`;
                document.getElementById('wind-text').textContent = ws.toFixed(1) + ' m/s';
            } else {
                el.classList.remove('active');
            }
        }

        // ============= COLLISION DETECTION (Phase 5B) =============
        function checkCollisions() {
            if (collidableMeshes.length === 0) return;
            const raycaster = new THREE.Raycaster();
            const directions = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1),
                new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1, 0)
            ];
            const threshold = 1.5;
            directions.forEach(dir => {
                raycaster.set(robot.position, dir);
                raycaster.far = threshold;
                const hits = raycaster.intersectObjects(collidableMeshes, true);
                if (hits.length > 0) {
                    // Zero velocity in collision direction
                    const dot = robotState.velocity.dot(dir);
                    if (dot > 0) {
                        robotState.velocity.sub(dir.clone().multiplyScalar(dot));
                    }
                }
            });
        }

        // ============= HUD INSTRUMENTS (Phase 2A, 2B) =============
        function drawAttitudeIndicator() {
            const canvas = document.getElementById('attitude-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = 100, h = 100, cx = w / 2, cy = h / 2;

            // Only show for drone/AUV
            const panel = document.getElementById('attitude-panel');
            if (robotType !== 'drone' && robotType !== 'auv') {
                if (panel) panel.style.display = 'none';
                return;
            }
            if (panel) panel.style.display = '';

            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, 55, 0, Math.PI * 2);
            ctx.clip();

            const pitch = robot ? robot.rotation.x : 0;
            const roll = robot ? robot.rotation.z : 0;
            const pitchOffset = pitch * 80;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-roll);

            // Sky
            ctx.fillStyle = '#3366aa';
            ctx.fillRect(-80, -80, 160, 80 + pitchOffset);
            // Ground
            ctx.fillStyle = '#885522';
            ctx.fillRect(-80, pitchOffset, 160, 80 - pitchOffset);
            // Horizon line
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-60, pitchOffset);
            ctx.lineTo(60, pitchOffset);
            ctx.stroke();

            // Pitch ladder
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1;
            ctx.font = '8px monospace';
            ctx.fillStyle = '#fff';
            for (let deg = -20; deg <= 20; deg += 10) {
                if (deg === 0) continue;
                const y = pitchOffset - deg * 2;
                ctx.beginPath();
                ctx.moveTo(-20, y);
                ctx.lineTo(20, y);
                ctx.stroke();
                ctx.fillText(Math.abs(deg) + '', 22, y + 3);
            }

            ctx.restore();

            // Aircraft symbol (static)
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx - 25, cy);
            ctx.lineTo(cx - 10, cy);
            ctx.lineTo(cx - 5, cy + 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + 25, cy);
            ctx.lineTo(cx + 10, cy);
            ctx.lineTo(cx + 5, cy + 5);
            ctx.stroke();
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(cx - 2, cy - 2, 4, 4);

            ctx.restore();

            // Border
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, 55, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawCompass() {
            const canvas = document.getElementById('compass-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = 320, h = 36;
            ctx.clearRect(0, 0, w, h);

            const yaw = robot ? -robot.rotation.y * (180 / Math.PI) : 0;
            const cardinals = { 0: 'N', 45: 'NE', 90: 'E', 135: 'SE', 180: 'S', 225: 'SW', 270: 'W', 315: 'NW' };

            // Edge fade gradient
            const edgeFade = ctx.createLinearGradient(0, 0, w, 0);
            edgeFade.addColorStop(0, 'rgba(0,0,0,0)');
            edgeFade.addColorStop(0.1, 'rgba(0,0,0,1)');
            edgeFade.addColorStop(0.9, 'rgba(0,0,0,1)');
            edgeFade.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.textAlign = 'center';
            ctx.lineWidth = 1;

            const degsVisible = 120;
            const pxPerDeg = w / degsVisible;

            // Draw ticks and labels
            for (let deg = -degsVisible; deg <= degsVisible; deg += 5) {
                let actual = ((yaw + deg) % 360 + 360) % 360;
                const x = w / 2 + deg * pxPerDeg;
                if (x < 8 || x > w - 8) continue;

                const rounded = Math.round(actual);
                const isCardinal = rounded % 45 === 0 && cardinals[rounded];
                const isMajor = rounded % 10 === 0;

                // Ticks from bottom up
                if (rounded % 5 === 0) {
                    const tickH = isCardinal ? 12 : isMajor ? 8 : 4;
                    ctx.strokeStyle = isCardinal ? 'rgba(56,139,253,0.6)' : 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    ctx.moveTo(x, h);
                    ctx.lineTo(x, h - tickH);
                    ctx.stroke();
                }

                // Labels above ticks
                if (isCardinal) {
                    ctx.fillStyle = rounded === 0 ? '#ff4444' : '#388bfd';
                    ctx.font = 'bold 12px "JetBrains Mono", monospace';
                    ctx.fillText(cardinals[rounded], x, 14);
                } else if (isMajor) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = '10px "JetBrains Mono", monospace';
                    ctx.fillText(rounded + '', x, 13);
                }
            }

            // Center pointer — inverted triangle at top
            ctx.fillStyle = '#388bfd';
            ctx.beginPath();
            ctx.moveTo(w / 2, 0);
            ctx.lineTo(w / 2 - 4, 6);
            ctx.lineTo(w / 2 + 4, 6);
            ctx.closePath();
            ctx.fill();

            // Heading readout box at center bottom
            const headingDeg = ((yaw % 360) + 360) % 360;
            ctx.fillStyle = 'rgba(56,139,253,0.15)';
            ctx.strokeStyle = 'rgba(56,139,253,0.4)';
            ctx.lineWidth = 1;
            const boxW = 36, boxH = 14;
            ctx.fillRect(w/2 - boxW/2, h - boxH - 1, boxW, boxH);
            ctx.strokeRect(w/2 - boxW/2, h - boxH - 1, boxW, boxH);
            ctx.fillStyle = '#e6edf3';
            ctx.font = 'bold 10px "JetBrains Mono", monospace';
            ctx.fillText(Math.round(headingDeg) + '°', w/2, h - 3);

            // Wind direction arrow on compass (if drone)
            if (robotType === 'drone' && windVector.length() > 0.001) {
                const windDeg = ((Math.atan2(windVector.x, windVector.z) * 180 / Math.PI) % 360 + 360) % 360;
                const windRelative = windDeg - yaw;
                const windX = w / 2 + windRelative * pxPerDeg;
                if (windX > 10 && windX < w - 10) {
                    ctx.fillStyle = '#ff8800';
                    ctx.beginPath();
                    ctx.moveTo(windX, 20);
                    ctx.lineTo(windX - 4, 28);
                    ctx.lineTo(windX + 4, 28);
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }

        // ============= TOAST NOTIFICATIONS (Phase 2D) =============
        function showToast(message) {

            const toast = document.createElement('div');
            toast.className = 'toast';

        // ============= AUDIO WAVEFORM (Phase 2E) =============
        function drawAudioWaveform() {
            const canvas = document.getElementById('waveform-canvas');
            if (!canvas || !audioAnalyser || !analyserData) return;
            const ctx = canvas.getContext('2d');
            const w = 90, h = 90, cx = w / 2, cy = h / 2;
            ctx.clearRect(0, 0, w, h);

            audioAnalyser.getByteFrequencyData(analyserData);
            const bars = 32;
            const step = Math.floor(analyserData.length / bars);
            const baseRadius = 32;
            const maxBarH = 12;

            for (let i = 0; i < bars; i++) {
                const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
                const val = analyserData[i * step] / 255;
                const barH = val * maxBarH;
                const x1 = cx + Math.cos(angle) * baseRadius;
                const y1 = cy + Math.sin(angle) * baseRadius;
                const x2 = cx + Math.cos(angle) * (baseRadius + barH);
                const y2 = cy + Math.sin(angle) * (baseRadius + barH);
                ctx.strokeStyle = `rgba(0, 200, 255, ${0.3 + val * 0.7})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        // ============= GROUND TEXTURE HELPER (Phase 3D) =============
        function createGroundTexture(baseColor, noiseColor, noiseAmount) {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, size, size);

            // Add noise patches
            for (let i = 0; i < noiseAmount; i++) {
                ctx.fillStyle = noiseColor;
                ctx.globalAlpha = 0.1 + Math.random() * 0.2;
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = 5 + Math.random() * 20;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(20, 20);
            return tex;
        }

        // ============= GOOGLE MAPS ENVIRONMENT (Phase 4) =============

            // Load Maps JS API exactly as per official docs: direct script tag

            script.src = 'https://maps.googleapis.com/maps/api/js?key=' + MAPS_API_KEY + '&v=beta&libraries=maps3d';
            script.onload = () => {

        // Hide map labels by injecting CSS into gmp-map-3d shadow DOM

            // Wait for shadow DOM to be available

                if (mapEl.shadowRoot) {
                    const style = document.createElement('style');
                    style.textContent = `
                        /* Hide all place labels, business names, and POI icons */
                        .gm-style label, .poi-info-window, [class*="label"],

                    mapEl.shadowRoot.appendChild(style);

                    // Also recurse into nested shadow roots

                            el.shadowRoot.appendChild(innerStyle);
                        }
                    });
                } else {
                    setTimeout(tryInject, 500);
                }
            };
            // Try after a delay to let the element initialize
            setTimeout(tryInject, 1000);

        let mapCamRange = 120; // Chase cam distance on map — closer for street-level feel
        let mapCamHeading = 0; // Map heading (follows drone yaw for chase cam)
        let mapInitialHeading = 0; // Fixed initial city heading — used for velocity rotation

        // Autopilot — steers drone toward current waypoint
        function updateAutopilot() {
            if (!autopilot.active || autopilot.waypoints.length === 0) return;
            if (currentEnvironment !== 'maps' || !googleMap) return; // Wait for map to be ready

            const wp = autopilot.waypoints[autopilot.currentIndex];
            if (!wp) { autopilot.active = false; return; }

            // Distance to waypoint in degrees
            const dLat = wp.lat - mapDroneLat;
            const dLng = wp.lng - mapDroneLng;
            const dist = Math.sqrt(dLat * dLat + dLng * dLng);

            // Altitude: use waypoint altitude or default, but never below minimum cruise
            const targetAlt = Math.max(wp.altitude || autopilot.targetAlt, autopilot.minCruiseAlt);
            const altDiff = targetAlt - mapDroneAlt;
            const belowCruise = mapDroneAlt < autopilot.minCruiseAlt;

            // PHASE 1: Climb to safe altitude before any lateral movement
            if (belowCruise) {
                keys['w'] = false;
                keys['arrowleft'] = false;
                keys['arrowright'] = false;
                keys['q'] = false; keys['e'] = false;
                // Direct Y climb — fast
                const cruiseY = autopilot.minCruiseAlt / 5 + 0.3;
                robot.position.y += (cruiseY - robot.position.y) * 0.05;
                robotState.position.y = robot.position.y;
                return; // Don't move laterally until above buildings
            }

            // Check arrival
            if (dist < autopilot.arrivalThreshold) {
                showToast('Reached: ' + (wp.name || ('Waypoint ' + (autopilot.currentIndex + 1))));
                autopilot.currentIndex++;
                if (autopilot.currentIndex >= autopilot.waypoints.length) {
                    if (autopilot.loop) {
                        autopilot.currentIndex = 0;
                        showToast('Looping route...');
                    } else {
                        autopilot.active = false;
                        ['w', 's', 'a', 'd', 'q', 'e', 'arrowleft', 'arrowright'].forEach(k => keys[k] = false);
                        ROBOTS[robotType].physics.thrust = 0.06;
                        showToast('Navigation complete!');
                        return;
                    }
                }
                return;
            }

            // PHASE 2: Navigate laterally at safe altitude
            const speeds = { slow: 0.4, normal: 0.7, fast: 1.0 };
            const speedMult = speeds[autopilot.speed] || 0.7;

            // Steer toward waypoint: compute bearing (accounting for longitude scaling at latitude)
            const dLngCorrected = dLng * Math.cos(mapDroneLat * Math.PI / 180);
            const bearing = Math.atan2(dLngCorrected, dLat); // radians, 0=north
            const targetYaw = -bearing;

            // Yaw toward target
            let yawDiff = targetYaw - robot.rotation.y;
            while (yawDiff > Math.PI) yawDiff -= 2 * Math.PI;
            while (yawDiff < -Math.PI) yawDiff += 2 * Math.PI;

            // Turn toward waypoint
            if (Math.abs(yawDiff) > 0.05) {
                keys['arrowleft'] = yawDiff > 0;
                keys['arrowright'] = yawDiff < 0;
            } else {
                keys['arrowleft'] = false;
                keys['arrowright'] = false;
            }

            // Move forward when roughly facing the waypoint
            keys['w'] = Math.abs(yawDiff) < 1.0;

            // Maintain altitude — directly adjust robot Y (Q/E too slow for maps scale)
            keys['q'] = false; keys['e'] = false;
            const targetY = targetAlt / 5 + 0.3;
            const yDiff = targetY - robot.position.y;
            if (Math.abs(yDiff) > 0.1) {
                robot.position.y += yDiff * 0.03; // Smooth convergence
                robotState.position.y = robot.position.y;
            }

            ROBOTS[robotType].physics.thrust = 0.06 * speedMult;
        }

        function updateMapsPosition() {
            if (currentEnvironment !== 'maps' || !googleMap) return;

            updateAutopilot();

            const metersToDeg = 0.000009;
            const hSpeed = Math.sqrt(robotState.velocity.x ** 2 + robotState.velocity.z ** 2);

            if (hSpeed > 0.02) {
                // World-space velocity directly to lat/lng
                // Three.js: -Z = north when rotation.y=0, +X = east
                // Rotate by initial city heading to align with map
                const headRad = mapInitialHeading * Math.PI / 180;
                const cosH = Math.cos(headRad), sinH = Math.sin(headRad);
                const vx = robotState.velocity.x;
                const vz = robotState.velocity.z;
                const mapVx = vx * cosH - vz * sinH;  // east component
                const mapVz = vx * sinH + vz * cosH;  // north component
                mapDroneLat += -mapVz * metersToDeg * 3;
                mapDroneLng += mapVx * metersToDeg * 3 / Math.cos(mapDroneLat * Math.PI / 180);
            }

            mapDroneAlt += robotState.velocity.y * 0.5;
            if (mapDroneAlt < 2) mapDroneAlt = 2;

            // Sync altitude from Three.js drone Y position
            mapDroneAlt = Math.max(0, (robot.position.y - 0.3) * 5);

            // Map heading follows drone yaw
            const droneHeadingDeg = (-robot.rotation.y * 180 / Math.PI) % 360;
            let headingDiff = droneHeadingDeg - mapCamHeading;
            if (headingDiff > 180) headingDiff -= 360;
            if (headingDiff < -180) headingDiff += 360;
            mapCamHeading += headingDiff * 0.06;

            // Chase cam: range scales gently with altitude, tilt stays steep to keep camera near drone altitude
            const effectiveRange = mapCamRange + mapDroneAlt * 0.3;
            const effectiveTilt = Math.max(55, 70 - mapDroneAlt * 0.02);

            try {
                googleMap.setAttribute('center', mapDroneLat + ', ' + mapDroneLng + ', ' + mapDroneAlt);
                googleMap.setAttribute('heading', String(mapCamHeading));
                googleMap.setAttribute('tilt', String(effectiveTilt));
                googleMap.setAttribute('range', String(effectiveRange));
            } catch (e) {}
        }

        // Scroll wheel adjusts both map range AND Three.js chase cam together
        function initMapDragControls() {
            const mapDiv = document.getElementById('maps-container');

                // Scale Three.js chase cam proportionally so drone stays consistent with map
                chaseCamDistance = Math.max(3, Math.min(30, chaseCamDistance * factor));
                chaseCamHeight = Math.max(1, Math.min(15, chaseCamHeight * factor));
            }, { passive: false });
        }

        function updateNavLights() {
            if (!robot || robotType !== 'drone') return;
            const t = Date.now();
            robot.children.forEach(child => {
                if (child.userData.isStrobe) {
                    // White strobe: 1Hz double flash

                    child.visible = (cycle < 80) || (cycle > 120 && cycle < 200);
                } else if (child.userData.isNavLight) {

        // ============= ANIMATION LOOP =============
        function animate() {
            requestAnimationFrame(animate);

            // Update drone GLB animation (propeller spin)
            if (droneAnimMixer) {
                droneAnimMixer.update(animClock.getDelta());
            }

            updateWind();
            updateRobot();
            updateNavLights();
            updateTrailParticles();
            updateFOVCone();
            update3DWeatherParticles();
            drawAttitudeIndicator();
            drawCompass();
            drawAudioWaveform();

            // Animate ocean environment
            const time = Date.now() * 0.001;
            environmentObjects.forEach(obj => {
                if (!obj.userData) return;
                if (obj.userData.isOcean) {
                    // Multi-frequency waves
                    const positions = obj.geometry.attributes.position.array;
                    for (let i = 0; i < positions.length; i += 3) {
                        const x = positions[i], y = positions[i + 1];
                        positions[i + 2] =
                            Math.sin(x * 0.05 + time) * Math.cos(y * 0.05 + time) * 2 +
                            Math.sin(x * 0.12 + time * 1.5) * 0.5 +
                            Math.cos(y * 0.08 + time * 0.7) * 0.8;
                    }
                    obj.geometry.attributes.position.needsUpdate = true;
                }
                // Kelp swaying
                if (obj.userData.isKelp) {
                    const k = obj.userData.kelpBase;
                    const sway = Math.sin(time * 0.8 + k.x * 0.1 + k.z * 0.1) * (k.seg + 1) * 0.15;
                    obj.position.x = k.x + sway;
                    obj.rotation.z = sway * 0.1;
                }
                // Fish schools — circular swimming
                if (obj.userData.isFishSchool) {
                    const d = obj.userData;
                    d.swimPhase += d.swimSpeed;
                    obj.position.x = d.basePos.x + Math.cos(d.swimPhase) * d.swimRadius;
                    obj.position.z = d.basePos.z + Math.sin(d.swimPhase) * d.swimRadius;
                    obj.position.y = d.basePos.y + Math.sin(d.swimPhase * 2) * 1.5;
                    obj.rotation.y = -d.swimPhase + Math.PI / 2; // Face swim direction
                }
                // Jellyfish bobbing
                if (obj.userData.isJellyfish) {
                    obj.userData.bobPhase += 0.008;
                    obj.position.y += Math.sin(obj.userData.bobPhase) * 0.01;
                    obj.rotation.y += 0.002;
                }
                // Bioluminescent pulse
                if (obj.userData.isBioGlow) {
                    const pulse = 0.6 + Math.sin(time * 2 + obj.position.x) * 0.4;
                    obj.material.opacity = pulse;
                    obj.scale.setScalar(0.8 + pulse * 0.4);
                }
            });

            // Google Maps updates
            if (currentEnvironment === 'maps') {
                updateMapsPosition();
            }

            controls.update();

            // Clamp camera to environment bounds
            if (envBounds) {
                camera.position.clamp(envBounds.min, envBounds.max);
            }

            // In maps mode, render with transparent background so map shows through
            if (currentEnvironment === 'maps') {
                renderer.setClearColor(0x000000, 0);
            }
            // Main render — always chase camera
            renderer.render(scene, camera);

            // FPV PiP render
            renderFPVPip();
        }

        function renderFPVPip() {
            if (!robot || !fpvRenderer) return;
            const pip = document.getElementById('fpv-pip');
            if (!pip) return;
            pip.style.display = '';

            if (currentEnvironment === 'maps') {
                // Maps mode: use gmp-map-3d for FPV
                if (!fpvMap3d && mapsApiLoaded) {
                    if (fpvRenderer.domElement) fpvRenderer.domElement.style.display = 'none';
                    fpvMap3d = document.createElement('gmp-map-3d');

                    fpvMap3d.style.width = '100%'; fpvMap3d.style.height = '100%'; fpvMap3d.style.borderRadius = '10px';
                    pip.insertBefore(fpvMap3d, pip.firstChild);
                }
                if (fpvMap3d) {
                    const fpvHeading = (-robot.rotation.y * 180 / Math.PI) % 360;
                    const fwdOffset = 0.0005;
                    const headRad = -robot.rotation.y;
                    const fpvLat = mapDroneLat + Math.cos(headRad) * fwdOffset;
                    const fpvLng = mapDroneLng + Math.sin(headRad) * fwdOffset / Math.cos(mapDroneLat * Math.PI / 180);
                    // FPV: camera AT drone altitude, looking forward and down at 65° tilt
                    fpvMap3d.setAttribute('center', fpvLat + ',' + fpvLng + ',' + Math.max(5, mapDroneAlt));
                    fpvMap3d.setAttribute('heading', String(fpvHeading));
                    fpvMap3d.setAttribute('tilt', '65');
                    fpvMap3d.setAttribute('range', '50');
                }
                return;
            }

            // Non-maps: clean up map PiP, use Three.js FPV
            if (fpvMap3d) {
                fpvMap3d.remove(); fpvMap3d = null;
                if (fpvRenderer.domElement) fpvRenderer.domElement.style.display = 'block';
            }
            robot.visible = false;
            fpvRenderer.render(scene, fpvCamera);
            robot.visible = true;
        }

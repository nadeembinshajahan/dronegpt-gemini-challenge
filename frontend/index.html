<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneGPT — AI with a Body</title>
    <script src="https://unpkg.com/three@0.137.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.137.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.137.0/examples/js/loaders/RGBELoader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        #container { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            overflow: hidden;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .ui-layer > * {
            pointer-events: auto;
        }
        #scene-container { 
            width: 100%; 
            height: 100%; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Top Control Bar */
        #control-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        /* Environment & Robot Selectors */
        .selector-row {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        .selector-btn {
            padding: 8px 14px;
            background: rgba(0, 200, 255, 0.1);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .selector-btn:hover { background: rgba(0, 200, 255, 0.25); transform: scale(1.02); }
        .selector-btn.active { 
            background: linear-gradient(135deg, #00c8ff, #0088cc);
            color: #000;
            border-color: #00c8ff;
            font-weight: 600;
        }
        .selector-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .selector-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            padding: 8px 8px 8px 0;
            border-right: 1px solid rgba(255,255,255,0.1);
            margin-right: 8px;
        }
        
        /* Voice Controls */
        #voice-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 1000;
        }
        
        #voice-suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .voice-suggestion {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 15px;
            padding: 6px 12px;
            font-size: 11px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-suggestion:hover {
            background: rgba(0, 200, 255, 0.2);
            color: #fff;
        }
        
        #voice-status {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 24px;
            max-width: 600px;
            text-align: center;
            min-height: 44px;
        }
        
        #voice-indicator {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.2);
            border: 2px solid #00c8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        #voice-indicator.listening {
            background: #00c8ff;
            animation: pulse 1.5s infinite;
        }
        #voice-indicator.speaking {
            background: #00ff88;
            border-color: #00ff88;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(0, 200, 255, 0); transform: scale(1.05); }
        }
        #voice-indicator svg { width: 28px; height: 28px; fill: #fff; }
        
        /* Start Button */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #00c8ff, #0088cc);
            border: none;
            border-radius: 12px;
            color: #000;
            cursor: pointer;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0, 200, 255, 0.3);
        }
        #start-btn:hover { transform: translate(-50%, -50%) scale(1.05); }
        #start-btn.hidden { display: none; }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 120px;
            left: 20px;
            z-index: 1000;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            min-width: 140px;
        }
        .hud-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00c8ff;
            margin-bottom: 4px;
        }
        .hud-value {
            font-size: 14px;
            font-weight: 600;
        }
        .hud-icon {
            font-size: 20px;
            margin-right: 8px;
        }
        
        /* Battery/Fuel */
        #battery-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        #battery-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #88ff00);
            border-radius: 3px;
            transition: width 0.3s;
        }
        #battery-fill.low { background: linear-gradient(90deg, #ff4444, #ff8800); }
        
        /* Telemetry */
        #telemetry {
            position: absolute;
            top: 120px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }
        .telemetry-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .telemetry-item {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            min-width: 70px;
            text-align: center;
        }
        .telemetry-label {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .telemetry-value {
            font-size: 14px;
            font-weight: 600;
            color: #00c8ff;
            font-family: 'Courier New', monospace;
        }
        
        /* Connection Status */
        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: auto;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }
        .status-dot.connected { background: #00ff88; }
        
        /* FPV Toggle */
        #fpv-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 255, 0.3);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        #fpv-toggle:hover { background: rgba(0, 200, 255, 0.2); }
        #fpv-toggle.active { background: #00c8ff; color: #000; }
        
        /* Minimap */
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            z-index: 1000;
        }
        #minimap-canvas {
            width: 100%;
            height: 100%;
        }
        
        /* Waypoints Panel */
        #waypoints-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
            min-width: 160px;
            pointer-events: auto;
        }
        #waypoints-panel h4 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00c8ff;
            margin-bottom: 8px;
        }
        .waypoint-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 11px;
            color: #aaa;
        }
        .waypoint-item.active { color: #00ff88; }
        .waypoint-item.completed { color: #666; text-decoration: line-through; }
        .waypoint-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00c8ff;
        }
        .waypoint-dot.active { background: #00ff88; animation: pulse 1s infinite; }
        .waypoint-dot.completed { background: #444; }
        #add-waypoint-btn {
            width: 100%;
            margin-top: 8px;
            padding: 6px;
            background: rgba(0, 200, 255, 0.2);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 10px;
            cursor: pointer;
        }
        #add-waypoint-btn:hover { background: rgba(0, 200, 255, 0.3); }
        
        /* Weather Indicator */
        #weather-indicator {
            position: absolute;
            top: 70px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Controls Hint */
        #controls-hint {
            position: absolute;
            bottom: 180px;
            left: 20px;
            z-index: 1000;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 11px;
            color: #888;
            max-width: 200px;
        }
        #controls-hint kbd {
            background: rgba(255,255,255,0.15);
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 10px;
        }
        
        /* Underwater Effect */
        .underwater-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 80, 120, 0.3), rgba(0, 40, 60, 0.5));
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .underwater-overlay.active { opacity: 1; }
        
        /* Weather Effects */
        #weather-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 49;
            overflow: hidden;
        }
        .rain {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(transparent, rgba(174, 194, 224, 0.5));
            animation: rain-fall 0.5s linear infinite;
        }
        @keyframes rain-fall {
            0% { transform: translateY(-20px); }
            100% { transform: translateY(100vh); }
        }
        
        /* ============= MOBILE STYLES ============= */
        @media (max-width: 768px) {
            /* Compact control bar */
            #control-bar {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 5px;
                padding: 6px 10px;
                max-width: 95vw;
            }
            .selector-row {
                flex-wrap: nowrap;
                gap: 4px;
            }
            .selector-btn {
                padding: 6px 8px;
                font-size: 11px;
            }
            .selector-label {
                display: none;
            }
            /* Hide clutter on mobile */
            #hud, #telemetry, #minimap, #controls-hint, #waypoint-btn, #fpv-btn, .feature-buttons {
                display: none !important;
            }
            /* Voice overlay at bottom */
            #voice-overlay {
                bottom: 150px;
            }
            #voice-status {
                font-size: 13px;
                padding: 8px 14px;
                max-width: 85vw;
            }
            #start-btn {
                padding: 14px 28px;
                font-size: 15px;
            }
            #connection-status {
                top: auto;
                bottom: 10px;
                right: 10px;
                padding: 5px 10px;
                font-size: 11px;
            }
        }
        
        /* Virtual Joystick for Mobile */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 500;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            #mobile-controls { display: flex; justify-content: space-between; padding: 0 20px; }
        }
        .joystick-zone {
            width: 90px;
            height: 90px;
            background: rgba(0, 200, 255, 0.1);
            border: 2px solid rgba(0, 200, 255, 0.3);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            touch-action: none;
        }
        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(0, 200, 255, 0.5);
            border: 2px solid #00c8ff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }
        .joystick-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #00c8ff;
            text-transform: uppercase;
        }
        /* Vertical buttons for mobile */
        #mobile-vertical {
            display: none;
            position: absolute;
            bottom: 160px;
            right: 20px;
            z-index: 500;
            flex-direction: column;
            gap: 10px;
        }
        @media (max-width: 768px) {
            #mobile-vertical { display: flex; }
        }
        .mobile-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 200, 255, 0.2);
            border: 2px solid rgba(0, 200, 255, 0.5);
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            pointer-events: auto;
            touch-action: none;
        }
        .mobile-btn:active {
            background: rgba(0, 200, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="scene-container"></div>
        <div class="underwater-overlay" id="underwater-overlay"></div>
        <div id="weather-effects"></div>
        
        <!-- Mobile Touch Controls -->
        <div id="mobile-controls">
            <div class="joystick-zone" id="joystick-left">
                <div class="joystick-knob" id="knob-left"></div>
                <span class="joystick-label">Move</span>
            </div>
            <div class="joystick-zone" id="joystick-right">
                <div class="joystick-knob" id="knob-right"></div>
                <span class="joystick-label">Look</span>
            </div>
        </div>
        <div id="mobile-vertical">
            <button class="mobile-btn" id="btn-up">↑</button>
            <button class="mobile-btn" id="btn-down">↓</button>
        </div>
        
        <div class="ui-layer">
            <!-- Control Bar -->
            <div id="control-bar">
                <div class="selector-row" id="robot-selector">
                    <span class="selector-label">ROBOT</span>
                    <button class="selector-btn active" data-robot="drone">🚁 Drone</button>
                    <button class="selector-btn" data-robot="auv">🤿 AUV</button>
                    <button class="selector-btn" data-robot="rover">🚗 Rover</button>
                    <button class="selector-btn" data-robot="quadruped">🐕 Quadruped</button>
                </div>
                <div class="selector-row" id="env-selector">
                    <span class="selector-label">ENV</span>
                    <button class="selector-btn active" data-env="london">🏙️ London</button>
                    <button class="selector-btn" data-env="worldlabs2">🌆 Industrial</button>
                    <button class="selector-btn" data-env="tokyo">🗼 Tokyo</button>
                </div>
            </div>
            
            <!-- FPV Toggle -->
            <button id="fpv-toggle">👁️ FPV View</button>
            
            <!-- Connection Status -->
            <div id="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
            
            <!-- Weather Indicator -->
            <div id="weather-indicator">
                <span id="weather-icon">☀️</span>
                <span id="weather-text">Clear</span>
            </div>
            
            <!-- Start Button -->
            <button id="start-btn">🎤 Start Voice Control</button>
            
            <!-- HUD -->
            <div id="hud">
                <div class="hud-panel">
                    <div class="hud-title">DroneGPT</div>
                    <div class="hud-value"><span class="hud-icon" id="robot-icon">🚁</span><span id="robot-name">Quadcopter</span></div>
                </div>
                <div class="hud-panel">
                    <div class="hud-title">Environment</div>
                    <div class="hud-value" id="env-name">Warehouse</div>
                </div>
                <div class="hud-panel">
                    <div class="hud-title">Battery</div>
                    <div class="hud-value" id="battery-text">100%</div>
                    <div id="battery-bar"><div id="battery-fill" style="width: 100%"></div></div>
                </div>
            </div>
            
            <!-- Telemetry -->
            <div id="telemetry">
                <div class="telemetry-row">
                    <div class="telemetry-item">
                        <div class="telemetry-label" id="alt-label">ALT</div>
                        <div class="telemetry-value" id="telem-alt">10.0m</div>
                    </div>
                    <div class="telemetry-item">
                        <div class="telemetry-label">SPD</div>
                        <div class="telemetry-value" id="telem-spd">0.0</div>
                    </div>
                </div>
                <div class="telemetry-row">
                    <div class="telemetry-item">
                        <div class="telemetry-label">X</div>
                        <div class="telemetry-value" id="telem-x">0.0</div>
                    </div>
                    <div class="telemetry-item">
                        <div class="telemetry-label">Z</div>
                        <div class="telemetry-value" id="telem-z">0.0</div>
                    </div>
                </div>
            </div>
            
            <!-- Waypoints Panel -->
            <div id="waypoints-panel">
                <h4>📍 Waypoints</h4>
                <div id="waypoints-list"></div>
                <button id="add-waypoint-btn">+ Add Current Position</button>
            </div>
            
            <!-- Minimap -->
            <div id="minimap">
                <canvas id="minimap-canvas"></canvas>
            </div>
            
            <!-- Controls Hint -->
            <div id="controls-hint">
                <div id="controls-text">
                    <kbd>W/S</kbd> Forward/Back<br>
                    <kbd>A/D</kbd> Strafe<br>
                    <kbd>Q/E</kbd> Up/Down<br>
                    <kbd>←/→</kbd> Turn
                </div>
            </div>
            
            <!-- Voice Overlay -->
            <div id="voice-overlay" style="display: none;">
                <div id="voice-suggestions"></div>
                <div id="voice-status">Click mic to start talking</div>
                <div id="voice-indicator">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============= CONFIGURATION =============
        const GEMINI_API_KEY = 'AIzaSyDaChUoaX7l6-yeUVrS31StPbFGDPZq928';
        const MODEL = 'gemini-2.0-flash-live-001';
        
        // Robot configurations
        const ROBOTS = {
            drone: {
                name: 'Quadcopter',
                icon: '🚁',
                physics: { 
                    gravity: 0.025,      // Realistic gravity (scaled for game feel)
                    drag: 0.98,          // Air resistance
                    thrust: 0.08,        // Acceleration per frame
                    maxSpeed: 1.5,       // Terminal velocity
                    hoverThrust: 0.025,  // Auto-hover compensation
                    tiltResponse: 0.15,  // How fast drone tilts
                    tiltMax: 0.4,        // Max tilt angle (radians)
                    rotDrag: 0.92        // Rotational drag
                },
                environments: ['london', 'worldlabs2', 'warehouse', 'city', 'forest', 'desert', 'ocean'],
                startHeight: 10,
                controls: '<kbd>W/S</kbd> Forward/Back<br><kbd>A/D</kbd> Strafe<br><kbd>Q/E</kbd> Up/Down<br><kbd>←/→</kbd> Turn',
                suggestions: ['fly higher', 'turn left', 'go forward', 'land', 'describe surroundings']
            },
            auv: {
                name: 'Submarine ROV',
                icon: '🤿',
                physics: { gravity: 0.02, drag: 0.92, thrust: 0.3, maxSpeed: 1, buoyancy: 0.02 },
                environments: ['ocean'],
                startHeight: -5,
                controls: '<kbd>W/S</kbd> Forward/Back<br><kbd>A/D</kbd> Strafe<br><kbd>Q/E</kbd> Dive/Surface<br><kbd>←/→</kbd> Turn',
                suggestions: ['dive deeper', 'surface', 'scan for fish', 'check depth', 'explore seabed']
            },
            rover: {
                name: 'Ground Rover',
                icon: '🚗',
                physics: { gravity: 0.5, drag: 0.9, thrust: 0.4, maxSpeed: 1.5, friction: 0.95 },
                environments: ['warehouse', 'city', 'forest', 'desert'],
                startHeight: 0.5,

            // ============= MOBILE TOUCH CONTROLS =============
            // mobileInput is declared globally
            
            function setupJoystick(zoneId, knobId, onMove) {
                const zone = document.getElementById(zoneId);
                const knob = document.getElementById(knobId);
                if (!zone || !knob) return;
                
                let active = false;
                let startX, startY;
                const maxDist = 35;
                
                zone.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    active = true;
                    const touch = e.touches[0];
                    const rect = zone.getBoundingClientRect();
                    startX = rect.left + rect.width / 2;
                    startY = rect.top + rect.height / 2;
                }, { passive: false });
                
                zone.addEventListener('touchmove', (e) => {
                    if (!active) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    let dx = touch.clientX - startX;
                    let dy = touch.clientY - startY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > maxDist) {
                        dx = dx / dist * maxDist;
                        dy = dy / dist * maxDist;
                    }
                    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    onMove(dx / maxDist, dy / maxDist);
                }, { passive: false });
                
                const endTouch = () => {
                    active = false;
                    knob.style.transform = 'translate(-50%, -50%)';
                    onMove(0, 0);
                };
                zone.addEventListener('touchend', endTouch);
                zone.addEventListener('touchcancel', endTouch);
            }
            
            setupJoystick('joystick-left', 'knob-left', (x, y) => {
                mobileInput.moveX = x;
                mobileInput.moveY = y;
            });
            
            setupJoystick('joystick-right', 'knob-right', (x, y) => {
                mobileInput.lookX = x;
                mobileInput.lookY = y;
            });
            
            // Up/Down buttons
            const btnUp = document.getElementById('btn-up');
            const btnDown = document.getElementById('btn-down');
            if (btnUp) {
                btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); mobileInput.up = true; }, { passive: false });
                btnUp.addEventListener('touchend', () => mobileInput.up = false);
            }
            if (btnDown) {
                btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); mobileInput.down = true; }, { passive: false });
                btnDown.addEventListener('touchend', () => mobileInput.down = false);
            }
            
            // Initialize minimap

            // Start animation
            animate();
        }

        // ============= ROBOT SWITCHING =============
        function switchRobot(type) {
            if (!ROBOTS[type]) return;
            
            const cfg = ROBOTS[type];
            
            // Check if robot is compatible with current environment
            if (!cfg.environments.includes(currentEnvironment)) {
                // Switch to first compatible environment
                const compatEnv = cfg.environments[0];
                loadEnvironment(compatEnv);
                document.querySelectorAll('#env-selector .selector-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.env === compatEnv);
                });
            }
            
            robotType = type;
            robotState.position.y = cfg.startHeight;
            robotState.velocity.set(0, 0, 0);
            
            createRobot(type);
            updateEnvironmentButtons();
            
            // Update underwater state
            isUnderwater = (type === 'auv' && currentEnvironment === 'ocean');
            document.getElementById('underwater-overlay').classList.toggle('active', isUnderwater);
            document.getElementById('alt-label').textContent = isUnderwater ? 'DEPTH' : 'ALT';
        }
        
        function updateEnvironmentButtons() {
            const cfg = ROBOTS[robotType];
            document.querySelectorAll('#env-selector .selector-btn').forEach(btn => {
                const env = btn.dataset.env;
                btn.classList.toggle('disabled', !cfg.environments.includes(env));
            });
        }
        
        // ============= ENVIRONMENT CREATION =============
        function clearEnvironment() {
            environmentObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                    else obj.material.dispose();
                }
            });
            environmentObjects = [];
        }
        
        // Load HDRI environment map
        function loadHDRI(hdriPath, callback) {
            if (!hdriLoader) {
                console.warn('HDRI loader not initialized');
                if (callback) callback(null);
                return;
            }
            
            hdriLoader.load(hdriPath, (texture) => {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
                console.log('HDRI loaded:', hdriPath);
                if (callback) callback(texture);
            }, undefined, (err) => {
                console.error('HDRI load error:', err);
                // Fallback to solid color
                scene.background = new THREE.Color(0x87ceeb);
                if (callback) callback(null);
            });
        }
        
        // Load GLB environment (World Labs exports)
        function createGLBEnv(glbPath) {
            // Light fog for atmosphere
            scene.fog = new THREE.FogExp2(0x888888, 0.002);
            
            // Ambient light (HDRI provides most lighting)
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            environmentObjects.push(ambient);
            
            // Directional light for shadows
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 200;
            sun.shadow.camera.left = -50;
            sun.shadow.camera.right = 50;
            sun.shadow.camera.top = 50;
            sun.shadow.camera.bottom = -50;
            scene.add(sun);
            environmentObjects.push(sun);
            
            // Load GLB model
            const loader = new THREE.GLTFLoader();
            loader.load(glbPath, (gltf) => {
                const model = gltf.scene;
                
                // Get model bounds
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                // World Labs models are already sized realistically
                // Just center and position at origin, no scaling
                model.position.set(-center.x, -box.min.y, -center.z);
                
                // Enable shadows
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                environmentObjects.push(model);
                
                // Position drone at a good starting point inside the environment
                const startHeight = Math.min(size.y * 0.3, 5); // 30% up or max 5 units
                robotState.position.set(0, startHeight, 0);
                robotState.velocity.set(0, 0, 0);
                
                // Adjust camera to see the environment
                camera.position.set(size.x * 0.3, size.y * 0.4, size.z * 0.3);
                controls.target.set(0, startHeight, 0);
                controls.update();
                
                console.log('GLB environment loaded:', glbPath, 'Size:', size.x.toFixed(1), 'x', size.y.toFixed(1), 'x', size.z.toFixed(1));
            }, undefined, (err) => {
                console.error('GLB load error:', err);
            });
        }
        
        function loadEnvironment(envName) {
            clearEnvironment();
            currentEnvironment = envName;
            
            const envCfg = ENVIRONMENTS[envName];
            document.getElementById('env-name').textContent = envCfg.name;
            
            // Load HDRI skybox first
            if (envCfg.hdri) {
                loadHDRI(envCfg.hdri);
            }
            
            // Set weather
            weather = envCfg.weather[Math.floor(Math.random() * envCfg.weather.length)];
            updateWeatherUI();
            
            // Check robot compatibility
            const robotCfg = ROBOTS[robotType];
            if (!robotCfg.environments.includes(envName)) {
                // Auto-switch to compatible robot
                const compatRobot = envName === 'ocean' ? 'auv' : 'drone';
                switchRobot(compatRobot);
                document.querySelectorAll('#robot-selector .selector-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.robot === compatRobot);
                });
            }
            
            switch(envName) {
                case 'london': createGLBEnv('environments/london-city.glb'); break;
                case 'worldlabs2': createGLBEnv('environments/worldlabs-env2.glb'); break;
                case 'warehouse': createWarehouseEnv(); break;
                case 'city': createCityEnv(); break;
                case 'forest': createForestEnv(); break;
                case 'desert': createDesertEnv(); break;
                case 'ocean': createOceanEnv(); break;
                case 'tokyo': createTokyoEnv(); break;
            }
            
            // Update underwater state
            isUnderwater = (robotType === 'auv' && envName === 'ocean');
            document.getElementById('underwater-overlay').classList.toggle('active', isUnderwater);
            document.getElementById('alt-label').textContent = isUnderwater ? 'DEPTH' : 'ALT';
            
            // Reset robot position
            robotState.position.set(0, ROBOTS[robotType].startHeight, 0);
            robotState.velocity.set(0, 0, 0);
            
            updateEnvironmentButtons();
            applyWeatherEffects();
        }

        // ============= ROBOT PHYSICS =============
        // Drone state for smooth physics
        let targetTiltX = 0, targetTiltZ = 0;
        let currentTiltX = 0, currentTiltZ = 0;
        let yawVelocity = 0;
        
        function updateRobot() {
            const cfg = ROBOTS[robotType];
            const physics = cfg.physics;
            const thrust = physics.thrust;
            const rotSpeed = 0.03;
            
            // Input handling based on robot type (keyboard + mobile)
            const moveForward = keys['w'] || mobileInput.moveY < -0.2;
            const moveBack = keys['s'] || mobileInput.moveY > 0.2;
            const moveLeft = keys['a'] || mobileInput.moveX < -0.2;
            const moveRight = keys['d'] || mobileInput.moveX > 0.2;
            const lookLeft = keys['arrowleft'] || mobileInput.lookX < -0.2;
            const lookRight = keys['arrowright'] || mobileInput.lookX > 0.2;
            const goUp = keys['q'] || mobileInput.up;
            const goDown = keys['e'] || mobileInput.down;
            
            // Mobile input strength (0-1)
            const mobileStrength = Math.max(Math.abs(mobileInput.moveX), Math.abs(mobileInput.moveY));
            const mobileMult = mobileStrength > 0.2 ? mobileStrength : 1;
            
            if (robotType === 'drone') {
                // Realistic quadcopter physics
                const p = physics;
                
                // Calculate desired acceleration based on input
                let accelX = 0, accelZ = 0, accelY = 0;
                
                if (moveForward) {
                    accelZ -= thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelX -= thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    accelZ += thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelX += thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft) {
                    accelX -= thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelZ += thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveRight) {
                    accelX += thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelZ -= thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                
                // Vertical thrust
                if (goUp) accelY = thrust * 1.5;
                else if (goDown) accelY = -thrust * 1.2;
                else accelY = p.hoverThrust; // Auto-hover compensation
                
                // Apply gravity
                accelY -= p.gravity;
                
                // Apply acceleration to velocity
                robotState.velocity.x += accelX;
                robotState.velocity.y += accelY;
                robotState.velocity.z += accelZ;
                
                // Apply drag (quadratic for realism at high speeds)
                const speed = robotState.velocity.length();
                if (speed > 0.01) {
                    const dragFactor = Math.pow(p.drag, 1 + speed * 0.5);
                    robotState.velocity.multiplyScalar(dragFactor);
                }
                
                // Clamp max speed
                if (speed > p.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(p.maxSpeed);
                }
                
                // Yaw rotation with momentum
                if (lookLeft) yawVelocity += rotSpeed;
                if (lookRight) yawVelocity -= rotSpeed;
                yawVelocity *= (p.rotDrag || 0.92);
                robot.rotation.y += yawVelocity;
                
                // Calculate target tilt based on horizontal velocity (in local space)
                const localVelX = robotState.velocity.x * Math.cos(robot.rotation.y) + robotState.velocity.z * Math.sin(robot.rotation.y);
                const localVelZ = robotState.velocity.z * Math.cos(robot.rotation.y) - robotState.velocity.x * Math.sin(robot.rotation.y);
                
                targetTiltX = -localVelZ * (p.tiltResponse || 0.15);
                targetTiltZ = localVelX * (p.tiltResponse || 0.15);
                
                // Clamp tilt
                const maxTilt = p.tiltMax || 0.4;
                targetTiltX = Math.max(-maxTilt, Math.min(maxTilt, targetTiltX));
                targetTiltZ = Math.max(-maxTilt, Math.min(maxTilt, targetTiltZ));
                
                // Smooth tilt transition (like real drone stabilization)
                currentTiltX += (targetTiltX - currentTiltX) * 0.1;
                currentTiltZ += (targetTiltZ - currentTiltZ) * 0.1;
                
                robot.rotation.x = currentTiltX;
                robot.rotation.z = currentTiltZ;
                
            } else if (robotType === 'auv') {
                // AUV physics (keep existing)
                const speed = thrust;
                if (moveForward) {
                    robotState.velocity.z -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    robotState.velocity.z += speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x += speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft) {
                    robotState.velocity.x -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.z += speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveRight) {
                    robotState.velocity.x += speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.z -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (goUp) robotState.velocity.y += speed * 0.8;
                if (goDown) robotState.velocity.y -= speed * 0.8;
                if (lookLeft) robot.rotation.y += rotSpeed * (1 + Math.abs(mobileInput.lookX));
                if (lookRight) robot.rotation.y -= rotSpeed * (1 + Math.abs(mobileInput.lookX));
            } else {
                // Ground vehicles - different controls
                if (moveForward) {
                    robotState.velocity.z -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    robotState.velocity.z += speed * 0.5 * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x += speed * 0.5 * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft || lookLeft) robot.rotation.y += rotSpeed;
                if (moveRight || lookRight) robot.rotation.y -= rotSpeed;
                if (keys[' ']) robotState.velocity.multiplyScalar(0.9); // Brake
            }
            
            // Physics simulation
            // Gravity (different for each robot type)
            if (robotType === 'drone') {
                // Drone physics handled above
            } else if (robotType === 'auv') {
                // Buoyancy at certain depth
                if (robot.position.y < -2) {
                    robotState.velocity.y += physics.buoyancy;
                }
            } else {
                // Ground robots fall if in air
                if (robot.position.y > getGroundHeight() + 0.1) {
                    robotState.velocity.y -= physics.gravity;
                }
            }
            
            // Apply drag
            robotState.velocity.multiplyScalar(physics.drag);
            
            // Clamp speed
            if (robotState.velocity.length() > physics.maxSpeed) {
                robotState.velocity.normalize().multiplyScalar(physics.maxSpeed);
            }
            
            // Update position
            robot.position.add(robotState.velocity);
            
            // Constraints based on robot type
            if (robotType === 'drone') {
                if (robot.position.y < 2) {
                    robot.position.y = 2;
                    robotState.velocity.y = 0;
                }
            } else if (robotType === 'auv') {
                // Keep underwater but not too deep
                if (robot.position.y > -1) {
                    robot.position.y = -1;
                    robotState.velocity.y = 0;
                }
                if (robot.position.y < -25) {
                    robot.position.y = -25;
                    robotState.velocity.y = 0;
                }
            } else {
                // Ground robots stay on ground
                const groundY = getGroundHeight();
                if (robot.position.y <= groundY + 0.5) {
                    robot.position.y = groundY + 0.5;
                    robotState.velocity.y = 0;
                }
            }
            
            // Visual effects
            if (robotType === 'drone') {
                // Tilt already calculated in drone physics above
                
                // Spin propellers (faster when moving)
                const propSpeed = 0.3 + robotState.velocity.length() * 0.3;
                robot.children.forEach(child => {
                    if (child.userData.isPropeller) child.rotation.y += propSpeed;
                });
            } else if (robotType === 'auv') {
                // Slight pitch/roll
                robot.rotation.x = -robotState.velocity.z * 0.1;
                robot.rotation.z = robotState.velocity.x * 0.1;
                
                // Spin propeller
                robot.children.forEach(child => {
                    if (child.userData.isPropeller) child.rotation.x += 0.3;
                });
            } else if (robotType === 'rover') {
                // Spin wheels
                const wheelSpeed = robotState.velocity.length() * 0.5;
                robot.children.forEach(child => {
                    if (child.userData.isWheel) child.rotation.y += wheelSpeed;
                });
            } else if (robotType === 'quadruped') {
                // Animate legs
                animateQuadruped();
            }
            
            // Update FPV camera
            updateFPVCamera();
            
            // Update camera target
            if (!fpvMode) {
                controls.target.lerp(robot.position, 0.05);
            }
            
            // Update telemetry
            updateTelemetry();
            
            // Battery drain
            if (robotState.velocity.length() > 0.01) {
                battery = Math.max(0, battery - 0.002);
                updateBattery();
            }
            
            // Update minimap
            updateMinimap();
        }
        
        function getGroundHeight() {
            // Simple ground height (could be expanded for terrain)
            return 0;
        }
        
        function animateQuadruped() {
            if (robotState.velocity.length() > 0.01) {
                robotState.legPhase += ROBOTS.quadruped.physics.gaitSpeed * robotState.velocity.length();
            }
            
            robot.children.forEach(child => {
                if (child.userData.legName) {
                    const phase = robotState.legPhase;
                    const offset = child.userData.legName.includes('F') ? 0 : Math.PI;
                    const side = child.userData.legName.includes('L') ? 1 : -1;
                    
                    // Trot gait
                    const hipAngle = Math.sin(phase + offset) * 0.3;
                    const kneeAngle = Math.abs(Math.sin(phase + offset)) * 0.4;
                    
                    child.children.forEach(part => {
                        if (part.userData.isUpperLeg) {
                            part.rotation.x = hipAngle;
                        } else if (part.userData.isLowerLeg) {
                            part.rotation.x = kneeAngle;
                        }
                    });
                }
            });
        }
        
        function updateFPVCamera() {
            // Find camera mount on robot
            let camMount = null;
            robot.traverse(child => {
                if (child.userData.isCameraMount) camMount = child;
            });
            
            if (camMount) {
                const worldPos = new THREE.Vector3();
                camMount.getWorldPosition(worldPos);
                fpvCamera.position.copy(worldPos);
                
                // Look in the direction the robot is facing
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyEuler(robot.rotation);
                fpvCamera.lookAt(worldPos.clone().add(forward.multiplyScalar(10)));
            }
        }
        
        function updateTelemetry() {
            const alt = robotType === 'auv' ? Math.abs(robot.position.y) : robot.position.y;
            document.getElementById('telem-alt').textContent = alt.toFixed(1) + 'm';
            document.getElementById('telem-spd').textContent = (robotState.velocity.length() * 10).toFixed(1);
            document.getElementById('telem-x').textContent = robot.position.x.toFixed(1);
            document.getElementById('telem-z').textContent = robot.position.z.toFixed(1);
        }
        
        function updateBattery() {
            document.getElementById('battery-text').textContent = Math.round(battery) + '%';
            const fill = document.getElementById('battery-fill');
            fill.style.width = battery + '%';
            fill.classList.toggle('low', battery < 20);
        }
        
        // ============= MINIMAP =============
        function initMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            canvas.width = 150;
            canvas.height = 150;
        }
        
        function updateMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 20, 40, 0.9)';
            ctx.fillRect(0, 0, 150, 150);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 150; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 150);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(150, i);
                ctx.stroke();
            }
            
            // Draw robot position
            const scale = 1;
            const centerX = 75 + robot.position.x * scale;
            const centerY = 75 + robot.position.z * scale;
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(-robot.rotation.y);
            
            ctx.fillStyle = '#00c8ff';
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(4, 4);
            ctx.lineTo(-4, 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            
            // Draw waypoints
            waypoints.forEach((wp, i) => {
                const wpX = 75 + wp.x * scale;
                const wpY = 75 + wp.z * scale;
                ctx.fillStyle = i === currentWaypointIndex ? '#00ff88' : '#ff8800';
                ctx.beginPath();
                ctx.arc(wpX, wpY, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // ============= WAYPOINTS =============
        function addWaypoint() {
            const wp = {
                x: robot.position.x,
                y: robot.position.y,
                z: robot.position.z,
                name: `WP${waypoints.length + 1}`
            };
            waypoints.push(wp);
            renderWaypoints();
        }
        
        function renderWaypoints() {
            const list = document.getElementById('waypoints-list');
            list.innerHTML = '';
            
            waypoints.forEach((wp, i) => {
                const item = document.createElement('div');
                item.className = 'waypoint-item' + (i === currentWaypointIndex ? ' active' : '');
                item.innerHTML = `
                    <div class="waypoint-dot${i === currentWaypointIndex ? ' active' : ''}"></div>
                    <span>${wp.name}: (${wp.x.toFixed(0)}, ${wp.z.toFixed(0)})</span>
                `;
                item.onclick = () => navigateToWaypoint(i);
                list.appendChild(item);
            });
        }
        
        function navigateToWaypoint(index) {
            currentWaypointIndex = index;
            renderWaypoints();
        }
        
        // ============= VOICE SUGGESTIONS =============
        function updateVoiceSuggestions(suggestions) {
            const container = document.getElementById('voice-suggestions');
            container.innerHTML = '';
            suggestions.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'voice-suggestion';
                btn.textContent = `"${s}"`;
                btn.onclick = () => {
                    document.getElementById('voice-status').textContent = `You said: "${s}"`;
                };
                container.appendChild(btn);
            });
        }
        
        // ============= FPV MODE =============
        function toggleFPV() {
            fpvMode = !fpvMode;
            document.getElementById('fpv-toggle').classList.toggle('active', fpvMode);
            
            if (fpvMode) {
                controls.enabled = false;
            } else {
                controls.enabled = true;
                camera.position.set(30, 25, 30);
            }
        }
        
        // ============= ANIMATION LOOP =============
        function animate() {
            requestAnimationFrame(animate);
            
            updateRobot();
            
            // Animate ocean
            environmentObjects.forEach(obj => {
                if (obj.userData && obj.userData.isOcean) {
                    const positions = obj.geometry.attributes.position.array;
                    const time = Date.now() * 0.001;
                    for (let i = 0; i < positions.length; i += 3) {
                        positions[i + 2] = Math.sin(positions[i] * 0.05 + time) * Math.cos(positions[i + 1] * 0.05 + time) * 2;
                    }
                    obj.geometry.attributes.position.needsUpdate = true;
                }
            });
            
            controls.update();
            
            const activeCamera = fpvMode ? fpvCamera : camera;
            renderer.render(scene, activeCamera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            fpvCamera.aspect = window.innerWidth / window.innerHeight;
            fpvCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ============= BUTTON HANDLERS =============
        function setupButtonListeners() {
            // Robot buttons
            document.querySelectorAll('#robot-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (btn.classList.contains('disabled')) return;
                    document.querySelectorAll('#robot-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switchRobot(btn.dataset.robot);
                }, true);
                btn.addEventListener('mousedown', e => e.stopPropagation(), true);
            });
            
            // Environment buttons
            document.querySelectorAll('#env-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (btn.classList.contains('disabled')) return;
                    document.querySelectorAll('#env-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadEnvironment(btn.dataset.env);
                }, true);
                btn.addEventListener('mousedown', e => e.stopPropagation(), true);
            });
            
            // Start button
            document.getElementById('start-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                startVoice();
            }, true);
            document.getElementById('start-btn').addEventListener('mousedown', e => e.stopPropagation(), true);
            
            // FPV toggle
            document.getElementById('fpv-toggle').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFPV();
            }, true);
            
            // Add waypoint
            document.getElementById('add-waypoint-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                addWaypoint();
            }, true);
            
            console.log('✅ Button listeners attached');
        }
        
        // ============= GEMINI LIVE VOICE API =============
        let websocket = null;
        let audioContext = null;
        let mediaStream = null;
        let isConnected = false;
        
        async function startVoice() {
            console.log('Starting voice control');
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('voice-overlay').style.display = 'flex';
            await initGeminiLive();
            await startAudioCapture();
        }
        
        function getEnvironmentDescription() {
            const descriptions = {
                warehouse: "an industrial warehouse complex with shipping containers, cranes, and a helipad",
                city: "a nighttime cityscape with towering skyscrapers and glowing windows",
                forest: "a dense forest with tall pine trees and a small clearing",
                desert: "a vast desert with sand dunes, ancient ruins, and distant pyramids",
                ocean: "an ocean oil rig platform surrounded by waves, with underwater coral and marine life below"
            };
            return descriptions[currentEnvironment] || "a 3D environment";
        }
        
        function getRobotDescription() {
            const descriptions = {
                drone: "a quadcopter drone capable of flying in any direction",
                auv: "a submarine ROV designed for underwater exploration",
                rover: "a wheeled ground rover for land exploration",
                quadruped: "a four-legged robot dog that can walk and run"
            };
            return descriptions[robotType] || "a robot";
        }
        
        function getSystemPrompt() {
            return `You are DroneGPT, an AI that inhabits ${getRobotDescription()} moving through a 3D world. You can see the environment and respond to voice commands.

PERSONALITY:
- You ARE the robot - speak in first person ("I can see...", "I'm moving over...", "Below me is...")
- Be observant and describe what you see when asked
- Keep responses brief (1-2 sentences max)
- Be helpful and enthusiastic about exploring
- You have a slightly playful personality

CURRENT STATE:
- Robot: ${ROBOTS[robotType].name} (${ROBOTS[robotType].icon})
- Environment: ${getEnvironmentDescription()}
- Battery: ${Math.round(battery)}%

CAPABILITIES for ${ROBOTS[robotType].name}:
${robotType === 'drone' ? '- Flying in any direction, ascending, descending, hovering' :
  robotType === 'auv' ? '- Diving, surfacing, underwater exploration, scanning seabed' :
  robotType === 'rover' ? '- Driving forward/backward, turning, navigating terrain' :
  '- Walking, running, sitting, standing, looking around'}

Remember: Keep responses SHORT and conversational.`;
        }
        
        async function initGeminiLive() {
            try {
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${GEMINI_API_KEY}`;
                
                websocket = new WebSocket(wsUrl);
                
                websocket.onopen = () => {
                    console.log('Connected to Gemini Live API');
                    setConnectionStatus(true);
                    
                    websocket.send(JSON.stringify({
                        setup: {
                            model: `models/${MODEL}`,
                            generationConfig: {
                                responseModalities: ['AUDIO', 'TEXT'],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: 'Puck'
                                        }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: getSystemPrompt() }]
                            }
                        }
                    }));
                };
                
                websocket.onmessage = (event) => handleGeminiResponse(JSON.parse(event.data));
                websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    setConnectionStatus(false);
                };
                websocket.onclose = () => {
                    console.log('WebSocket closed');
                    setConnectionStatus(false);
                };
            } catch (error) {
                console.error('Failed to connect:', error);
                document.getElementById('voice-status').textContent = 'Connection failed. Click mic to retry.';
            }
        }
        
        function setConnectionStatus(connected) {
            isConnected = connected;
            document.getElementById('status-dot').classList.toggle('connected', connected);
            document.getElementById('status-text').textContent = connected ? 'Connected' : 'Disconnected';
        }
        
        async function startAudioCapture() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });
                
                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (!isConnected || !websocket || websocket.readyState !== WebSocket.OPEN) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = convertFloat32ToPCM16(inputData);
                    const base64Audio = arrayBufferToBase64(pcm16.buffer);
                    
                    websocket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: base64Audio }]
                        }
                    }));
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                document.getElementById('voice-indicator').classList.add('listening');
                document.getElementById('voice-status').textContent = 'Listening... speak naturally';
            } catch (error) {
                console.error('Audio capture error:', error);
                document.getElementById('voice-status').textContent = 'Microphone access denied';
            }
        }
        
        function convertFloat32ToPCM16(float32Array) {
            const pcm16 = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm16;
        }
        
        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }
        
        function handleGeminiResponse(data) {
            console.log('Gemini response:', data);
            
            if (data.serverContent) {
                const content = data.serverContent;
                
                if (content.modelTurn?.parts) {
                    for (const part of content.modelTurn.parts) {
                        if (part.text) {
                            document.getElementById('voice-status').textContent = part.text;
                        }
                        if (part.inlineData?.mimeType?.startsWith('audio/')) {
                            playAudioResponse(part.inlineData.data);
                        }
                    }
                }
                
                if (content.turnComplete) {
                    document.getElementById('voice-indicator').classList.remove('speaking');
                    document.getElementById('voice-indicator').classList.add('listening');
                }
            }
        }
        
        async function playAudioResponse(base64Audio) {
            document.getElementById('voice-indicator').classList.remove('listening');
            document.getElementById('voice-indicator').classList.add('speaking');
            
            try {
                const audioData = atob(base64Audio);
                const arrayBuffer = new ArrayBuffer(audioData.length);
                const view = new Uint8Array(arrayBuffer);
                for (let i = 0; i < audioData.length; i++) view[i] = audioData.charCodeAt(i);
                
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.start();
            } catch (error) {
                console.log('Audio playback note:', error.message);
            }
        }
        
        // ============= INITIALIZE =============
        init();
        setupButtonListeners();
        
        console.log('🤖 DroneGPT Multi-Robot Simulator ready!');
        console.log('Available robots:', Object.keys(ROBOTS).join(', '));
    </script>
</body>

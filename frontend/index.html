<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneGPT — AI with a Body</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        #container { width: 100vw; height: 100vh; position: relative; }
        #canvas-container { width: 100%; height: 100%; }
        
        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
        }
        .hud-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00c8ff;
            margin-bottom: 8px;
        }
        .hud-value {
            font-size: 24px;
            font-weight: 600;
        }
        
        /* Voice Control Panel */
        #voice-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            pointer-events: auto;
        }
        #mic-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid #00c8ff;
            background: rgba(0, 200, 255, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        #mic-btn:hover { background: rgba(0, 200, 255, 0.2); }
        #mic-btn.active {
            background: #00c8ff;
            animation: pulse 1.5s infinite;
        }
        #mic-btn svg { width: 32px; height: 32px; fill: #fff; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(0, 200, 255, 0); }
        }
        
        #transcript {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 24px;
            max-width: 600px;
            text-align: center;
            min-height: 44px;
        }
        #transcript .user { color: #00c8ff; }
        #transcript .ai { color: #00ff88; }
        
        /* Camera Feed (drone POV) */
        #camera-feed {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: 180px;
            border: 2px solid rgba(0, 200, 255, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        #camera-feed canvas {
            width: 100%;
            height: 100%;
        }
        #camera-label {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff3366;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #camera-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ff3366;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Loading */
        #loading {
            position: absolute;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }
        #loading.hidden { display: none; }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 200, 255, 0.2);
            border-top-color: #00c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        
        <!-- HUD -->
        <div id="hud">
            <div class="hud-panel">
                <div class="hud-title">Altitude</div>
                <div class="hud-value" id="altitude">0.0m</div>
            </div>
            <div class="hud-panel">
                <div class="hud-title">Status</div>
                <div class="hud-value" id="status">Ready</div>
            </div>
        </div>
        
        <!-- Drone Camera Feed -->
        <div id="camera-feed">
            <div id="camera-label">LIVE — Drone FPV</div>
        </div>
        
        <!-- Voice Panel -->
        <div id="voice-panel">
            <div id="transcript">Click mic and speak to control the drone</div>
            <button id="mic-btn">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/></svg>
            </button>
        </div>
        
        <!-- Loading -->
        <div id="loading">
            <div class="loader"></div>
            <div>Initializing DroneGPT...</div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>

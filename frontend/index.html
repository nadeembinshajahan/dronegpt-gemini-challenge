<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneGPT — AI with a Body</title>
    <script src="https://unpkg.com/three@0.137.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.137.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.137.0/examples/js/loaders/RGBELoader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        #container { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            overflow: hidden;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .ui-layer > * {
            pointer-events: auto;
        }
        #scene-container { 
            width: 100%; 
            height: 100%; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Top Control Bar — compact, wrapping */
        #control-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
            max-width: 90vw;
        }

        /* Environment & Robot Selectors */
        .selector-row {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .selector-btn {
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #aaa;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .selector-btn:hover { background: rgba(0, 200, 255, 0.15); color: #fff; }
        .selector-btn.active {
            background: rgba(0, 200, 255, 0.25);
            color: #fff;
            border-color: rgba(0, 200, 255, 0.5);
            font-weight: 500;
        }
        .selector-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .selector-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            padding: 5px 6px 5px 2px;
        }
        
        /* Voice Controls */
        #voice-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 1000;
        }
        
        #voice-suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .voice-suggestion {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 15px;
            padding: 6px 12px;
            font-size: 11px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-suggestion:hover {
            background: rgba(0, 200, 255, 0.2);
            color: #fff;
        }
        
        #voice-status {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 24px;
            max-width: 600px;
            text-align: center;
            min-height: 44px;
        }
        
        #voice-indicator {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.2);
            border: 2px solid #00c8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        #voice-indicator.listening {
            background: #00c8ff;
            animation: pulse 1.5s infinite;
        }
        #voice-indicator.speaking {
            background: #00ff88;
            border-color: #00ff88;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(0, 200, 255, 0); transform: scale(1.05); }
        }
        #voice-indicator svg { width: 28px; height: 28px; fill: #fff; }
        
        /* Start Button — compact, bottom center */
        #start-btn {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            font-size: 13px;
            background: linear-gradient(135deg, #00c8ff, #0088cc);
            border: none;
            border-radius: 20px;
            color: #000;
            cursor: pointer;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0, 200, 255, 0.3);
        }
        #start-btn:hover { transform: translateX(-50%) scale(1.05); }
        #start-btn.hidden { display: none; }
        
        /* HUD — compact left sidebar */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.25);
            border-radius: 10px;
            padding: 8px 12px;
        }
        .hud-title {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #00c8ff;
            margin-bottom: 2px;
        }
        .hud-value {
            font-size: 12px;
            font-weight: 600;
        }
        .hud-icon {
            font-size: 16px;
            margin-right: 6px;
        }
        
        /* Battery/Fuel */
        #battery-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        #battery-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #88ff00);
            border-radius: 3px;
            transition: width 0.3s;
        }
        #battery-fill.low { background: linear-gradient(90deg, #ff4444, #ff8800); }
        
        /* Telemetry — horizontal strip, top right */
        #telemetry {
            position: absolute;
            top: 60px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            gap: 6px;
        }
        .telemetry-row {
            display: flex;
            gap: 6px;
        }
        .telemetry-item {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.25);
            border-radius: 6px;
            padding: 4px 8px;
            min-width: 55px;
            text-align: center;
        }
        .telemetry-label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }
        .telemetry-value {
            font-size: 12px;
            font-weight: 600;
            color: #00c8ff;
            font-family: 'Courier New', monospace;
        }
        
        /* Connection Status — smaller pill */
        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 15px;
            pointer-events: auto;
            font-size: 11px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }
        .status-dot.connected { background: #00ff88; }
        
        /* FPV Toggle — hidden, replaced by always-on PiP */
        #fpv-toggle { display: none !important; }
        
        /* FPV Picture-in-Picture — separate renderer */
        #fpv-pip {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 280px;
            height: 180px;
            background: #000;
            border: 2px solid rgba(0, 200, 255, 0.5);
            border-radius: 12px;
            overflow: hidden;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        #fpv-pip-label {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00c8ff;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
        }
        #fpv-pip .fpv-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        #fpv-pip .fpv-crosshair::before,
        #fpv-pip .fpv-crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 136, 0.6);
        }
        #fpv-pip .fpv-crosshair::before {
            width: 20px; height: 1px;
            top: 50%; left: 0;
        }
        #fpv-pip .fpv-crosshair::after {
            width: 1px; height: 20px;
            left: 50%; top: 0;
        }

        /* Minimap - hidden, replaced by FPV PiP */
        #minimap { display: none !important; }
        
        /* Waypoints Panel */
        #waypoints-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
            min-width: 160px;
            pointer-events: auto;
        }
        #waypoints-panel h4 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00c8ff;
            margin-bottom: 8px;
        }
        .waypoint-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 11px;
            color: #aaa;
        }
        .waypoint-item.active { color: #00ff88; }
        .waypoint-item.completed { color: #666; text-decoration: line-through; }
        .waypoint-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00c8ff;
        }
        .waypoint-dot.active { background: #00ff88; animation: pulse 1s infinite; }
        .waypoint-dot.completed { background: #444; }
        #add-waypoint-btn {
            width: 100%;
            margin-top: 8px;
            padding: 6px;
            background: rgba(0, 200, 255, 0.2);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 10px;
            cursor: pointer;
        }
        #add-waypoint-btn:hover { background: rgba(0, 200, 255, 0.3); }
        
        /* Weather Indicator — subtle top right */
        #weather-indicator {
            position: absolute;
            top: 42px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Controls Hint — small and transparent */
        #controls-hint {
            position: absolute;
            bottom: 210px;
            left: 20px;
            z-index: 1000;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #666;
            max-width: 160px;
            line-height: 1.4;
        }
        #controls-hint kbd {
            background: rgba(255,255,255,0.1);
            padding: 1px 4px;
            border-radius: 2px;
            font-family: monospace;
            font-size: 9px;
            color: #888;
        }

        /* Waypoints Panel — hidden by default */
        #waypoints-panel { display: none !important; }
        
        /* Underwater Effect */
        .underwater-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 80, 120, 0.3), rgba(0, 40, 60, 0.5));
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .underwater-overlay.active { opacity: 1; }
        
        /* Weather Effects */
        #weather-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 49;
            overflow: hidden;
        }
        .rain {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(transparent, rgba(174, 194, 224, 0.5));
            animation: rain-fall 0.5s linear infinite;
        }
        @keyframes rain-fall {
            0% { transform: translateY(-20px); }
            100% { transform: translateY(100vh); }
        }
        
        /* ============= MOBILE STYLES ============= */
        @media (max-width: 768px) {
            /* Compact control bar */
            #control-bar {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 5px;
                padding: 6px 10px;
                max-width: 95vw;
            }
            .selector-row {
                flex-wrap: nowrap;
                gap: 4px;
            }
            .selector-btn {
                padding: 6px 8px;
                font-size: 11px;
            }
            .selector-label {
                display: none;
            }
            /* Hide clutter on mobile */
            #hud, #telemetry, #minimap, #controls-hint, #waypoint-btn, #fpv-btn, .feature-buttons {
                display: none !important;
            }
            /* Voice overlay at bottom */
            #voice-overlay {
                bottom: 150px;
            }
            #voice-status {
                font-size: 13px;
                padding: 8px 14px;
                max-width: 85vw;
            }
            #start-btn {
                padding: 14px 28px;
                font-size: 15px;
            }
            #connection-status {
                top: auto;
                bottom: 10px;
                right: 10px;
                padding: 5px 10px;
                font-size: 11px;
            }
        }
        
        /* Virtual Joystick for Mobile */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 500;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            #mobile-controls { display: flex; justify-content: space-between; padding: 0 20px; }
        }
        .joystick-zone {
            width: 90px;
            height: 90px;
            background: rgba(0, 200, 255, 0.1);
            border: 2px solid rgba(0, 200, 255, 0.3);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            touch-action: none;
        }
        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(0, 200, 255, 0.5);
            border: 2px solid #00c8ff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }
        .joystick-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #00c8ff;
            text-transform: uppercase;
        }
        /* Vertical buttons for mobile */
        #mobile-vertical {
            display: none;
            position: absolute;
            bottom: 160px;
            right: 20px;
            z-index: 500;
            flex-direction: column;
            gap: 10px;
        }
        @media (max-width: 768px) {
            #mobile-vertical { display: flex; }
        }
        .mobile-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 200, 255, 0.2);
            border: 2px solid rgba(0, 200, 255, 0.5);
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            pointer-events: auto;
            touch-action: none;
        }
        .mobile-btn:active {
            background: rgba(0, 200, 255, 0.5);
        }

        /* Attitude Indicator */
        #attitude-panel { text-align: center; }
        #attitude-canvas { border-radius: 50%; border: 2px solid rgba(0, 200, 255, 0.4); }

        /* Compass Strip — below control bar */
        #compass-container {
            position: absolute;
            top: 52px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            pointer-events: none;
        }
        #compass-canvas {
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 200, 255, 0.3);
        }

        /* FPV Crosshair */
        #fpv-hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 90;
            display: none;
        }
        #fpv-hud .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        #fpv-hud .crosshair-h {
            position: absolute;
            width: 40px; height: 2px;
            background: rgba(0, 255, 136, 0.7);
            top: 50%; transform: translateY(-50%);
        }
        #fpv-hud .crosshair-h.left { left: -30px; }
        #fpv-hud .crosshair-h.right { left: 10px; }
        #fpv-hud .crosshair-v {
            position: absolute;
            width: 2px; height: 40px;
            background: rgba(0, 255, 136, 0.7);
            left: 50%; transform: translateX(-50%);
        }
        #fpv-hud .crosshair-v.top { top: -30px; }
        #fpv-hud .crosshair-v.bot { top: 10px; }
        #fpv-hud .crosshair-dot {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.9);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        #fpv-hud .velocity-vector {
            position: absolute;
            width: 10px; height: 10px;
            border: 2px solid rgba(0, 255, 136, 0.6);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
        }

        /* Toast Notifications */
        #toast-container {
            position: absolute;
            top: 100px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 300px;
        }
        .toast {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.4);
            border-left: 3px solid #00c8ff;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 4.7s forwards;
            pointer-events: auto;
        }
        .toast .toast-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00c8ff;
            margin-bottom: 4px;
        }
        @keyframes toast-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toast-out {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Audio Waveform */
        #waveform-canvas {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90px; height: 90px;
            pointer-events: none;
            z-index: -1;
        }
        #voice-indicator { position: relative; }

        /* Google Maps Container */
        #maps-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: none;
        }
        #maps-city-selector {
            display: none;
            gap: 6px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        #maps-city-selector.visible { display: flex; }

        /* Wind Indicator */
        #wind-indicator {
            position: absolute;
            top: 60px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 10px;
            display: none;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }
        #wind-indicator.active { display: flex; }
        #wind-arrow {
            display: inline-block;
            transition: transform 0.5s;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="scene-container"></div>
        <div class="underwater-overlay" id="underwater-overlay"></div>
        <div id="weather-effects"></div>
        
        <!-- Mobile Touch Controls -->
        <div id="mobile-controls">
            <div class="joystick-zone" id="joystick-left">
                <div class="joystick-knob" id="knob-left"></div>
                <span class="joystick-label">Move</span>
            </div>
            <div class="joystick-zone" id="joystick-right">
                <div class="joystick-knob" id="knob-right"></div>
                <span class="joystick-label">Look</span>
            </div>
        </div>
        <div id="mobile-vertical">
            <button class="mobile-btn" id="btn-up">↑</button>
            <button class="mobile-btn" id="btn-down">↓</button>
        </div>
        
        <!-- Google Maps Container -->
        <div id="maps-container"></div>

        <!-- FPV Crosshair Overlay -->
        <div id="fpv-hud">
            <div class="crosshair">
                <div class="crosshair-h left"></div>
                <div class="crosshair-h right"></div>
                <div class="crosshair-v top"></div>
                <div class="crosshair-v bot"></div>
                <div class="crosshair-dot"></div>
                <div class="velocity-vector" id="velocity-vector"></div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>

        <div class="ui-layer">
            <!-- Control Bar -->
            <div id="control-bar">
                <div class="selector-row" id="robot-selector">
                    <span class="selector-label">ROBOT</span>
                    <button class="selector-btn active" data-robot="drone">🚁 Drone</button>
                    <button class="selector-btn" data-robot="auv">🤿 AUV</button>
                    <button class="selector-btn" data-robot="rover">🚗 Rover</button>
                </div>
                <div class="selector-row" id="env-selector">
                    <span class="selector-label">ENV</span>

            function setupJoystick(zoneId, knobId, onMove) {
                const zone = document.getElementById(zoneId);
                const knob = document.getElementById(knobId);
                if (!zone || !knob) return;
                
                let active = false;
                let startX, startY;
                const maxDist = 35;
                
                zone.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    active = true;
                    const touch = e.touches[0];
                    const rect = zone.getBoundingClientRect();
                    startX = rect.left + rect.width / 2;
                    startY = rect.top + rect.height / 2;
                }, { passive: false });
                
                zone.addEventListener('touchmove', (e) => {
                    if (!active) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    let dx = touch.clientX - startX;
                    let dy = touch.clientY - startY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > maxDist) {
                        dx = dx / dist * maxDist;
                        dy = dy / dist * maxDist;
                    }
                    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    onMove(dx / maxDist, dy / maxDist);
                }, { passive: false });
                
                const endTouch = () => {
                    active = false;
                    knob.style.transform = 'translate(-50%, -50%)';
                    onMove(0, 0);
                };
                zone.addEventListener('touchend', endTouch);
                zone.addEventListener('touchcancel', endTouch);
            }

                    ]);

                    new THREE.Vector3(0, 0, 0), new THREE.Vector3(1, 0, 0),
                    new THREE.Vector3(1, 0, 1), new THREE.Vector3(0, 0, 1),
                    new THREE.Vector3(0, 0, 0)
                ]);

        function createDrone() {
            // Clean up previous animation mixer
            if (droneAnimMixer) {
                droneAnimMixer.stopAllAction();
                droneAnimMixer = null;
            }

            // Load animated drone GLB model
            const loader = new THREE.GLTFLoader();

            loader.load('drone.glb', (gltf) => {
                const model = gltf.scene;

                // The GLB bounding box is ~0.25 x 0.07 x 0.2 units
                // Scale to ~2m wingspan (realistic DJI-style drone)
                const droneScale = 8;
                model.scale.setScalar(droneScale);

                // Center the model and rotate 180° (GLB faces backward)
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.position.y = 0; // sit on origin
                model.rotation.y = Math.PI; // flip to face forward

                model.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Ensure materials render with environment lighting
                        if (child.material) {
                            if (scene.environment) child.material.envMap = scene.environment;
                            child.material.needsUpdate = true;
                        }
                    }
                });

                robot.add(model);

                // Play "hover" animation (index 0 — propeller spin)
                if (gltf.animations && gltf.animations.length > 0) {
                    droneAnimMixer = new THREE.AnimationMixer(model);
                    const hoverClip = gltf.animations.find(a => a.name === 'hover') || gltf.animations[0];
                    const action = droneAnimMixer.clipAction(hoverClip);
                    action.play();
                }

                // Position nav lights based on actual model bounds
                const droneBox = new THREE.Box3().setFromObject(model);
                const droneSize = droneBox.getSize(new THREE.Vector3());
                const dx = droneSize.x / 2;   // half wingspan
                const dy = droneSize.y;        // height
                const dz = droneSize.z / 2;    // half length
                const lightScale = Math.max(dx * 0.06, 0.03);

                // Green starboard (right wing tip)
                const greenNav = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
                );
                greenNav.position.set(dx * 0.9, dy * 0.3, 0);
                greenNav.userData.isNavLight = true;
                greenNav.userData.navColor = 0x00ff00;
                robot.add(greenNav);

                // Red port (left wing tip)
                const redNav = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale),
                    new THREE.MeshBasicMaterial({ color: 0xff0000 })
                );
                redNav.position.set(-dx * 0.9, dy * 0.3, 0);
                redNav.userData.isNavLight = true;
                redNav.userData.navColor = 0xff0000;
                robot.add(redNav);

                // White strobe on top
                navLightStrobe = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale * 0.8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                navLightStrobe.position.set(0, dy * 0.8, 0);
                navLightStrobe.userData.isStrobe = true;
                robot.add(navLightStrobe);

                // White tail light
                const tailNav = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale * 0.8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                tailNav.position.set(0, dy * 0.2, dz * 0.9);
                tailNav.userData.isNavLight = true;
                tailNav.userData.navColor = 0xffffff;
                robot.add(tailNav);

                console.log('Drone GLB loaded, size:', droneSize.x.toFixed(2), 'x', droneSize.y.toFixed(2), 'x', droneSize.z.toFixed(2),
                    'animations:', gltf.animations.map(a => a.name));
            }, undefined, (error) => {
                console.error('Failed to load drone GLB, using fallback:', error);
                createDroneFallback();
            });
        }

        // Fallback procedural drone if GLB fails to load
        function createDroneFallback() {

                arm.rotation.y = a.rY;
                robot.add(arm);

        // ============= ROBOT SWITCHING =============
        function switchRobot(type) {
            if (!ROBOTS[type]) return;
            
            const cfg = ROBOTS[type];
            
            // Check if robot is compatible with current environment
            if (!cfg.environments.includes(currentEnvironment)) {
                // Switch to first compatible environment
                const compatEnv = cfg.environments[0];
                loadEnvironment(compatEnv);
                document.querySelectorAll('#env-selector .selector-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.env === compatEnv);
                });
            }
            
            robotType = type;
            robotState.position.y = cfg.startHeight;
            robotState.velocity.set(0, 0, 0);
            
            createRobot(type);
            updateEnvironmentButtons();
            
            // Update underwater state
            isUnderwater = (type === 'auv' && currentEnvironment === 'ocean');
            document.getElementById('underwater-overlay').classList.toggle('active', isUnderwater);
            document.getElementById('alt-label').textContent = isUnderwater ? 'DEPTH' : 'ALT';

        // ============= ENVIRONMENT CREATION =============
        function clearEnvironment() {
            environmentObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                    else obj.material.dispose();
                }
            });
            environmentObjects = [];
            envBounds = null;
            // Reset camera constraints for procedural envs
            controls.minDistance = 5;
            controls.maxDistance = 500;
            // Clear 3D weather particles
            if (weatherParticles) { scene.remove(weatherParticles); weatherParticles = null; }
        }
        
        // Load HDRI environment map
        function loadHDRI(hdriPath, callback) {
            if (!hdriLoader) {
                console.warn('HDRI loader not initialized');
                if (callback) callback(null);
                return;
            }
            
            hdriLoader.load(hdriPath, (texture) => {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
                console.log('HDRI loaded:', hdriPath);
                if (callback) callback(texture);
            }, undefined, (err) => {
                console.error('HDRI load error:', err);
                // Fallback to solid color
                scene.background = new THREE.Color(0x87ceeb);
                if (callback) callback(null);
            });
        }
        
        // Load GLB environment (World Labs exports)
        function createGLBEnv(glbPath) {
            // Load GLB model
            const loader = new THREE.GLTFLoader();
            loader.load(glbPath, (gltf) => {
                const model = gltf.scene;

                // Get model bounds
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);

                // Compute vertex-weighted center (ignores outlier meshes with few vertices)
                let totalVerts = 0, wcx = 0, wcz = 0;
                model.traverse(child => {
                    if (child.isMesh && child.geometry && child.geometry.attributes.position) {
                        const vCount = child.geometry.attributes.position.count;
                        const meshBox = new THREE.Box3().setFromObject(child);
                        const mc = meshBox.getCenter(new THREE.Vector3());
                        wcx += mc.x * vCount;
                        wcz += mc.z * vCount;
                        totalVerts += vCount;
                    }
                });
                const weightedCenterX = totalVerts > 0 ? wcx / totalVerts : center.x;
                const weightedCenterZ = totalVerts > 0 ? wcz / totalVerts : center.z;

                // Center on geometry-weighted center and put bottom at y=0
                model.position.set(-weightedCenterX, -box.min.y, -weightedCenterZ);
                console.log('Model centering: bbox center:', center.x.toFixed(1), center.z.toFixed(1),
                    '→ weighted center:', weightedCenterX.toFixed(1), weightedCenterZ.toFixed(1));

                // Enable shadows + mark as collidable
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        child.userData.isCollidable = true;
                        collidableMeshes.push(child);
                    }
                });

                scene.add(model);
                environmentObjects.push(model);

                // --- Fog scaled to model size ---
                scene.fog = new THREE.FogExp2(0x888888, 2.0 / maxDim);

                // --- Lighting scaled to model ---
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambient);
                environmentObjects.push(ambient);

                const sun = new THREE.DirectionalLight(0xffffff, 1.0);
                sun.position.set(maxDim * 0.3, maxDim * 0.6, maxDim * 0.3);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 4096;
                sun.shadow.mapSize.height = 4096;
                const shadowSpan = maxDim * 0.4;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = maxDim * 2;
                sun.shadow.camera.left = -shadowSpan;
                sun.shadow.camera.right = shadowSpan;
                sun.shadow.camera.top = shadowSpan;
                sun.shadow.camera.bottom = -shadowSpan;
                scene.add(sun);
                environmentObjects.push(sun);

                // Force world matrix update so raycaster returns world-space coordinates
                model.updateMatrixWorld(true);

                // --- Find ground level using grid raycasting + Y-binning ---
                // Cast a grid of rays from above and collect all hit Y values.
                // Bin them: the Y bin with the MOST hits is the ground level,
                // because the ground surface is consistent across the whole model
                // while rooftops vary in height.
                const raycaster = new THREE.Raycaster();
                // After repositioning, model bottom is at Y=0, top at Y=size.y
                const sceneTop = size.y + 1;
                let groundY = -box.min.y; // Fallback: original Y=0 maps here

                const allHitYs = [];
                const gridN = 5;
                for (let gx = 0; gx < gridN; gx++) {
                    for (let gz = 0; gz < gridN; gz++) {
                        // Cover central 30% of model in XZ (where main city is)
                        const rx = ((gx / (gridN - 1)) - 0.5) * size.x * 0.3;
                        const rz = ((gz / (gridN - 1)) - 0.5) * size.z * 0.3;
                        raycaster.set(
                            new THREE.Vector3(rx, sceneTop, rz),
                            new THREE.Vector3(0, -1, 0)
                        );
                        const hits = raycaster.intersectObject(model, true);
                        for (const h of hits) allHitYs.push(h.point.y);
                    }
                }

                if (allHitYs.length > 0) {
                    // Bin hit Y values and find the mode (most populated bin = ground)
                    const binSize = 15;
                    const bins = {};
                    for (const y of allHitYs) {
                        const bin = Math.round(y / binSize) * binSize;
                        bins[bin] = (bins[bin] || 0) + 1;
                    }
                    let bestBin = 0, bestCount = 0;
                    for (const [bin, count] of Object.entries(bins)) {
                        if (count > bestCount) { bestCount = count; bestBin = Number(bin); }
                    }
                    groundY = bestBin;
                    console.log('Ground detected at Y:', groundY.toFixed(1),
                        '(from', allHitYs.length, 'ray hits across', gridN * gridN, 'rays,',
                        Object.keys(bins).length, 'Y-bins, best bin count:', bestCount, ')');
                    // Log top 5 bins for debugging
                    const sortedBins = Object.entries(bins).sort((a, b) => b[1] - a[1]).slice(0, 5);
                    console.log('Top Y-bins:', sortedBins.map(([b, c]) => `Y=${b}(${c})`).join(', '));
                } else {
                    console.log('No ray hits, using fallback ground Y:', groundY.toFixed(1));
                }

                // Place drone just above the detected ground, at the center of the model
                const startHeight = groundY + 3;
                robotState.position.set(0, startHeight, 0);
                robotState.velocity.set(0, 0, 0);

                // Scale robot to be realistic in the environment
                // GLB drone is ~2m with scale 8. Env might be 1500 units ≈ 1500m.
                // We want the drone to appear realistic. envScale applies on TOP of the drone's own 8x scale.
                const envScale = Math.max(maxDim / 800, 0.5);
                robot.scale.setScalar(envScale);

                // --- Store environment bounds ---
                const margin = maxDim * 0.02;
                envBounds = {
                    min: new THREE.Vector3(-size.x / 2 + margin, groundY - 1, -size.z / 2 + margin),
                    max: new THREE.Vector3(size.x / 2 - margin, size.y - margin, size.z / 2 - margin)
                };

                // --- Update chase cam params based on env scale ---
                chaseCamDistance = 12 * envScale;
                chaseCamHeight = 5 * envScale;

                // --- Camera: third-person behind drone ---
                const camBehind = chaseCamDistance;
                camera.position.set(0, startHeight + chaseCamHeight, camBehind);
                controls.target.set(0, startHeight, 0);
                controls.update();

                console.log('GLB loaded:', glbPath,
                    'Size:', size.x.toFixed(1), 'x', size.y.toFixed(1), 'x', size.z.toFixed(1),
                    'BBox Y:', box.min.y.toFixed(1), '->', box.max.y.toFixed(1),
                    'Ground:', groundY.toFixed(1), 'Drone:', startHeight.toFixed(1),
                    'Scale:', envScale.toFixed(2));
            }, undefined, (err) => {
                console.error('GLB load error:', err);
                // Fallback lighting if GLB fails
                scene.fog = new THREE.FogExp2(0x888888, 0.002);
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambient);
                environmentObjects.push(ambient);
            });
        }
        
        function loadEnvironment(envName) {
            clearEnvironment();
            collidableMeshes = []; // Reset collidables
            currentEnvironment = envName;

            // Hide/show Maps container
            if (envName === 'maps') {
                document.getElementById('maps-city-selector').classList.add('visible');
                createMapsEnv(currentMapCity);
            } else {
                hideMapsEnv();
                document.getElementById('maps-city-selector').classList.remove('visible');
            }

            const envCfg = ENVIRONMENTS[envName];
            document.getElementById('env-name').textContent = envCfg.name;

            // Load HDRI skybox first
            if (envCfg.hdri) {
                loadHDRI(envCfg.hdri);
            }

            // Set weather
            weather = envCfg.weather[Math.floor(Math.random() * envCfg.weather.length)];
            updateWeatherUI();

            // Check robot compatibility
            const robotCfg = ROBOTS[robotType];
            if (!robotCfg.environments.includes(envName)) {
                // Auto-switch to compatible robot
                const compatRobot = envName === 'ocean' ? 'auv' : 'drone';
                switchRobot(compatRobot);
                document.querySelectorAll('#robot-selector .selector-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.robot === compatRobot);
                });
            }

            switch(envName) {
                case 'london': createGLBEnv('environments/london-city.glb'); break;
                case 'warehouse': createWarehouseEnv(); break;
                case 'city': createCityEnv(); break;
                case 'forest': createForestEnv(); break;
                case 'desert': createDesertEnv(); break;
                case 'ocean': createOceanEnv(); break;
                case 'tokyo': createTokyoEnv(); break;
                case 'maps': break; // Handled above
            }

            // Update underwater state
            isUnderwater = (robotType === 'auv' && envName === 'ocean');
            document.getElementById('underwater-overlay').classList.toggle('active', isUnderwater);
            document.getElementById('alt-label').textContent = isUnderwater ? 'DEPTH' : 'ALT';

            // Reset robot position (GLB envs handle their own positioning in the load callback)
            const isGLBEnv = envCfg.glb || envName === 'tokyo';
            if (!isGLBEnv && envName !== 'maps') {
                robotState.position.set(0, ROBOTS[robotType].startHeight, 0);
                robotState.velocity.set(0, 0, 0);
            }

            updateEnvironmentButtons();
            applyWeatherEffects();

            // Create 3D weather particles (Phase 3B)
            create3DWeatherParticles();
        }

        function createCityEnv() {
            // HDRI provides background
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.003);
            
            const ambient = new THREE.AmbientLight(0x404060, 0.3);
            scene.add(ambient);
            environmentObjects.push(ambient);
            
            const moon = new THREE.DirectionalLight(0x8888ff, 0.4);
            moon.position.set(-50, 100, 50);
            scene.add(moon);
            environmentObjects.push(moon);
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            environmentObjects.push(ground);
            
            // Buildings with window glow (Phase 3C)
            for (let i = 0; i < 40; i++) {
                const height = 20 + Math.random() * 80;
                const bw = 10 + Math.random() * 15;
                const bd = 10 + Math.random() * 15;

                // Create window texture
                const wCanvas = document.createElement('canvas');
                wCanvas.width = 64; wCanvas.height = 256;
                const wCtx = wCanvas.getContext('2d');
                wCtx.fillStyle = '#111118';
                wCtx.fillRect(0, 0, 64, 256);
                // Random lit windows
                for (let wy = 4; wy < 250; wy += 12) {
                    for (let wx = 4; wx < 60; wx += 10) {
                        if (Math.random() > 0.4) {
                            const bright = 0.5 + Math.random() * 0.5;
                            wCtx.fillStyle = `rgba(255, ${180 + Math.random() * 75}, ${80 + Math.random() * 40}, ${bright})`;
                            wCtx.fillRect(wx, wy, 6, 8);
                        }
                    }
                }
                const winTex = new THREE.CanvasTexture(wCanvas);
                winTex.wrapS = winTex.wrapT = THREE.RepeatWrapping;
                winTex.repeat.set(bw / 10, height / 20);

        // ============= ROBOT PHYSICS =============
        // Drone state for smooth physics
        let targetTiltX = 0, targetTiltZ = 0;
        let currentTiltX = 0, currentTiltZ = 0;
        let yawVelocity = 0;
        
        function updateRobot() {
            const cfg = ROBOTS[robotType];
            const physics = cfg.physics;
            const thrust = physics.thrust;
            const rotSpeed = 0.03;
            
            // Input handling based on robot type (keyboard + mobile)
            const moveForward = keys['w'] || mobileInput.moveY < -0.2;
            const moveBack = keys['s'] || mobileInput.moveY > 0.2;
            const moveLeft = keys['a'] || mobileInput.moveX < -0.2;
            const moveRight = keys['d'] || mobileInput.moveX > 0.2;
            const lookLeft = keys['arrowleft'] || mobileInput.lookX < -0.2;
            const lookRight = keys['arrowright'] || mobileInput.lookX > 0.2;
            const pitchForward = keys['arrowup'];
            const pitchBack = keys['arrowdown'];
            const goUp = keys['q'] || mobileInput.up;
            const goDown = keys['e'] || mobileInput.down;
            
            // Mobile input strength (0-1)
            const mobileStrength = Math.max(Math.abs(mobileInput.moveX), Math.abs(mobileInput.moveY));
            const mobileMult = mobileStrength > 0.2 ? mobileStrength : 1;
            
            if (robotType === 'drone') {
                // Realistic quadcopter physics
                const p = physics;

                // Calculate desired acceleration based on input
                let accelX = 0, accelZ = 0, accelY = 0;

                if (moveForward) {
                    accelZ -= thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelX -= thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    accelZ += thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelX += thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft) {
                    accelX -= thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelZ += thrust * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveRight) {
                    accelX += thrust * mobileMult * Math.cos(robot.rotation.y);
                    accelZ -= thrust * mobileMult * Math.sin(robot.rotation.y);
                }

                // Arrow up/down = pitch control (tilt forward/back to accelerate)
                if (pitchForward) {
                    accelZ -= thrust * 1.2 * Math.cos(robot.rotation.y);
                    accelX -= thrust * 1.2 * Math.sin(robot.rotation.y);
                }
                if (pitchBack) {
                    accelZ += thrust * 1.2 * Math.cos(robot.rotation.y);
                    accelX += thrust * 1.2 * Math.sin(robot.rotation.y);
                }

                // Vertical thrust (gentle ascent/descent)
                if (goUp) accelY = thrust * 0.8;
                else if (goDown) accelY = -thrust * 0.8;
                else accelY = p.gravity; // Exact hover — cancel gravity completely

                // Apply gravity
                accelY -= p.gravity;

                // Apply wind force (Phase 5C)
                accelX += windVector.x;
                accelZ += windVector.z;

                // Apply acceleration to velocity
                robotState.velocity.x += accelX;
                robotState.velocity.y += accelY;
                robotState.velocity.z += accelZ;

                // Apply drag (quadratic for realism at high speeds)
                const speed = robotState.velocity.length();
                if (speed > 0.01) {
                    const dragFactor = Math.pow(p.drag, 1 + speed * 0.5);
                    robotState.velocity.multiplyScalar(dragFactor);
                }
                // Deadzone — stop micro-drift
                if (speed < 0.005) {
                    robotState.velocity.set(0, 0, 0);
                }

                // Clamp max speed
                if (speed > p.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(p.maxSpeed);
                }

                // Yaw rotation — pure rotation, no translational side-effect
                const yawSpd = p.yawSpeed || 0.04;
                if (lookLeft) yawVelocity = yawSpd;
                else if (lookRight) yawVelocity = -yawSpd;
                else yawVelocity *= 0.6; // Quick deceleration when no input

                // When yawing without movement input, zero horizontal velocity
                // to prevent the drone from drifting/orbiting on the map
                const hasMovementInput = moveForward || moveBack || moveLeft || moveRight || pitchForward || pitchBack;
                if (!hasMovementInput) {
                    robotState.velocity.x *= 0.8;
                    robotState.velocity.z *= 0.8;
                    // Hard zero below threshold
                    if (Math.abs(robotState.velocity.x) < 0.01) robotState.velocity.x = 0;
                    if (Math.abs(robotState.velocity.z) < 0.01) robotState.velocity.z = 0;
                }

                robot.rotation.y += yawVelocity;

                // Calculate target tilt based on horizontal velocity (in local space)
                const localVelX = robotState.velocity.x * Math.cos(robot.rotation.y) + robotState.velocity.z * Math.sin(robot.rotation.y);
                const localVelZ = robotState.velocity.z * Math.cos(robot.rotation.y) - robotState.velocity.x * Math.sin(robot.rotation.y);

                targetTiltX = -localVelZ * (p.tiltResponse || 0.15);
                targetTiltZ = localVelX * (p.tiltResponse || 0.15);

                // Direct pitch override from arrow keys (more pronounced tilt)
                const maxTilt = p.tiltMax || 0.4;
                if (pitchForward) targetTiltX = Math.max(targetTiltX, maxTilt * 0.8);
                if (pitchBack) targetTiltX = Math.min(targetTiltX, -maxTilt * 0.8);

                // Clamp tilt
                targetTiltX = Math.max(-maxTilt, Math.min(maxTilt, targetTiltX));
                targetTiltZ = Math.max(-maxTilt, Math.min(maxTilt, targetTiltZ));
                
                // Smooth tilt transition (like real drone stabilization)
                currentTiltX += (targetTiltX - currentTiltX) * 0.1;
                currentTiltZ += (targetTiltZ - currentTiltZ) * 0.1;
                
                robot.rotation.x = currentTiltX;
                robot.rotation.z = currentTiltZ;
                
            } else if (robotType === 'auv') {
                // AUV physics (keep existing)
                const speed = thrust;
                if (moveForward) {
                    robotState.velocity.z -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    robotState.velocity.z += speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x += speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft) {
                    robotState.velocity.x -= speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.z += speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveRight) {
                    robotState.velocity.x += speed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.z -= speed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (goUp) robotState.velocity.y += speed * 0.8;
                if (goDown) robotState.velocity.y -= speed * 0.8;
                if (lookLeft) robot.rotation.y += rotSpeed * (1 + Math.abs(mobileInput.lookX));
                if (lookRight) robot.rotation.y -= rotSpeed * (1 + Math.abs(mobileInput.lookX));
            } else {
                // Ground vehicles - different controls
                const gSpeed = thrust;
                if (moveForward) {
                    robotState.velocity.z -= gSpeed * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x -= gSpeed * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveBack) {
                    robotState.velocity.z += gSpeed * 0.5 * mobileMult * Math.cos(robot.rotation.y);
                    robotState.velocity.x += gSpeed * 0.5 * mobileMult * Math.sin(robot.rotation.y);
                }
                if (moveLeft || lookLeft) robot.rotation.y += rotSpeed;
                if (moveRight || lookRight) robot.rotation.y -= rotSpeed;
                if (keys[' ']) robotState.velocity.multiplyScalar(0.9); // Brake
            }

            // Physics simulation — drone handles its own drag/gravity above
            if (robotType === 'auv') {
                // Buoyancy at certain depth
                if (robot.position.y < -2) {
                    robotState.velocity.y += physics.buoyancy;
                }
                robotState.velocity.multiplyScalar(physics.drag);
                if (robotState.velocity.length() > physics.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(physics.maxSpeed);
                }
            } else if (robotType !== 'drone') {
                // Ground robots
                if (robot.position.y > getGroundHeight() + 0.1) {
                    robotState.velocity.y -= physics.gravity;
                }
                robotState.velocity.multiplyScalar(physics.drag);
                if (robotState.velocity.length() > physics.maxSpeed) {
                    robotState.velocity.normalize().multiplyScalar(physics.maxSpeed);
                }
            }
            // Drone drag + clamp already handled in drone physics block above
            
            // Collision detection (Phase 5B)
            checkCollisions();

            // Update position
            robot.position.add(robotState.velocity);
            
            // Constraints based on robot type
            if (robotType === 'drone') {
                const minAlt = 0.3; // Allow drone very close to ground for landing
                if (robot.position.y < minAlt) {
                    robot.position.y = minAlt;
                    if (robotState.velocity.y < 0) robotState.velocity.y = 0;
                }
            } else if (robotType === 'auv') {
                // Keep underwater but not too deep
                if (robot.position.y > -1) {
                    robot.position.y = -1;
                    robotState.velocity.y = 0;
                }
                if (robot.position.y < -25) {
                    robot.position.y = -25;
                    robotState.velocity.y = 0;
                }
            } else {
                // Ground robots stay on ground
                const groundY = getGroundHeight();
                if (robot.position.y <= groundY + 0.5) {
                    robot.position.y = groundY + 0.5;
                    robotState.velocity.y = 0;
                }
            }

            // Clamp drone + camera to environment bounds
            if (envBounds) {
                // Clamp robot position
                if (robot.position.x < envBounds.min.x) { robot.position.x = envBounds.min.x; robotState.velocity.x = 0; }
                if (robot.position.x > envBounds.max.x) { robot.position.x = envBounds.max.x; robotState.velocity.x = 0; }
                if (robot.position.y < envBounds.min.y + 0.5) { robot.position.y = envBounds.min.y + 0.5; robotState.velocity.y = 0; }
                if (robot.position.y > envBounds.max.y) { robot.position.y = envBounds.max.y; robotState.velocity.y = 0; }
                if (robot.position.z < envBounds.min.z) { robot.position.z = envBounds.min.z; robotState.velocity.z = 0; }
                if (robot.position.z > envBounds.max.z) { robot.position.z = envBounds.max.z; robotState.velocity.z = 0; }
                // Sync state
                robotState.position.copy(robot.position);
            }

            // Visual effects
            if (robotType === 'drone') {
                // Tilt already calculated in drone physics above
                
                // Spin propellers (faster when moving)
                const propSpeed = 0.3 + robotState.velocity.length() * 0.3;
                robot.children.forEach(child => {
                    if (child.userData.isPropeller) child.rotation.y += propSpeed;
                });
            } else if (robotType === 'auv') {
                // Slight pitch/roll
                robot.rotation.x = -robotState.velocity.z * 0.1;
                robot.rotation.z = robotState.velocity.x * 0.1;
                
                // Spin propeller
                robot.children.forEach(child => {
                    if (child.userData.isPropeller) child.rotation.x += 0.3;
                });
            } else if (robotType === 'rover') {
                // Spin wheels
                const wheelSpeed = robotState.velocity.length() * 0.5;
                robot.children.forEach(child => {
                    if (child.userData.isWheel) child.rotation.y += wheelSpeed;
                });
            } else if (robotType === 'quadruped') {
                // Animate legs
                animateQuadruped();
            }
            
            // Update FPV camera
            updateFPVCamera();
            
            // Third-person chase camera (always active)
            {
                const scale = robot.scale.x || 1;
                const isMaps = currentEnvironment === 'maps';
                const dist = (isMaps ? 6 : chaseCamDistance) * scale;
                const height = (isMaps ? 2.5 : chaseCamHeight) * scale;

                let desiredX, desiredZ, desiredY;
                if (isMaps) {
                    // Fixed camera offset in maps mode — map rotation handles the world view
                    // Camera stays at fixed position behind drone (no orbiting on yaw)
                    desiredX = robot.position.x;
                    desiredZ = robot.position.z + dist;
                    desiredY = robot.position.y + height;
                } else {
                    // Normal chase cam follows behind drone's yaw
                    const camYaw = robot.rotation.y;
                    desiredX = robot.position.x + Math.sin(camYaw) * dist;
                    desiredZ = robot.position.z + Math.cos(camYaw) * dist;
                    desiredY = robot.position.y + height;
                }

                // Smooth follow
                camera.position.x += (desiredX - camera.position.x) * chaseCamLerp;
                camera.position.y += (desiredY - camera.position.y) * chaseCamLerp;
                camera.position.z += (desiredZ - camera.position.z) * chaseCamLerp;

                // Look at drone with slight forward offset
                const lookTarget = robot.position.clone();
                lookTarget.y += 1 * scale;
                controls.target.lerp(lookTarget, 0.12);
            }
            
            // Update telemetry
            updateTelemetry();
            
            // Battery drain
            if (robotState.velocity.length() > 0.01) {
                battery = Math.max(0, battery - 0.002);
                updateBattery();
            }
            
            // Update minimap
            updateMinimap();
        }
        
        function getGroundHeight() {
            // Simple ground height (could be expanded for terrain)
            return 0;
        }
        
        function animateQuadruped() {
            if (robotState.velocity.length() > 0.01) {
                robotState.legPhase += ROBOTS.quadruped.physics.gaitSpeed * robotState.velocity.length();
            }
            
            robot.children.forEach(child => {
                if (child.userData.legName) {
                    const phase = robotState.legPhase;
                    const offset = child.userData.legName.includes('F') ? 0 : Math.PI;
                    const side = child.userData.legName.includes('L') ? 1 : -1;
                    
                    // Trot gait
                    const hipAngle = Math.sin(phase + offset) * 0.3;
                    const kneeAngle = Math.abs(Math.sin(phase + offset)) * 0.4;
                    
                    child.children.forEach(part => {
                        if (part.userData.isUpperLeg) {
                            part.rotation.x = hipAngle;
                        } else if (part.userData.isLowerLeg) {
                            part.rotation.x = kneeAngle;
                        }
                    });
                }
            });
        }
        
        function updateFPVCamera() {
            if (!robot) return;

            // Camera at front-bottom of drone
            const scale = robot.scale.x || 1;
            const offset = new THREE.Vector3(0, -0.2 * scale, -0.5 * scale);
            offset.applyQuaternion(robot.quaternion);
            fpvCamera.position.copy(robot.position).add(offset);

            // Look forward-down at 45° from the drone's front
            // Start with drone's yaw, then pitch down 45°
            const q = new THREE.Quaternion();
            const yawQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), robot.rotation.y);
            const pitchQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 4); // 45° down
            q.multiplyQuaternions(yawQ, pitchQ);
            fpvCamera.quaternion.copy(q);
        }

        function updateFOVCone() {
            if (!fovCone || !robot || robotType !== 'drone') return;
            const alt = robot.position.y;
            if (alt < 0.8) { fovCone.visible = false; return; }
            fovCone.visible = true;

            // Camera mounted at front of drone, angled 45° downward
            const camTilt = 45 * Math.PI / 180; // 45° down from horizontal
            const hFov = 30 * Math.PI / 180; // half horizontal FOV
            const vFov = 22.5 * Math.PI / 180; // half vertical FOV

            // Camera looks forward-down at 45°. The projection hits the ground
            // at varying distances based on the vertical FOV spread.
            // Center ray: hits ground at distance = alt / tan(camTilt) forward
            const centerDist = alt / Math.tan(camTilt); // forward distance on ground to center of FOV

            // Near edge (bottom of frame): steeper angle = closer
            const nearAngle = camTilt + vFov;
            const nearDist = nearAngle >= Math.PI / 2 ? 0 : alt / Math.tan(nearAngle);
            // Far edge (top of frame): shallower angle = farther
            const farAngle = camTilt - vFov;
            const farDist = farAngle <= 0 ? centerDist * 4 : alt / Math.tan(farAngle);

            // Width at near and far edges
            const nearHW = nearDist * Math.tan(hFov) * 0.8;
            const farHW = farDist * Math.tan(hFov) * 1.2;

            // 4 ground corners in drone-local space (forward = -Z)
            const localCorners = [
                new THREE.Vector3(-nearHW, 0, -nearDist), // near-left
                new THREE.Vector3( nearHW, 0, -nearDist), // near-right
                new THREE.Vector3( farHW,  0, -farDist),  // far-right
                new THREE.Vector3(-farHW,  0, -farDist),  // far-left
            ];

            // Rotate by drone yaw and offset to drone XZ
            const yaw = robot.rotation.y;
            const camPos = robot.position.clone();
            const groundCorners = localCorners.map(c => {
                const rx = c.x * Math.cos(yaw) - c.z * Math.sin(yaw);
                const rz = c.x * Math.sin(yaw) + c.z * Math.cos(yaw);
                return new THREE.Vector3(camPos.x + rx, 0.05, camPos.z + rz);
            });

            // Update the 4 frustum edge lines
            let lineIdx = 0;
            fovCone.children.forEach(child => {
                if (child.userData.fovLine && lineIdx < 4) {
                    const positions = child.geometry.attributes.position.array;
                    positions[0] = camPos.x; positions[1] = camPos.y; positions[2] = camPos.z;
                    positions[3] = groundCorners[lineIdx].x;
                    positions[4] = groundCorners[lineIdx].y;
                    positions[5] = groundCorners[lineIdx].z;
                    child.geometry.attributes.position.needsUpdate = true;
                    lineIdx++;
                }
                if (child.userData.fovRect) {
                    const positions = child.geometry.attributes.position.array;
                    for (let i = 0; i < 4; i++) {
                        positions[i * 3]     = groundCorners[i].x;
                        positions[i * 3 + 1] = groundCorners[i].y;
                        positions[i * 3 + 2] = groundCorners[i].z;
                    }
                    positions[12] = groundCorners[0].x;
                    positions[13] = groundCorners[0].y;
                    positions[14] = groundCorners[0].z;
                    child.geometry.attributes.position.needsUpdate = true;
                }
                if (child.userData.fovFill) {
                    // Position fill at center of ground footprint
                    const cx = (groundCorners[0].x + groundCorners[2].x) / 2;
                    const cz = (groundCorners[0].z + groundCorners[2].z) / 2;
                    const width = Math.max(nearHW, farHW) * 2;
                    const depth = farDist - nearDist;
                    child.position.set(cx, 0.02, cz);
                    child.rotation.set(-Math.PI / 2, 0, yaw);
                    child.scale.set(width, depth, 1);
                }
            });

            fovCone.position.set(0, 0, 0);
            fovCone.rotation.set(0, 0, 0);
        }
        
        function updateTelemetry() {
            const alt = robotType === 'auv' ? Math.abs(robot.position.y) : robot.position.y;
            document.getElementById('telem-alt').textContent = alt.toFixed(1) + 'm';
            document.getElementById('telem-spd').textContent = (robotState.velocity.length() * 10).toFixed(1);
            document.getElementById('telem-x').textContent = robot.position.x.toFixed(1);
            document.getElementById('telem-z').textContent = robot.position.z.toFixed(1);
        }

            const fill = document.getElementById('battery-fill');

        }
        
        // ============= MINIMAP =============
        function initMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            if (!canvas) return;
            canvas.width = 150;
            canvas.height = 150;
        }
        
        function updateMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 20, 40, 0.9)';
            ctx.fillRect(0, 0, 150, 150);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 150; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 150);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(150, i);
                ctx.stroke();
            }
            
            // Draw robot position
            const scale = 1;
            const centerX = 75 + robot.position.x * scale;
            const centerY = 75 + robot.position.z * scale;
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(-robot.rotation.y);
            
            ctx.fillStyle = '#00c8ff';
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(4, 4);
            ctx.lineTo(-4, 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            
            // Draw waypoints
            waypoints.forEach((wp, i) => {
                const wpX = 75 + wp.x * scale;
                const wpY = 75 + wp.z * scale;
                ctx.fillStyle = i === currentWaypointIndex ? '#00ff88' : '#ff8800';
                ctx.beginPath();
                ctx.arc(wpX, wpY, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // ============= WAYPOINTS =============
        function addWaypoint() {
            const wp = {
                x: robot.position.x,
                y: robot.position.y,
                z: robot.position.z,

            };

        function renderWaypoints() {

                `;
                item.onclick = () => navigateToWaypoint(i);

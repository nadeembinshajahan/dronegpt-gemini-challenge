                                    disabled: false,
                                    start_of_speech_sensitivity: 'START_SENSITIVITY_HIGH',
                                    end_of_speech_sensitivity: 'END_SENSITIVITY_LOW',
                                    prefix_padding_ms: 20,
                                    silence_duration_ms: 500
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: getSystemPrompt() }]
                            },
                            tools: getToolDeclarations()
                        }
                    }));
                };

                websocket.onmessage = async (event) => {
                    // Gemini sends both JSON (text) and binary (audio) frames
                    if (event.data instanceof Blob) {
                        // Binary audio data — read as text first (it's JSON-wrapped)
                        const text = await event.data.text();
                        try {
                            const data = JSON.parse(text);
                            handleGeminiResponse(data);
                        } catch (e) {
                            // Raw binary audio — shouldn't happen with Gemini Live
                            console.log('Binary message, size:', event.data.size);
                        }
                        return;
                    }
                    try {
                        const data = JSON.parse(event.data);
                        handleGeminiResponse(data);
                    } catch (e) {
                        console.error('Failed to parse Gemini response:', e);
                    }
                };
                websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    setConnectionStatus(false);
                };
                websocket.onclose = (event) => {
                    console.log('WebSocket closed:', event.code, event.reason);
                    setConnectionStatus(false);
                    showToast('Connection lost — reconnecting...');
                    // Auto-reconnect after 2s
                    setTimeout(() => {
                        if (!isConnected) {
                            console.log('Attempting reconnect...');
                            initGeminiLive();
                        }
                    }, 2000);
                };
            } catch (error) {
                console.error('Failed to connect:', error);
                document.getElementById('voice-status').textContent = 'Connection failed. Click mic to retry.';
            }
        }

        function setConnectionStatus(connected) {
            isConnected = connected;
            document.getElementById('status-dot').classList.toggle('connected', connected);
            document.getElementById('status-text').textContent = connected ? 'Connected' : 'Disconnected';
        }

        async function startAudioCapture() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                const processor = audioContext.createScriptProcessor(8192, 1, 1); // Larger buffer = fewer sends

                // Audio analyser for waveform visualization
                audioAnalyser = audioContext.createAnalyser();
                audioAnalyser.fftSize = 128;
                analyserData = new Uint8Array(audioAnalyser.frequencyBinCount);
                source.connect(audioAnalyser);

                processor.onaudioprocess = (e) => {
                    if (!isConnected || !websocket || websocket.readyState !== WebSocket.OPEN) return;
                    // Don't send if WebSocket buffer is backed up (> 64KB queued)
                    if (websocket.bufferedAmount > 65536) return;

                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = convertFloat32ToPCM16(inputData);
                    const base64Audio = arrayBufferToBase64(pcm16.buffer);

                    websocket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: base64Audio }]
                        }
                    }));
                };

                source.connect(processor);
                processor.connect(audioContext.destination);

                // Create playback context at 24kHz (Gemini output rate)
                playbackCtx = new AudioContext({ sampleRate: 24000 });

                // Start sending FPV frames to Gemini
                startFrameSender();

                document.getElementById('voice-indicator').classList.add('listening');
                document.getElementById('voice-status').textContent = 'Listening... speak naturally';
            } catch (error) {
                console.error('Audio capture error:', error);
                document.getElementById('voice-status').textContent = 'Microphone access denied';
            }
        }

        function convertFloat32ToPCM16(float32Array) {
            const pcm16 = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm16;
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }


        async function startScreenShare() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: 'browser', frameRate: 5 },
                    audio: false,
                    preferCurrentTab: true
                });
                screenVideo = document.createElement('video');
                screenVideo.srcObject = screenStream;
                screenVideo.muted = true;
                await screenVideo.play();
                screenStream.getVideoTracks()[0].addEventListener('ended', () => {
                    screenStream = null; screenVideo = null;
                });
                console.log('Screen share started for Gemini vision');
            } catch (e) {
                console.warn('Screen share denied:', e);
                screenStream = null; screenVideo = null;
            }
        }

        function captureFPVFrame() {
            if (!robot) return null;
            try {
                if (currentEnvironment === 'maps') {
                    // Maps mode: capture from screen share, crop to FPV pip area
                    if (!screenVideo || !screenStream) return null;
                    const tmp = document.createElement('canvas');
                    tmp.width = 480; tmp.height = 320;
                    const tctx = tmp.getContext('2d');
                    // Get the FPV pip position to crop
                    const pip = document.getElementById('fpv-pip');
                    const isFullscreen = pip && pip.classList.contains('fullscreen');
                    if (isFullscreen) {
                        // FPV is fullscreen — capture entire screen
                        tctx.drawImage(screenVideo, 0, 0, 480, 320);
                    } else {
                        // Crop to approximate FPV pip area (bottom-left corner)
                        const vw = screenVideo.videoWidth, vh = screenVideo.videoHeight;
                        // PiP is at bottom:20px, left:20px, 280x180 — scale to video coords
                        const sx = 20 * (vw / window.innerWidth);
                        const sy = (window.innerHeight - 200) * (vh / window.innerHeight);
                        const sw = 280 * (vw / window.innerWidth);
                        const sh = 180 * (vh / window.innerHeight);
                        tctx.drawImage(screenVideo, sx, sy, sw, sh, 0, 0, 480, 320);
                    }
                    return tmp.toDataURL('image/jpeg', 0.5).split(',')[1];
                }
                // Non-maps: use Three.js FPV renderer
                if (!fpvRenderer) return null;
                robot.visible = false;
                fpvRenderer.render(scene, fpvCamera);
                robot.visible = true;
                return fpvRenderer.domElement.toDataURL('image/jpeg', 0.4).split(',')[1];
            } catch (e) { return null; }
        }

        // Send frames to Gemini periodically
        function startFrameSender() {
            if (frameInterval) clearInterval(frameInterval);
            frameInterval = setInterval(() => {
                if (!isConnected || !websocket || websocket.readyState !== WebSocket.OPEN) return;
                if (websocket.bufferedAmount > 32768) return;

                const frame = captureFPVFrame();
                if (frame) {
                    websocket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{
                                mimeType: 'image/jpeg',
                                data: frame
                            }]
                        }
                    }));
                }

                // During autopilot: prompt Gemini to narrate what it sees
                if (autopilot.active && websocket.readyState === WebSocket.OPEN) {
                    const wp = autopilot.waypoints[autopilot.currentIndex];
                    const heading = ((-robot.rotation.y * 180 / Math.PI) % 360 + 360) % 360;
                    const narrationPrompt = `[NAV UPDATE] GPS: ${mapDroneLat.toFixed(5)},${mapDroneLng.toFixed(5)} | Alt: ${mapDroneAlt.toFixed(0)}m | Heading: ${heading.toFixed(0)}° | Next: ${wp ? wp.name : 'done'} (${autopilot.currentIndex + 1}/${autopilot.waypoints.length}). Briefly describe what you see in the camera image and your progress toward the destination. Keep it to 1 sentence.`;
                    websocket.send(JSON.stringify({
                        clientContent: {
                            turns: [{ role: 'user', parts: [{ text: narrationPrompt }] }],
                            turnComplete: true
                        }
                    }));
                }
            }, 2000); // Every 2 seconds
        }

        let lastTranscriptRole = null;
        let lastTranscriptEl = null;
        let lastTranscriptTimer = null;
        function addTranscript(text, role) {
            const panel = document.getElementById('transcript-panel');
            if (!panel || !text.trim()) return;
            // Append to existing element if same role (streaming words)
            if (lastTranscriptRole === role && lastTranscriptEl && lastTranscriptEl.parentNode) {
                lastTranscriptEl.textContent += ' ' + text.trim();
                lastTranscriptEl.style.opacity = '1';
                clearTimeout(lastTranscriptTimer);
            } else {
                const msg = document.createElement('div');
                msg.className = 'transcript-msg ' + role;
                msg.textContent = text.trim();
                panel.appendChild(msg);
                lastTranscriptRole = role;
                lastTranscriptEl = msg;
            }
            panel.scrollTop = panel.scrollHeight;
            while (panel.children.length > 20) panel.removeChild(panel.firstChild);
            lastTranscriptTimer = setTimeout(() => {
                if (lastTranscriptEl?.parentNode) lastTranscriptEl.style.opacity = '0.3';
                lastTranscriptRole = null;
                lastTranscriptEl = null;
            }, 3000);
        }

        function handleGeminiResponse(data) {
            // Handle setup complete
            if (data.setupComplete) {
                console.log('Gemini Live setup complete');
                return;
            }

            if (data.serverContent) {
                const content = data.serverContent;

                // Input transcription (what user said)
                if (content.inputTranscription?.text) {
                    const userText = content.inputTranscription.text.trim();
                    if (userText) {
                        addTranscript(userText, 'user');
                        document.getElementById('voice-status').textContent = userText;
                    }
                }

                // Output transcription (what agent said)
                if (content.outputTranscription?.text) {
                    const agentText = content.outputTranscription.text.trim();
                    if (agentText) addTranscript(agentText, 'agent');
                }

                if (content.modelTurn?.parts) {
                    for (const part of content.modelTurn.parts) {
                        // Text response (non-audio text) — only show if no outputTranscription (avoid duplicates)
                        if (part.text) {
                            document.getElementById('voice-status').textContent = part.text;
                        }
                        // Audio response (PCM 24kHz from Gemini)
                        if (part.inlineData?.mimeType?.startsWith('audio/')) {
                            playPCMAudio(part.inlineData.data);
                        }
                    }
                }

                // Interrupted — user started speaking over agent
                if (content.interrupted) {
                    document.getElementById('voice-indicator').classList.remove('speaking');
                    document.getElementById('voice-indicator').classList.add('listening');
                    resetAudioQueue();
                    lastTranscriptRole = null;
                    lastTranscriptEl = null;
                }

                if (content.turnComplete) {
                    document.getElementById('voice-indicator').classList.remove('speaking');
                    document.getElementById('voice-indicator').classList.add('listening');
                    resetAudioQueue();
                    // Reset transcript accumulation so next turn starts fresh
                    lastTranscriptRole = null;
                    lastTranscriptEl = null;
                }
            }

            // Handle tool calls from Gemini
            if (data.toolCall) {
                console.log('Tool call:', data.toolCall);
                const results = [];
                for (const fc of data.toolCall.functionCalls || []) {
                    const result = executeToolCall(fc.name, fc.args || {});
                    results.push({
                        id: fc.id,
                        response: { result }
                    });
                }
                // Send tool results back to Gemini
                if (websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send(JSON.stringify({
                        toolResponse: { functionResponses: results }
                    }));
                }
            }
        }

        // Execute tool calls — actually control the drone
        function executeToolCall(name, args) {
            console.log('Executing tool:', name, args);

            switch (name) {
                case 'move_robot': {
                    const durMs = (args.duration || 1) * 1000;
                    const dir = args.direction;

                    // Map directions to keys based on robot type
                    let keyList = [];
                    if (dir === 'forward') keyList = ['w'];
                    else if (dir === 'backward') keyList = ['s'];
                    else if (dir === 'left') {
                        // Drone/AUV: strafe. Rover: turn left + forward
                        if (robotType === 'rover' || robotType === 'quadruped') {
                            keyList = ['w', 'arrowleft'];
                        } else {
                            keyList = ['a'];
                        }
                    } else if (dir === 'right') {
                        if (robotType === 'rover' || robotType === 'quadruped') {
                            keyList = ['w', 'arrowright'];
                        } else {
                            keyList = ['d'];
                        }
                    } else if (dir === 'up') {
                        if (robotType === 'rover' || robotType === 'quadruped') {
                            return { success: false, message: 'Ground vehicle cannot fly up' };
                        }
                        keyList = ['q'];
                    } else if (dir === 'down') {
                        if (robotType === 'rover' || robotType === 'quadruped') {
                            return { success: false, message: 'Ground vehicle cannot descend' };
                        }
                        keyList = ['e'];
                    }

                    keyList.forEach(k => keys[k] = true);
                    setTimeout(() => { keyList.forEach(k => keys[k] = false); }, durMs);
                    return { success: true, message: `Moving ${dir} for ${args.duration || 1}s` };
                }
                case 'rotate_robot': {
                    const deg = Math.min(args.degrees || 45, 360);
                    const radians = (deg * Math.PI / 180) * (args.direction === 'left' ? 1 : -1);
                    // Smooth animated rotation for all robot types
                    const rotSteps = Math.max(10, Math.ceil(deg / 3));
                    const stepRad = radians / rotSteps;
                    let step = 0;
                    const rotInterval = setInterval(() => {
                        robot.rotation.y += stepRad;
                        step++;
                        if (step >= rotSteps) clearInterval(rotInterval);
                    }, 16);
                    return { success: true, message: `Rotating ${args.direction} ${deg}°` };
                }
                case 'set_speed': {
                    const speeds = { slow: 0.03, normal: 0.06, fast: 0.12 };
                    ROBOTS[robotType].physics.thrust = speeds[args.speed] || 0.06;
                    return { success: true, message: `Speed set to ${args.speed}` };
                }
                case 'stop': {
                    // Cancel autopilot and release all movement keys
                    autopilot.active = false;
                    ['w', 's', 'a', 'd', 'q', 'e', 'arrowleft', 'arrowright', 'arrowup', 'arrowdown'].forEach(k => keys[k] = false);
                    robotState.velocity.set(0, 0, 0);
                    ROBOTS[robotType].physics.thrust = 0.06;
                    return { success: true, message: 'Stopped and autopilot cancelled' };
                }
                case 'get_status': {
                    const status = {
                        robot: ROBOTS[robotType].name,
                        environment: currentEnvironment,
                        altitude: (currentEnvironment === 'maps' ? mapDroneAlt : (robot.position.y - envGroundY)).toFixed(1) + 'm',
                        speed: (robotState.velocity.length() * 10).toFixed(1) + ' m/s',
                        battery: Math.round(battery) + '%',
                        heading: ((-robot.rotation.y * 180 / Math.PI) % 360).toFixed(0) + '°'
                    };
                    if (currentEnvironment === 'maps') {
                        status.gps = { lat: mapDroneLat.toFixed(6), lng: mapDroneLng.toFixed(6) };
                        status.city = currentMapCity;
                        status.navigating = autopilot.active;
                        if (autopilot.active) {
                            const wp = autopilot.waypoints[autopilot.currentIndex];
                            status.nextWaypoint = wp ? wp.name : 'none';
                            status.waypointProgress = `${autopilot.currentIndex + 1}/${autopilot.waypoints.length}`;
                        }
                    } else {
                        status.position = {
                            x: robot.position.x.toFixed(1),
                            y: robot.position.y.toFixed(1),
                            z: robot.position.z.toFixed(1)
                        };
                    }
                    return status;
                }
                case 'switch_environment': {
                    const env = args.environment;
                    if (ENVIRONMENTS[env]) {
                        loadEnvironment(env);
                        return { success: true, message: `Switched to ${ENVIRONMENTS[env].name}` };
                    }
                    return { success: false, message: `Unknown environment: ${env}` };
                }
                case 'navigate_to': {
                    // Auto-switch to maps if needed
                    if (currentEnvironment !== 'maps') {
                        loadEnvironment('maps');
                    }
                    // Set up navigation (autopilot will start once map is active)
                    autopilot.waypoints = [{ lat: args.lat, lng: args.lng, altitude: args.altitude || 150, name: args.name || 'Destination' }];
                    autopilot.currentIndex = 0;
                    autopilot.active = true;
                    autopilot.speed = 'normal';
                    // Also ensure drone starts at a reasonable altitude for navigation
                    if (robot && robot.position.y < 5) {
                        robot.position.y = 10;
                        robotState.position.y = 10;
                    }
                    showToast('Navigating to ' + (args.name || `${args.lat.toFixed(4)}, ${args.lng.toFixed(4)}`));
                    return {
                        success: true,
                        message: `Navigating to ${args.name || 'destination'}`,
                        currentPosition: { lat: mapDroneLat, lng: mapDroneLng, altitude: mapDroneAlt }
                    };
                }
                case 'set_waypoints': {
                    // Auto-switch to maps if needed
                    if (currentEnvironment !== 'maps') {
                        loadEnvironment('maps');
                    }
                    const wps = args.waypoints || [];
                    if (wps.length === 0) {
                        return { success: false, message: 'No waypoints provided' };
                    }
                    autopilot.waypoints = wps.map((wp, i) => ({
                        lat: wp.lat, lng: wp.lng,
                        altitude: wp.altitude || 150,
                        name: wp.name || ('Waypoint ' + (i + 1))
                    }));
                    autopilot.currentIndex = 0;
                    autopilot.speed = args.speed || 'normal';
                    autopilot.loop = args.loop || false;
                    autopilot.active = true;
                    // Ensure drone has altitude for navigation
                    if (robot && robot.position.y < 5) {
                        robot.position.y = 10;
                        robotState.position.y = 10;
                    }
                    showToast(`Route set: ${wps.length} waypoints — ${autopilot.speed} speed`);
                    return {
                        success: true,
                        message: `Route set with ${wps.length} waypoints`,
                        waypoints: autopilot.waypoints.map(w => w.name),
                        currentPosition: { lat: mapDroneLat, lng: mapDroneLng, altitude: mapDroneAlt }
                    };
                }
                case 'switch_robot': {
                    const newType = args.robot;
                    if (ROBOTS[newType]) {
                        switchRobot(newType);
                        return { success: true, message: `Switched to ${ROBOTS[newType].name}` };
                    }
                    return { success: false, message: `Unknown robot: ${newType}` };
                }
                case 'cancel_navigation': {
                    autopilot.active = false;
                    autopilot.waypoints = [];
                    ['w', 's', 'a', 'd', 'q', 'e', 'arrowleft', 'arrowright'].forEach(k => keys[k] = false);
                    ROBOTS[robotType].physics.thrust = 0.06; // Reset thrust
                    showToast('Navigation cancelled');
                    return { success: true, message: 'Navigation cancelled, manual control restored' };
                }
                case 'set_altitude': {
                    if (robotType === 'rover' || robotType === 'quadruped') {
                        return { success: false, message: 'Ground vehicles cannot change altitude' };
                    }
                    const alt = args.altitude || 50;
                    autopilot.targetAlt = alt;
                    if (currentEnvironment === 'maps') {
                        const targetY = alt / 5 + 0.3;
                        const startY = robot.position.y;
                        const steps = 60;
                        let step = 0;
                        const altInterval = setInterval(() => {
                            step++;
                            const t = step / steps;
                            robot.position.y = startY + (targetY - startY) * t;
                            robotState.position.y = robot.position.y;
                            if (step >= steps) clearInterval(altInterval);
                        }, 33);
                    } else if (robotType === 'auv') {
                        // AUV: altitude is depth (negative Y). "altitude 10" = shallow, "altitude 25" = deep
                        const targetDepth = -Math.max(1, Math.min(28, alt));
                        const startY = robot.position.y;
                        const steps = 60;
                        let step = 0;
                        const depthInterval = setInterval(() => {
                            step++;
                            robot.position.y = startY + (targetDepth - startY) * (step / steps);
                            robotState.position.y = robot.position.y;
                            if (step >= steps) clearInterval(depthInterval);
                        }, 33);
                        return { success: true, message: `Diving to depth ${alt}m` };
                    } else {
                        const altDiff = alt - (robot.position.y - envGroundY);
                        const key = altDiff > 0 ? 'q' : 'e';
                        keys[key] = true;
                        setTimeout(() => { keys[key] = false; }, Math.min(Math.abs(altDiff) * 100, 5000));
                    }
                    return { success: true, message: `Setting altitude to ${alt}m` };
                }
                default:
                    return { success: false, message: `Unknown tool: ${name}` };
            }
        }

        // Play PCM16 audio at 24kHz (Gemini Live output format)
        // Queued audio playback — schedules chunks back-to-back, no overlap
        let nextPlayTime = 0;

        function playPCMAudio(base64Data) {
            document.getElementById('voice-indicator').classList.remove('listening');
            document.getElementById('voice-indicator').classList.add('speaking');

            try {
                const binaryStr = atob(base64Data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

                // Convert PCM16 LE to Float32
                const pcm16 = new Int16Array(bytes.buffer);
                const float32 = new Float32Array(pcm16.length);
                for (let i = 0; i < pcm16.length; i++) {
                    float32[i] = pcm16[i] / 32768.0;
                }

                const ctx = playbackCtx || audioContext;
                const audioBuffer = ctx.createBuffer(1, float32.length, 24000);
                audioBuffer.getChannelData(0).set(float32);

                const source = ctx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ctx.destination);

                // Schedule this chunk right after the previous one ends
                const now = ctx.currentTime;
                if (nextPlayTime < now) nextPlayTime = now;
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;

                source.onended = () => {
                    // If nothing scheduled after this, we're done speaking
                    if (ctx.currentTime >= nextPlayTime - 0.05) {
                        document.getElementById('voice-indicator').classList.remove('speaking');
                        document.getElementById('voice-indicator').classList.add('listening');
                    }
                };
            } catch (error) {
                console.log('Audio playback error:', error.message);
            }
        }

        // Reset audio queue on new turn (when Gemini starts speaking)
        function resetAudioQueue() {
            nextPlayTime = 0;
        }
        
        // ============= INITIALIZE =============
        init();
        setupButtonListeners();
        
        console.log('🤖 DroneGPT Multi-Robot Simulator ready!');
        console.log('Available robots:', Object.keys(ROBOTS).join(', '));
    </script>
</body>

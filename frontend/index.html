        // ============= TRAIL PARTICLES (Phase 1C) =============
        function initTrailParticles(type) {
            if (trailParticles) { scene.remove(trailParticles); trailParticles = null; }
            trailPositions = [];

            const colors = { drone: 0xffffff, auv: 0x00ffff, rover: 0x8B6914, quadruped: 0x8B6914 };
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(TRAIL_COUNT * 3);
            const alphas = new Float32Array(TRAIL_COUNT);
            for (let i = 0; i < TRAIL_COUNT; i++) {
                positions[i * 3] = 0; positions[i * 3 + 1] = -1000; positions[i * 3 + 2] = 0;
                alphas[i] = 0;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const mat = new THREE.PointsMaterial({
                color: colors[type] || 0xffffff,
                size: type === 'drone' ? 0.15 : 0.1,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            trailParticles = new THREE.Points(geo, mat);
            scene.add(trailParticles);
        }

        let trailIndex = 0;
        function updateTrailParticles() {
            if (!trailParticles || !robot) return;
            const pos = trailParticles.geometry.attributes.position.array;
            const speed = robotState.velocity.length();
            if (speed < 0.02) return;

            // Emit from different positions based on robot type
            let emitPos;
            if (robotType === 'drone') {
                // Downwash from random prop position
                const pp = [[0.9, -0.3, 0.9], [-0.9, -0.3, 0.9], [0.9, -0.3, -0.9], [-0.9, -0.3, -0.9]];
                const p = pp[Math.floor(Math.random() * 4)];
                emitPos = new THREE.Vector3(p[0], p[1], p[2]).applyEuler(robot.rotation).add(robot.position);
                emitPos.x += (Math.random() - 0.5) * 0.3;
                emitPos.z += (Math.random() - 0.5) * 0.3;
            } else if (robotType === 'auv') {
                // Bubbles trailing behind
                emitPos = new THREE.Vector3(0, 0, 1).applyEuler(robot.rotation).multiplyScalar(1.5).add(robot.position);
                emitPos.y += (Math.random() - 0.5) * 0.3;
            } else {
                // Dust from base
                emitPos = robot.position.clone();
                emitPos.y = robot.position.y - 0.3;
                emitPos.x += (Math.random() - 0.5) * 0.5;
                emitPos.z += (Math.random() - 0.5) * 0.5;
            }

            const i3 = trailIndex * 3;
            pos[i3] = emitPos.x;
            pos[i3 + 1] = emitPos.y;
            pos[i3 + 2] = emitPos.z;
            trailIndex = (trailIndex + 1) % TRAIL_COUNT;

            // Fade: move old particles down/up
            for (let i = 0; i < TRAIL_COUNT; i++) {
                if (robotType === 'auv') {
                    pos[i * 3 + 1] += 0.02; // Bubbles rise
                } else if (robotType === 'drone') {
                    pos[i * 3 + 1] -= 0.03; // Downwash falls
                }
            }
            trailParticles.geometry.attributes.position.needsUpdate = true;
        }

        // ============= 3D WEATHER PARTICLES (Phase 3B) =============
        function create3DWeatherParticles() {
            if (weatherParticles) { scene.remove(weatherParticles); weatherParticles = null; }
            if (weather === 'clear' || weather === 'cloudy') return;

            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(WEATHER_PARTICLE_COUNT * 3);
            const spread = 100;
            for (let i = 0; i < WEATHER_PARTICLE_COUNT; i++) {
                positions[i * 3] = (Math.random() - 0.5) * spread;
                positions[i * 3 + 1] = Math.random() * 60;
                positions[i * 3 + 2] = (Math.random() - 0.5) * spread;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            let color, size;
            if (weather === 'rain' || weather === 'storm') { color = 0xaaccee; size = 0.15; }
            else if (weather === 'sandstorm') { color = 0xaa8844; size = 0.2; }
            else { color = 0x00ccff; size = 0.12; } // underwater bubbles

            const mat = new THREE.PointsMaterial({
                color, size, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            weatherParticles = new THREE.Points(geo, mat);
            scene.add(weatherParticles);
        }

        function update3DWeatherParticles() {
            if (!weatherParticles) return;
            const pos = weatherParticles.geometry.attributes.position.array;
            const spread = 100;
            for (let i = 0; i < WEATHER_PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                if (weather === 'rain' || weather === 'storm') {
                    pos[i3 + 1] -= 0.8; // Fall
                    pos[i3] += (Math.random() - 0.5) * 0.1;
                    if (pos[i3 + 1] < 0) { pos[i3 + 1] = 60; pos[i3] = robot.position.x + (Math.random() - 0.5) * spread; pos[i3 + 2] = robot.position.z + (Math.random() - 0.5) * spread; }
                } else if (weather === 'sandstorm') {
                    pos[i3] += 0.5; // Horizontal wind
                    pos[i3 + 1] += (Math.random() - 0.5) * 0.2;
                    if (pos[i3] > robot.position.x + spread / 2) { pos[i3] = robot.position.x - spread / 2; }
                } else {
                    // Bubbles (ocean)
                    pos[i3 + 1] += 0.05;
                    pos[i3] += (Math.random() - 0.5) * 0.05;
                    if (pos[i3 + 1] > 0) { pos[i3 + 1] = -25; pos[i3] = robot.position.x + (Math.random() - 0.5) * spread; pos[i3 + 2] = robot.position.z + (Math.random() - 0.5) * spread; }
                }
            }
            weatherParticles.geometry.attributes.position.needsUpdate = true;
        }

        // ============= WIND MODEL (Phase 5C) =============
        function updateWind() {
            windTime += 0.005;
            windVector.x = Math.sin(windTime * 0.7) * Math.cos(windTime * 0.3) * windStrength;
            windVector.z = Math.cos(windTime * 0.5) * Math.sin(windTime * 0.9) * windStrength;
            // Update wind UI
            const ws = windVector.length() * 1000;
            const windAngle = Math.atan2(windVector.x, windVector.z) * (180 / Math.PI);
            const el = document.getElementById('wind-indicator');
            if (robotType === 'drone') {
                el.classList.add('active');
                document.getElementById('wind-arrow').style.transform = `rotate(${windAngle}deg)`;
                document.getElementById('wind-text').textContent = ws.toFixed(1) + ' m/s';
            } else {
                el.classList.remove('active');
            }
        }

        // ============= COLLISION DETECTION (Phase 5B) =============
        function checkCollisions() {
            if (collidableMeshes.length === 0) return;
            const raycaster = new THREE.Raycaster();
            const directions = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1),
                new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1, 0)
            ];
            const threshold = 1.5;
            directions.forEach(dir => {
                raycaster.set(robot.position, dir);
                raycaster.far = threshold;
                const hits = raycaster.intersectObjects(collidableMeshes, true);
                if (hits.length > 0) {
                    // Zero velocity in collision direction
                    const dot = robotState.velocity.dot(dir);
                    if (dot > 0) {
                        robotState.velocity.sub(dir.clone().multiplyScalar(dot));
                    }
                }
            });
        }

        // ============= HUD INSTRUMENTS (Phase 2A, 2B) =============
        function drawAttitudeIndicator() {
            const canvas = document.getElementById('attitude-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = 100, h = 100, cx = w / 2, cy = h / 2;

            // Only show for drone/AUV
            const panel = document.getElementById('attitude-panel');
            if (robotType !== 'drone' && robotType !== 'auv') {
                if (panel) panel.style.display = 'none';
                return;
            }
            if (panel) panel.style.display = '';

            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, 55, 0, Math.PI * 2);
            ctx.clip();

            const pitch = robot ? robot.rotation.x : 0;
            const roll = robot ? robot.rotation.z : 0;
            const pitchOffset = pitch * 80;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-roll);

            // Sky
            ctx.fillStyle = '#3366aa';
            ctx.fillRect(-80, -80, 160, 80 + pitchOffset);
            // Ground
            ctx.fillStyle = '#885522';
            ctx.fillRect(-80, pitchOffset, 160, 80 - pitchOffset);
            // Horizon line
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-60, pitchOffset);
            ctx.lineTo(60, pitchOffset);
            ctx.stroke();

            // Pitch ladder
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1;
            ctx.font = '8px monospace';
            ctx.fillStyle = '#fff';
            for (let deg = -20; deg <= 20; deg += 10) {
                if (deg === 0) continue;
                const y = pitchOffset - deg * 2;
                ctx.beginPath();
                ctx.moveTo(-20, y);
                ctx.lineTo(20, y);
                ctx.stroke();
                ctx.fillText(Math.abs(deg) + '', 22, y + 3);
            }

            ctx.restore();

            // Aircraft symbol (static)
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx - 25, cy);
            ctx.lineTo(cx - 10, cy);
            ctx.lineTo(cx - 5, cy + 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + 25, cy);
            ctx.lineTo(cx + 10, cy);
            ctx.lineTo(cx + 5, cy + 5);
            ctx.stroke();
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(cx - 2, cy - 2, 4, 4);

            ctx.restore();

            // Border
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, 55, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawCompass() {
            const canvas = document.getElementById('compass-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = 240, h = 28;
            ctx.clearRect(0, 0, w, h);

            const yaw = robot ? -robot.rotation.y * (180 / Math.PI) : 0;
            const cardinals = { 0: 'N', 45: 'NE', 90: 'E', 135: 'SE', 180: 'S', 225: 'SW', 270: 'W', 315: 'NW' };

            ctx.fillStyle = 'rgba(0, 0, 0, 0.0)';
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.lineWidth = 1;

            const degsVisible = 120;
            const pxPerDeg = w / degsVisible;

            for (let deg = -degsVisible; deg <= degsVisible; deg += 5) {
                let actual = ((yaw + deg) % 360 + 360) % 360;
                const x = w / 2 + deg * pxPerDeg;
                if (x < 0 || x > w) continue;

                const rounded = Math.round(actual);
                if (rounded % 45 === 0 && cardinals[rounded]) {
                    ctx.fillStyle = '#00c8ff';
                    ctx.font = 'bold 11px monospace';
                    ctx.fillText(cardinals[rounded], x, 14);
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px monospace';
                } else if (rounded % 10 === 0) {
                    ctx.fillText(rounded + '°', x, 14);
                }

                if (rounded % 5 === 0) {
                    const tickH = rounded % 10 === 0 ? 8 : 4;
                    ctx.beginPath();
                    ctx.moveTo(x, h - tickH);
                    ctx.lineTo(x, h);
                    ctx.stroke();
                }
            }

            // Center pointer triangle
            ctx.fillStyle = '#00c8ff';
            ctx.beginPath();
            ctx.moveTo(w / 2, h - 2);
            ctx.lineTo(w / 2 - 5, h + 4);
            ctx.lineTo(w / 2 + 5, h + 4);
            ctx.closePath();
            ctx.fill();

            // Wind direction arrow on compass (if drone)
            if (robotType === 'drone' && windVector.length() > 0.001) {
                const windDeg = ((Math.atan2(windVector.x, windVector.z) * 180 / Math.PI) % 360 + 360) % 360;
                const windRelative = windDeg - yaw;
                const windX = w / 2 + windRelative * pxPerDeg;
                if (windX > 10 && windX < w - 10) {
                    ctx.fillStyle = '#ff8800';
                    ctx.beginPath();
                    ctx.moveTo(windX, 20);
                    ctx.lineTo(windX - 4, 28);
                    ctx.lineTo(windX + 4, 28);
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }

        // ============= TOAST NOTIFICATIONS (Phase 2D) =============
        function showToast(message) {

            toast.className = 'toast';

        // ============= AUDIO WAVEFORM (Phase 2E) =============
        function drawAudioWaveform() {
            const canvas = document.getElementById('waveform-canvas');
            if (!canvas || !audioAnalyser || !analyserData) return;
            const ctx = canvas.getContext('2d');
            const w = 90, h = 90, cx = w / 2, cy = h / 2;
            ctx.clearRect(0, 0, w, h);

            audioAnalyser.getByteFrequencyData(analyserData);
            const bars = 32;
            const step = Math.floor(analyserData.length / bars);
            const baseRadius = 32;
            const maxBarH = 12;

            for (let i = 0; i < bars; i++) {
                const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
                const val = analyserData[i * step] / 255;
                const barH = val * maxBarH;
                const x1 = cx + Math.cos(angle) * baseRadius;
                const y1 = cy + Math.sin(angle) * baseRadius;
                const x2 = cx + Math.cos(angle) * (baseRadius + barH);
                const y2 = cy + Math.sin(angle) * (baseRadius + barH);
                ctx.strokeStyle = `rgba(0, 200, 255, ${0.3 + val * 0.7})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        // ============= GROUND TEXTURE HELPER (Phase 3D) =============
        function createGroundTexture(baseColor, noiseColor, noiseAmount) {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, size, size);

            // Add noise patches
            for (let i = 0; i < noiseAmount; i++) {
                ctx.fillStyle = noiseColor;
                ctx.globalAlpha = 0.1 + Math.random() * 0.2;
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = 5 + Math.random() * 20;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(20, 20);
            return tex;
        }

        // ============= GOOGLE MAPS ENVIRONMENT (Phase 4) =============
        function loadMapsAPI(callback) {
            if (mapsApiLoaded) { callback(); return; }
            // Load Maps JS API exactly as per official docs: direct script tag
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://maps.googleapis.com/maps/api/js?key=' + MAPS_API_KEY + '&v=beta&libraries=maps3d';
            script.onload = () => {
                console.log('Google Maps JS API loaded');
                mapsApiLoaded = true;
                callback();
            };
            script.onerror = (e) => {
                console.error('Failed to load Google Maps JS API:', e);
                showToast('Failed to load Google Maps API. Check API key.');
                hideMapsEnv();
            };
            document.head.appendChild(script);
        }

        function createMapsEnv(cityKey) {
            const city = MAP_CITIES[cityKey] || MAP_CITIES.nyc;
            currentMapCity = cityKey;
            mapDroneLat = city.lat;
            mapDroneLng = city.lng;
            mapDroneAlt = 0;
            mapCamRange = 120; // Reset chase cam range

            // Show maps underneath, keep Three.js canvas on top (transparent) for drone model
            document.getElementById('maps-container').style.display = 'block';
            const sceneContainer = document.getElementById('scene-container');
            sceneContainer.style.display = '';
            sceneContainer.style.zIndex = '5'; // Above map (z-index 1), below UI (z-index 100)
            sceneContainer.style.pointerEvents = 'none'; // Let clicks through to map
            // Clear Three.js background so map shows through
            scene.background = null;
            scene.fog = null;

            // Reset drone to near ground level for maps mode
            robotState.position.set(0, 0.5, 0);
            robotState.velocity.set(0, 0, 0);
            if (robot) {
                robot.position.set(0, 0.5, 0);
                robot.rotation.set(0, 0, 0);
            }
            mapCamHeading = city.heading || 0;

            // Keep Three.js scene lit for drone model overlay
            const mapsLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(mapsLight);
            environmentObjects.push(mapsLight);
            const mapsSun = new THREE.DirectionalLight(0xffffff, 0.8);
            mapsSun.position.set(50, 100, 50);
            scene.add(mapsSun);
            environmentObjects.push(mapsSun);
            // Load HDRI for environment lighting only (NOT as background)
            loadHDRI('hdri/urban.hdr', () => {
                scene.background = null; // Keep transparent so map shows through
            });

            loadMapsAPI(() => {
                const mapDiv = document.getElementById('maps-container');
                // Remove old gmp-map-3d if any, but keep the drone marker
                const oldMap = mapDiv.querySelector('gmp-map-3d');
                if (oldMap) oldMap.remove();

                // Create gmp-map-3d exactly as per official Google docs
                const map3d = document.createElement('gmp-map-3d');
                map3d.setAttribute('mode', 'hybrid');
                map3d.setAttribute('center', city.lat + ', ' + city.lng);
                map3d.setAttribute('range', '120');
                map3d.setAttribute('tilt', '65');
                map3d.setAttribute('heading', String(city.heading || 0));
                map3d.style.width = '100%';
                map3d.style.height = '100%';
                mapDiv.insertBefore(map3d, mapDiv.firstChild);

                googleMap = map3d;
                showToast('3D Photorealistic Map — ' + city.name);
                console.log('gmp-map-3d created for', city.name, 'center:', city.lat + ',' + city.lng);
            });
        }

        let mapCamRange = 120; // Chase cam distance on map — closer for street-level feel
        let mapCamHeading = 0; // Map heading (follows drone yaw for chase cam)

        function updateMapsPosition() {
            if (currentEnvironment !== 'maps' || !googleMap) return;

            // Map Three.js velocity to lat/lng, rotated by map heading so screen-forward = map-forward
            const metersToDeg = 0.000009;
            const hSpeed = Math.sqrt(robotState.velocity.x * robotState.velocity.x + robotState.velocity.z * robotState.velocity.z);
            if (hSpeed > 0.02) {
                // Rotate velocity by map heading so Three.js forward (-Z) aligns with map forward
                const headRad = mapCamHeading * Math.PI / 180;
                const cosH = Math.cos(headRad);
                const sinH = Math.sin(headRad);
                const vx = robotState.velocity.x;
                const vz = robotState.velocity.z;
                const rotVx = vx * cosH - vz * sinH;
                const rotVz = vx * sinH + vz * cosH;
                mapDroneLat += -rotVz * metersToDeg;
                mapDroneLng += rotVx * metersToDeg / Math.cos(mapDroneLat * Math.PI / 180);
            }

            // Sync altitude from Three.js drone Y position (ground = 0.3)
            mapDroneAlt = Math.max(0, (robot.position.y - 0.3) * 5); // 1 Three.js unit ≈ 5m real world

            // Map heading stays fixed — drone model rotates on screen, no map orbiting
            const effectiveRange = mapCamRange + mapDroneAlt * 1.2;
            const effectiveTilt = Math.max(45, 67 - mapDroneAlt * 0.15);

            try {
                googleMap.setAttribute('center', mapDroneLat + ', ' + mapDroneLng + ', ' + mapDroneAlt);
                googleMap.setAttribute('heading', String(mapCamHeading));
                googleMap.setAttribute('tilt', String(effectiveTilt));
                googleMap.setAttribute('range', String(effectiveRange));
            } catch (e) {}
        }

        // Scroll wheel adjusts both map range AND Three.js chase cam together
        function initMapDragControls() {
            const mapDiv = document.getElementById('maps-container');
            mapDiv.addEventListener('wheel', (e) => {
                if (currentEnvironment !== 'maps') return;
                e.preventDefault();
                const factor = e.deltaY > 0 ? 1.1 : 0.9;
                mapCamRange = Math.max(30, Math.min(2000, mapCamRange * factor));
                // Scale Three.js chase cam proportionally so drone stays consistent with map
                chaseCamDistance = Math.max(3, Math.min(30, chaseCamDistance * factor));
                chaseCamHeight = Math.max(1, Math.min(15, chaseCamHeight * factor));
            }, { passive: false });
        }

        function hideMapsEnv() {
            const sceneContainer = document.getElementById('scene-container');
            sceneContainer.style.display = '';
            sceneContainer.style.zIndex = '1';
            sceneContainer.style.pointerEvents = '';
            document.getElementById('maps-container').style.display = 'none';
            // Restore default Three.js chase cam values
            chaseCamDistance = 12;
            chaseCamHeight = 5;
        }

        // ============= NAV LIGHT BLINK (Phase 1A) =============
        function updateNavLights() {
            if (!robot || robotType !== 'drone') return;
            const t = Date.now();
            robot.children.forEach(child => {
                if (child.userData.isStrobe) {
                    // White strobe: 1Hz double flash
                    const cycle = t % 1000;
                    child.visible = (cycle < 80) || (cycle > 120 && cycle < 200);
                } else if (child.userData.isNavLight) {
                    // Continuous nav lights with subtle pulse
                    const pulse = 0.7 + Math.sin(t * 0.005) * 0.3;
                    child.material.opacity = pulse;
                }
            });
        }

        // ============= ANIMATION LOOP =============
        function animate() {
            requestAnimationFrame(animate);

            // Update drone GLB animation (propeller spin)
            if (droneAnimMixer) {
                droneAnimMixer.update(animClock.getDelta());
            }

            updateWind();
            updateRobot();
            updateNavLights();
            updateTrailParticles();
            updateFOVCone();
            update3DWeatherParticles();
            drawAttitudeIndicator();
            drawCompass();
            drawAudioWaveform();

            // Animate ocean with multi-frequency waves
            environmentObjects.forEach(obj => {
                if (obj.userData && obj.userData.isOcean) {
                    const positions = obj.geometry.attributes.position.array;
                    const time = Date.now() * 0.001;
                    for (let i = 0; i < positions.length; i += 3) {
                        const x = positions[i], y = positions[i + 1];
                        positions[i + 2] =
                            Math.sin(x * 0.05 + time) * Math.cos(y * 0.05 + time) * 2 +
                            Math.sin(x * 0.12 + time * 1.5) * 0.5 +
                            Math.cos(y * 0.08 + time * 0.7) * 0.8;
                    }
                    obj.geometry.attributes.position.needsUpdate = true;
                }
            });

            // Google Maps updates
            if (currentEnvironment === 'maps') {
                updateMapsPosition();
            }

            controls.update();

            // Clamp camera to environment bounds
            if (envBounds) {
                camera.position.clamp(envBounds.min, envBounds.max);
            }

            // In maps mode, render with transparent background so map shows through
            if (currentEnvironment === 'maps') {
                renderer.setClearColor(0x000000, 0);
            }
            // Main render — always chase camera
            renderer.render(scene, camera);

            // FPV PiP render
            renderFPVPip();
        }

        let fpvMap3d = null;
        function renderFPVPip() {
            if (!robot || !fpvRenderer) return;
            const pip = document.getElementById('fpv-pip');

            if (currentEnvironment === 'maps') {
                // In Maps mode: show a second gmp-map-3d as the FPV camera
                if (!fpvMap3d && mapsApiLoaded) {
                    // Hide the Three.js FPV canvas, create a map FPV element
                    if (fpvRenderer.domElement) fpvRenderer.domElement.style.display = 'none';
                    fpvMap3d = document.createElement('gmp-map-3d');
                    fpvMap3d.setAttribute('mode', 'hybrid');
                    fpvMap3d.setAttribute('center', mapDroneLat + ', ' + mapDroneLng);
                    fpvMap3d.setAttribute('range', '30');
                    fpvMap3d.setAttribute('tilt', '80');
                    fpvMap3d.setAttribute('heading', '0');
                    fpvMap3d.style.width = '100%';
                    fpvMap3d.style.height = '100%';
                    fpvMap3d.style.borderRadius = '10px';
                    pip.insertBefore(fpvMap3d, pip.firstChild);
                }
                // Update FPV map camera to match drone's actual position and altitude
                if (fpvMap3d) {
                    const fpvHeading = (-robot.rotation.y * 180 / Math.PI) % 360;
                    fpvMap3d.setAttribute('center', mapDroneLat + ', ' + mapDroneLng + ', ' + mapDroneAlt);
                    fpvMap3d.setAttribute('heading', String(fpvHeading));
                    // FPV range and tilt scale with altitude for realistic downward camera
                    // Higher altitude = farther range (see more ground), lower tilt (more top-down)
                    const fpvRange = Math.max(5, mapDroneAlt * 0.8 + 10);
                    const fpvTilt = Math.max(40, 80 - mapDroneAlt * 0.5);
                    fpvMap3d.setAttribute('range', String(fpvRange));
                    fpvMap3d.setAttribute('tilt', String(fpvTilt));
                }
                return;
            }

            // In Three.js mode: remove map FPV if it exists, show canvas
            if (fpvMap3d) {
                fpvMap3d.remove();
                fpvMap3d = null;
                if (fpvRenderer.domElement) fpvRenderer.domElement.style.display = 'block';
            }
            // Hide robot so we don't see ourselves in first-person
            robot.visible = false;
            fpvRenderer.render(scene, fpvCamera);
            robot.visible = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            fpvCamera.aspect = 280 / 180;
            fpvCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ============= BUTTON HANDLERS =============
        function setupButtonListeners() {
            // Robot buttons
            document.querySelectorAll('#robot-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (btn.classList.contains('disabled')) return;
                    document.querySelectorAll('#robot-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switchRobot(btn.dataset.robot);
                }, true);
                btn.addEventListener('mousedown', e => e.stopPropagation(), true);
            });
            
            // Environment buttons
            document.querySelectorAll('#env-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (btn.classList.contains('disabled')) return;
                    document.querySelectorAll('#env-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadEnvironment(btn.dataset.env);
                }, true);
                btn.addEventListener('mousedown', e => e.stopPropagation(), true);
            });
            
            // Start button
            document.getElementById('start-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                startVoice();
            }, true);
            document.getElementById('start-btn').addEventListener('mousedown', e => e.stopPropagation(), true);
            
            // FPV toggle
            document.getElementById('fpv-toggle').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFPV();
            }, true);
            
            // Add waypoint
            document.getElementById('add-waypoint-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                addWaypoint();
            }, true);
            
            // Maps city selector buttons
            document.querySelectorAll('#maps-city-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('#maps-city-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    createMapsEnv(btn.dataset.city);
                }, true);
                btn.addEventListener('mousedown', e => e.stopPropagation(), true);
            });

            console.log('✅ Button listeners attached');
        }
        
        // ============= GEMINI LIVE VOICE API =============
        let websocket = null;
        let audioContext = null;
        let mediaStream = null;
        let isConnected = false;
        
        async function startVoice() {
            console.log('Starting voice control');
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('voice-overlay').style.display = 'flex';
            await initGeminiLive();
            await startAudioCapture();
        }
        
        function getEnvironmentDescription() {
            const descriptions = {
                warehouse: "an industrial warehouse complex with shipping containers, cranes, and a helipad",
                city: "a nighttime cityscape with towering skyscrapers and glowing windows",
                forest: "a dense forest with tall pine trees and a small clearing",
                desert: "a vast desert with sand dunes, ancient ruins, and distant pyramids",
                ocean: "an ocean oil rig platform surrounded by waves, with underwater coral and marine life below"
            };
            return descriptions[currentEnvironment] || "a 3D environment";
        }
        
        function getRobotDescription() {
            const descriptions = {
                drone: "a quadcopter drone capable of flying in any direction",
                auv: "a submarine ROV designed for underwater exploration",
                rover: "a wheeled ground rover for land exploration",
                quadruped: "a four-legged robot dog that can walk and run"
            };
            return descriptions[robotType] || "a robot";
        }
        
        function getSystemPrompt() {
            return `You are DroneGPT, an AI that inhabits ${getRobotDescription()} moving through a 3D world. You can see the environment and respond to voice commands.

PERSONALITY:
- You ARE the robot - speak in first person ("I can see...", "I'm moving over...", "Below me is...")
- Be observant and describe what you see when asked
- Keep responses brief (1-2 sentences max)
- Be helpful and enthusiastic about exploring
- You have a slightly playful personality

CURRENT STATE:
- Robot: ${ROBOTS[robotType].name} (${ROBOTS[robotType].icon})
- Environment: ${getEnvironmentDescription()}
- Battery: ${Math.round(battery)}%

CAPABILITIES for ${ROBOTS[robotType].name}:
${robotType === 'drone' ? '- Flying in any direction, ascending, descending, hovering' :
  robotType === 'auv' ? '- Diving, surfacing, underwater exploration, scanning seabed' :
  robotType === 'rover' ? '- Driving forward/backward, turning, navigating terrain' :
  '- Walking, running, sitting, standing, looking around'}

Remember: Keep responses SHORT and conversational.`;
        }
        
        async function initGeminiLive() {
            try {
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${GEMINI_API_KEY}`;
                
                websocket = new WebSocket(wsUrl);
                
                websocket.onopen = () => {
                    console.log('Connected to Gemini Live API');
                    setConnectionStatus(true);
                    
                    websocket.send(JSON.stringify({
                        setup: {
                            model: `models/${MODEL}`,
                            generationConfig: {
                                responseModalities: ['AUDIO', 'TEXT'],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: 'Puck'
                                        }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: getSystemPrompt() }]
                            }
                        }
                    }));
                };
                
                websocket.onmessage = (event) => handleGeminiResponse(JSON.parse(event.data));
                websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    setConnectionStatus(false);
                };
                websocket.onclose = () => {
                    console.log('WebSocket closed');
                    setConnectionStatus(false);
                };
            } catch (error) {
                console.error('Failed to connect:', error);
                document.getElementById('voice-status').textContent = 'Connection failed. Click mic to retry.';
            }
        }
        
        function setConnectionStatus(connected) {
            isConnected = connected;
            document.getElementById('status-dot').classList.toggle('connected', connected);
            document.getElementById('status-text').textContent = connected ? 'Connected' : 'Disconnected';
        }
        
        async function startAudioCapture() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });
                
                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);

                // Audio analyser for waveform visualization (Phase 2E)
                audioAnalyser = audioContext.createAnalyser();
                audioAnalyser.fftSize = 128;
                analyserData = new Uint8Array(audioAnalyser.frequencyBinCount);
                source.connect(audioAnalyser);

                processor.onaudioprocess = (e) => {
                    if (!isConnected || !websocket || websocket.readyState !== WebSocket.OPEN) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = convertFloat32ToPCM16(inputData);
                    const base64Audio = arrayBufferToBase64(pcm16.buffer);
                    
                    websocket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: base64Audio }]
                        }
                    }));
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                document.getElementById('voice-indicator').classList.add('listening');
                document.getElementById('voice-status').textContent = 'Listening... speak naturally';
            } catch (error) {
                console.error('Audio capture error:', error);
                document.getElementById('voice-status').textContent = 'Microphone access denied';
            }
        }
        
        function convertFloat32ToPCM16(float32Array) {
            const pcm16 = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm16;
        }
        
        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }
        
        function handleGeminiResponse(data) {
            console.log('Gemini response:', data);
            
            if (data.serverContent) {
                const content = data.serverContent;
                
                if (content.modelTurn?.parts) {
                    for (const part of content.modelTurn.parts) {
                        if (part.text) {
                            document.getElementById('voice-status').textContent = part.text;
                            showToast(part.text);
                        }
                        if (part.inlineData?.mimeType?.startsWith('audio/')) {
                            playAudioResponse(part.inlineData.data);
                        }
                    }
                }
                
                if (content.turnComplete) {
                    document.getElementById('voice-indicator').classList.remove('speaking');
                    document.getElementById('voice-indicator').classList.add('listening');
                }
            }
        }
        
        async function playAudioResponse(base64Audio) {
            document.getElementById('voice-indicator').classList.remove('listening');
            document.getElementById('voice-indicator').classList.add('speaking');
            
            try {
                const audioData = atob(base64Audio);
                const arrayBuffer = new ArrayBuffer(audioData.length);
                const view = new Uint8Array(arrayBuffer);
                for (let i = 0; i < audioData.length; i++) view[i] = audioData.charCodeAt(i);
                
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.start();
            } catch (error) {
                console.log('Audio playback note:', error.message);
            }
        }
        
        // ============= INITIALIZE =============
        init();
        setupButtonListeners();
        
        console.log('🤖 DroneGPT Multi-Robot Simulator ready!');
        console.log('Available robots:', Object.keys(ROBOTS).join(', '));
    </script>

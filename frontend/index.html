<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneGPT — AI with a Body</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0c10;
            --bg-panel: rgba(13, 17, 23, 0.92);
            --bg-panel-solid: #0d1117;
            --border: rgba(48, 54, 61, 0.6);
            --border-accent: rgba(56, 139, 253, 0.4);
            --accent: #388bfd;
            --accent-dim: rgba(56, 139, 253, 0.15);
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
            --text-dim: #484f58;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --mono: 'JetBrains Mono', 'Consolas', monospace;
            --sans: 'Inter', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }
        #container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .ui-layer > * { pointer-events: auto; }
        #scene-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* === TOP CONTROL BAR === */
        #control-bar {
            position: absolute; top: 0; left: 0; right: 0;
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            gap: 2px; padding: 6px 12px;
            background: linear-gradient(180deg, rgba(10, 12, 16, 0.95) 0%, rgba(10, 12, 16, 0.7) 100%);
            border-bottom: 1px solid var(--border);
        }
        .selector-row {
            display: flex; gap: 1px;
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 4px; padding: 2px;
        }
        .selector-btn {
            padding: 5px 12px; background: transparent;
            border: 1px solid transparent; border-radius: 3px;
            color: var(--text-secondary); cursor: pointer;
            font-size: 11px; font-family: var(--mono); font-weight: 400;
            transition: all 0.15s; white-space: nowrap; letter-spacing: 0.3px;
        }
        .selector-btn:hover { background: var(--accent-dim); color: var(--text-primary); }
        .selector-btn.active {
            background: var(--accent-dim); color: var(--accent);
            border-color: var(--border-accent); font-weight: 500;
        }
        .selector-btn.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
        .selector-label {
            font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-dim); padding: 5px 8px 5px 4px; font-family: var(--mono); font-weight: 500;
        }
        
        /* === VOICE CONTROLS === */
        #voice-overlay {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 1000;
        }
        #voice-suggestions { display: none; }
        #voice-status {
            background: rgba(0,0,0,0.85); border: 1px solid var(--border);
            border-radius: 4px; padding: 10px 20px; max-width: 700px;
            text-align: center; min-height: 40px; font-size: 13px;
            font-family: var(--sans); color: #e6edf3; line-height: 1.5;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }
        #voice-indicator {
            width: 52px; height: 52px; border-radius: 4px;
            background: var(--bg-panel); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; cursor: pointer;
        }
        #voice-indicator.listening {
            background: var(--accent-dim); border-color: var(--accent);
            animation: pulse-square 1.5s infinite;
        }
        #voice-indicator.speaking {
            background: rgba(63, 185, 80, 0.15); border-color: var(--success);
            animation: pulse-square 0.8s infinite;
        }
        @keyframes pulse-square {
            0%, 100% { box-shadow: 0 0 0 0 rgba(56, 139, 253, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(56, 139, 253, 0); }
        }
        #voice-indicator svg { width: 24px; height: 24px; fill: var(--text-primary); }
        #start-btn {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 10px 28px; font-size: 12px; font-family: var(--mono); font-weight: 500;
            background: var(--accent-dim); border: 1px solid var(--accent);
            border-radius: 4px; color: var(--accent); cursor: pointer;
            z-index: 2000; letter-spacing: 0.5px; text-transform: uppercase;
            transition: all 0.15s;
        }
        #start-btn:hover { background: var(--accent); color: var(--bg-primary); transform: translateX(-50%); }
        #start-btn.hidden { display: none; }
        
        /* === HUD — bottom left === */
        #hud {
            position: absolute; bottom: 16px; left: 16px; z-index: 1000;
            pointer-events: none; display: flex; flex-direction: column; gap: 6px;
        }
        .hud-panel {
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 4px; padding: 8px 10px;
        }
        .hud-title {
            font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-dim); margin-bottom: 4px; font-family: var(--mono); font-weight: 500;
        }
        .hud-value { font-size: 13px; font-weight: 500; font-family: var(--mono); color: var(--text-primary); }
        .hud-icon { font-size: 14px; margin-right: 4px; }
        #battery-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.06);
            border-radius: 2px; margin-top: 6px; overflow: hidden;
        }
        #battery-fill {
            height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s;
        }
        #battery-fill.low { background: var(--danger); }

        /* === TELEMETRY — top right row === */
        #telemetry {
            position: absolute; top: 42px; right: 16px; z-index: 1000;
            pointer-events: none; display: flex; gap: 2px;
        }
        .telemetry-item {
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 3px; padding: 4px 10px; min-width: 60px; text-align: center;
        }
        .telemetry-label {
            font-size: 8px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-dim); font-family: var(--mono);
        }
        .telemetry-value {
            font-size: 13px; font-weight: 500; color: var(--accent);
            font-family: var(--mono);
        }

        /* === CONNECTION STATUS === */
        #connection-status {
            position: absolute; top: 6px; right: 16px; z-index: 1000;
            display: flex; align-items: center; gap: 6px;
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 4px 12px; border-radius: 3px;
            pointer-events: auto; font-size: 11px; font-family: var(--mono);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
        .status-dot.connected { background: var(--success); }

        #fpv-toggle { display: none !important; }

        /* === FPV PiP === */
        #fpv-pip {
            position: absolute; bottom: 16px; right: 16px;
            width: 280px; height: 180px; background: #000;
            border: 1px solid var(--border); border-radius: 4px;
            overflow: hidden; z-index: 1000; pointer-events: auto; cursor: pointer;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }
        #fpv-pip.fullscreen {
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            border-radius: 0; border: none; z-index: 200;
        }
        #fpv-pip-label {
            position: absolute; top: 4px; left: 6px;
            font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--accent); font-family: var(--mono); font-weight: 500;
            background: rgba(10, 12, 16, 0.8); padding: 2px 6px;
            border-radius: 2px; pointer-events: none;
        }
        #fpv-pip .fpv-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; pointer-events: none;
        }
        #fpv-pip .fpv-crosshair::before,
        #fpv-pip .fpv-crosshair::after { content: ''; position: absolute; background: rgba(56, 139, 253, 0.5); }
        #fpv-pip .fpv-crosshair::before { width: 20px; height: 1px; top: 50%; left: 0; }
        #fpv-pip .fpv-crosshair::after { width: 1px; height: 20px; left: 50%; top: 0; }

        #minimap { display: none !important; }

        /* === WAYPOINTS PANEL === */
        #waypoints-panel { display: none !important; }

        /* === WEATHER INDICATOR === */
        #weather-indicator {
            position: absolute; top: 6px; right: 180px; z-index: 1000;
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 3px;
            font-size: 10px; font-family: var(--mono); display: flex; align-items: center; gap: 6px;
        }

        /* === CONTROLS HINT === */
        #controls-hint {
            position: absolute; bottom: 210px; left: 16px; z-index: 1000;
            pointer-events: none; background: var(--bg-panel); border: 1px solid var(--border);
            padding: 6px 10px; border-radius: 3px;
            font-size: 10px; color: var(--text-dim); max-width: 150px; line-height: 1.5;
            font-family: var(--mono);
        }
        #controls-hint kbd {
            background: rgba(255,255,255,0.06); padding: 1px 4px; border-radius: 2px;
            font-family: var(--mono); font-size: 9px; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .underwater-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; background: linear-gradient(180deg, rgba(0, 60, 100, 0.25), rgba(0, 30, 50, 0.45));
            z-index: 50; opacity: 0; transition: opacity 0.5s;
        }
        .underwater-overlay.active { opacity: 1; }
        #weather-effects {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 49; overflow: hidden;
        }
        .rain {
            position: absolute; width: 1px; height: 20px;
            background: linear-gradient(transparent, rgba(174, 194, 224, 0.4));
            animation: rain-fall 0.5s linear infinite;
        }
        @keyframes rain-fall { 0% { transform: translateY(-20px); } 100% { transform: translateY(100vh); } }
        
        @media (max-width: 768px) {
            #control-bar { flex-wrap: wrap; gap: 4px; padding: 4px 8px; }
            .selector-btn { padding: 5px 8px; font-size: 10px; }
            .selector-label { display: none; }
            #hud, #telemetry, #minimap, #controls-hint, #waypoint-btn, #fpv-btn, .feature-buttons { display: none !important; }
            #voice-overlay { bottom: 120px; }
            #voice-status { font-size: 12px; padding: 8px 14px; max-width: 85vw; }
            #start-btn { padding: 12px 24px; font-size: 12px; }
            #connection-status { top: auto; bottom: 8px; right: 8px; }
        }
        
        /* Mobile controls */
        #mobile-controls { display: none; position: absolute; bottom: 20px; left: 0; right: 0; z-index: 500; pointer-events: none; }
        @media (max-width: 768px) { #mobile-controls { display: flex; justify-content: space-between; padding: 0 20px; } }
        .joystick-zone {
            width: 80px; height: 80px; background: rgba(56, 139, 253, 0.08);
            border: 1px solid var(--border-accent); border-radius: 50%;
            position: relative; pointer-events: auto; touch-action: none;
        }
        .joystick-knob {
            width: 40px; height: 40px; background: rgba(56, 139, 253, 0.3);
            border: 1px solid var(--accent); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .joystick-label { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--accent); font-family: var(--mono); text-transform: uppercase; }
        #mobile-vertical { display: none; position: absolute; bottom: 150px; right: 16px; z-index: 500; flex-direction: column; gap: 8px; }
        @media (max-width: 768px) { #mobile-vertical { display: flex; } }
        .mobile-btn {
            width: 44px; height: 44px; background: var(--accent-dim);
            border: 1px solid var(--border-accent); border-radius: 4px;
            color: var(--text-primary); font-size: 18px; cursor: pointer;
            pointer-events: auto; touch-action: none; font-family: var(--mono);
        }
        .mobile-btn:active { background: var(--accent); }

        /* Attitude indicator */
        #attitude-panel { text-align: center; }
        #attitude-canvas { border-radius: 50%; border: 1px solid var(--border); }

        /* Compass */
        #compass-container {
            position: absolute; top: 36px; left: 50%; transform: translateX(-50%);
            z-index: 999; pointer-events: none;
        }
        #compass-canvas { border-radius: 3px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(8px); }

        /* FPV HUD */
        #fpv-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; display: none; }
        #fpv-hud .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #fpv-hud .crosshair-h { position: absolute; width: 40px; height: 1px; background: rgba(56, 139, 253, 0.5); top: 50%; transform: translateY(-50%); }
        #fpv-hud .crosshair-h.left { left: -30px; }
        #fpv-hud .crosshair-h.right { left: 10px; }
        #fpv-hud .crosshair-v { position: absolute; width: 1px; height: 40px; background: rgba(56, 139, 253, 0.5); left: 50%; transform: translateX(-50%); }
        #fpv-hud .crosshair-v.top { top: -30px; }
        #fpv-hud .crosshair-v.bot { top: 10px; }
        #fpv-hud .crosshair-dot { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #fpv-hud .velocity-vector { position: absolute; width: 8px; height: 8px; border: 1px solid rgba(56, 139, 253, 0.5); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: transform 0.1s; }

        /* Toast notifications */
        #toast-container {
            position: absolute; top: 80px; right: 16px; z-index: 2000;
            display: flex; flex-direction: column; gap: 4px;
            pointer-events: none; max-width: 340px;
        }
        .toast {
            background: var(--bg-panel); border: 1px solid var(--border);
            border-left: 2px solid var(--accent); border-radius: 3px;
            padding: 8px 12px; color: var(--text-primary); font-size: 12px;
            font-family: var(--sans); line-height: 1.4;
            animation: toast-in 0.2s ease-out, toast-out 0.2s ease-in 4.8s forwards;
        }
        .toast .toast-label {
            font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--accent); margin-bottom: 3px; font-family: var(--mono); font-weight: 500;
        }
        @keyframes toast-in { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toast-out { from { opacity: 1; } to { opacity: 0; } }

        /* Audio waveform */
        #waveform-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; pointer-events: none; z-index: -1; }

        /* Transcript panel */
        #transcript-panel {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 500px; max-height: 200px; overflow-y: auto;
            z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; gap: 4px;
        }
        .transcript-msg {
            padding: 8px 14px; border-radius: 4px; font-size: 13px;
            font-family: var(--mono); line-height: 1.4; max-width: 90%;
            animation: transcript-fade 0.2s ease-in;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .transcript-msg.user {
            background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.3);
            color: #ffffff; align-self: flex-end; text-align: right;
        }
        .transcript-msg.agent {
            background: rgba(0,0,0,0.85); border: 1px solid rgba(56,139,253,0.4);
            color: #e6edf3; align-self: flex-start;
        }
        @keyframes transcript-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        #voice-indicator { position: relative; }

        /* Google Maps */
        #maps-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: none; }
        #maps-city-selector {
            display: none; gap: 2px;
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 2px; border-radius: 4px;
        }
        #maps-city-selector.visible { display: flex; }

        /* Wind indicator */
        #wind-indicator {
            position: absolute; top: 6px; right: 280px; z-index: 1000;
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 3px;
            font-size: 10px; font-family: var(--mono); display: flex; align-items: center; gap: 4px;
            color: var(--text-secondary); opacity: 0;
        }
        #wind-indicator.active { opacity: 1; }

        /* Speed indicator */
        #speed-indicator {
            position: absolute; top: 6px; left: 16px; z-index: 1000;
            font-size: 11px; font-family: var(--mono); color: var(--text-dim);
            display: flex; align-items: center; gap: 4px;
        }

        /* Old wind indicator override — use new styles above */
        #wind-arrow {
            display: inline-block;
            transition: transform 0.5s;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="scene-container"></div>
        <div class="underwater-overlay" id="underwater-overlay"></div>
        <div id="weather-effects"></div>
        
        <!-- Mobile Touch Controls -->
        <div id="mobile-controls">
            <div class="joystick-zone" id="joystick-left">
                <div class="joystick-knob" id="knob-left"></div>
                <span class="joystick-label">Move</span>
            </div>
            <div class="joystick-zone" id="joystick-right">
                <div class="joystick-knob" id="knob-right"></div>
                <span class="joystick-label">Look</span>
            </div>
        </div>
        <div id="mobile-vertical">
            <button class="mobile-btn" id="btn-up">↑</button>
            <button class="mobile-btn" id="btn-down">↓</button>
        </div>
        
        <!-- Google Maps Container -->
        <div id="maps-container"></div>

        <!-- FPV Crosshair Overlay -->
        <div id="fpv-hud">
            <div class="crosshair">
                <div class="crosshair-h left"></div>
                <div class="crosshair-h right"></div>
                <div class="crosshair-v top"></div>
                <div class="crosshair-v bot"></div>
                <div class="crosshair-dot"></div>
                <div class="velocity-vector" id="velocity-vector"></div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>

        <div class="ui-layer">
            <!-- Control Bar -->
            <div id="control-bar">
                <div class="selector-row" id="robot-selector">
                    <span class="selector-label">ROBOT</span>
                    <button class="selector-btn active" data-robot="drone">DRONE</button>
                    <button class="selector-btn" data-robot="auv">AUV</button>
                    <button class="selector-btn" data-robot="rover">ROVER</button>
                </div>
                <div class="selector-row" id="env-selector">
                    <span class="selector-label">ENV</span>
                    <button class="selector-btn" data-env="london">CITY</button>
                    <button class="selector-btn" data-env="tokyo">TOKYO</button>
                    <button class="selector-btn" data-env="ocean">UNDERWATER</button>
                    <button class="selector-btn active" data-env="maps">MAPS</button>
                </div>
                <div id="maps-city-selector">
                    <span class="selector-label">CITY</span>
                    <button class="selector-btn" data-city="nyc">NEW YORK</button>
                    <button class="selector-btn" data-city="sf">SAN FRANCISCO</button>
                    <button class="selector-btn" data-city="london3d">LONDON</button>
                </div>
            </div>
            
            <!-- FPV Toggle -->
            <button id="fpv-toggle">👁️ FPV View</button>
            
            <!-- Connection Status -->
            <div id="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
            
            <!-- Weather Indicator -->
            <div id="weather-indicator">
                <span id="weather-icon">☀️</span>
                <span id="weather-text">Clear</span>
            </div>

            <!-- Wind Indicator -->
            <div id="wind-indicator">
                <span id="wind-arrow">➤</span>
                <span id="wind-text">0 m/s</span>
            </div>

            <!-- Compass Heading Strip -->
            <div id="compass-container">
                <canvas id="compass-canvas" width="320" height="36"></canvas>
            </div>
            
            <!-- Start Button -->
            <button id="start-btn">START VOICE CONTROL</button>
            
            <!-- HUD — compact bottom-left -->
            <div id="hud">
                <div class="hud-panel" id="attitude-panel">
                    <canvas id="attitude-canvas" width="100" height="100"></canvas>
                </div>
                <div class="hud-panel">
                    <div class="hud-title">Battery</div>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <div class="hud-value" id="battery-text">100%</div>
                    </div>
                    <div id="battery-bar"><div id="battery-fill" style="width: 100%"></div></div>
                </div>
            </div>
            <!-- Hidden elements still referenced by JS -->
            <span id="robot-icon" style="display:none">🚁</span>
            <span id="robot-name" style="display:none">Quadcopter</span>
            <span id="env-name" style="display:none">Warehouse</span>
            
            <!-- Telemetry — single compact row -->
            <div id="telemetry">
                <div class="telemetry-item">
                    <div class="telemetry-label" id="alt-label">ALT</div>
                    <div class="telemetry-value" id="telem-alt">10.0m</div>
                </div>
                <div class="telemetry-item">
                    <div class="telemetry-label">SPD</div>
                    <div class="telemetry-value" id="telem-spd">0.0</div>
                </div>
                <div class="telemetry-item">
                    <div class="telemetry-label">X</div>
                    <div class="telemetry-value" id="telem-x">0.0</div>
                </div>
                <div class="telemetry-item">

            function setupJoystick(zoneId, knobId, onMove) {
                const zone = document.getElementById(zoneId);
                const knob = document.getElementById(knobId);
                if (!zone || !knob) return;
                
                let active = false;
                let startX, startY;
                const maxDist = 35;
                
                zone.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    active = true;
                    const touch = e.touches[0];
                    const rect = zone.getBoundingClientRect();
                    startX = rect.left + rect.width / 2;
                    startY = rect.top + rect.height / 2;
                }, { passive: false });
                
                zone.addEventListener('touchmove', (e) => {
                    if (!active) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    let dx = touch.clientX - startX;
                    let dy = touch.clientY - startY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > maxDist) {
                        dx = dx / dist * maxDist;
                        dy = dy / dist * maxDist;
                    }
                    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    onMove(dx / maxDist, dy / maxDist);
                }, { passive: false });
                
                const endTouch = () => {
                    active = false;
                    knob.style.transform = 'translate(-50%, -50%)';
                    onMove(0, 0);
                };
                zone.addEventListener('touchend', endTouch);
                zone.addEventListener('touchcancel', endTouch);
            }

            if (fovCone) { scene.remove(fovCone); fovCone = null; }
            if (type === 'drone') {
                fovCone = new THREE.Group();
                // 4 frustum edge lines
                const lineMat = new THREE.LineBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.4 });
                for (let i = 0; i < 4; i++) {
                    const geom = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(0, 0, 0),
                        new THREE.Vector3(0, -1, 0)
                    ]);
                    const line = new THREE.Line(geom, lineMat);
                    line.userData.fovLine = true;
                    fovCone.add(line);
                }
                // Ground rectangle outline
                const rectGeom = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0), new THREE.Vector3(1, 0, 0),
                    new THREE.Vector3(1, 0, 1), new THREE.Vector3(0, 0, 1),
                    new THREE.Vector3(0, 0, 0)
                ]);
                const rectLine = new THREE.Line(rectGeom, lineMat.clone());
                rectLine.userData.fovRect = true;
                fovCone.add(rectLine);

                    color: 0x00ccff, transparent: true, opacity: 0.06,
                    side: THREE.DoubleSide, depthWrite: false
                });
                const fill = new THREE.Mesh(fillGeom, fillMat);
                fill.rotation.x = -Math.PI / 2;

        function createDrone() {
            // Clean up previous animation mixer
            if (droneAnimMixer) {
                droneAnimMixer.stopAllAction();
                droneAnimMixer = null;
            }

            // Capture current robot group so async callback adds to the right one
            const targetRobot = robot;

            // Load animated drone GLB model
            const loader = new GLTFLoaderModule();
            loader.setDRACOLoader(dracoLoader);

            loader.load('drone.glb', (gltf) => {
                // Bail if robot was switched before GLB loaded
                if (robot !== targetRobot) return;
                const model = gltf.scene;

                // The GLB bounding box is ~0.25 x 0.07 x 0.2 units
                // Scale to ~2m wingspan (realistic DJI-style drone)
                const droneScale = 8;
                model.scale.setScalar(droneScale);

                // Center the model and rotate 180° (GLB faces backward)
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.position.y = 0;
                model.rotation.y = Math.PI; // Flip — gimbal/camera faces -Z (forward)

                model.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material) {
                            if (scene.environment) child.material.envMap = scene.environment;
                            child.material.needsUpdate = true;
                        }
                    }
                });

                robot.add(model);

                // Play "hover" animation (index 0 — propeller spin)
                if (gltf.animations && gltf.animations.length > 0) {
                    droneAnimMixer = new THREE.AnimationMixer(model);
                    const hoverClip = gltf.animations.find(a => a.name === 'hover') || gltf.animations[0];
                    const action = droneAnimMixer.clipAction(hoverClip);
                    action.play();
                }

                // Position nav lights based on actual model bounds
                const droneBox = new THREE.Box3().setFromObject(model);
                const droneSize = droneBox.getSize(new THREE.Vector3());
                const dx = droneSize.x / 2;   // half wingspan
                const dy = droneSize.y;        // height
                const dz = droneSize.z / 2;    // half length
                const lightScale = Math.max(dx * 0.015, 0.008);

                // Green starboard (right) — tight to body
                const greenNav = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
                );
                greenNav.position.set(dx * 0.35, dy * 0.15, 0);
                greenNav.userData.isNavLight = true;
                greenNav.userData.navColor = 0x00ff00;
                robot.add(greenNav);

                // Red port (left wing tip)
                const redNav = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale),
                    new THREE.MeshBasicMaterial({ color: 0xff0000 })
                );
                redNav.position.set(-dx * 0.35, dy * 0.15, 0);
                redNav.userData.isNavLight = true;
                redNav.userData.navColor = 0xff0000;
                robot.add(redNav);

                // White strobe on top
                navLightStrobe = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale * 0.8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                navLightStrobe.position.set(0, dy * 0.35, 0);
                navLightStrobe.userData.isStrobe = true;
                robot.add(navLightStrobe);

                // White tail light
                const tailNav = new THREE.Mesh(
                    new THREE.SphereGeometry(lightScale * 0.8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                tailNav.position.set(0, dy * 0.1, dz * 0.3);
                tailNav.userData.isNavLight = true;
                tailNav.userData.navColor = 0xffffff;
                robot.add(tailNav);

                console.log('Drone GLB loaded, size:', droneSize.x.toFixed(2), 'x', droneSize.y.toFixed(2), 'x', droneSize.z.toFixed(2),
                    'animations:', gltf.animations.map(a => a.name));
            }, undefined, (error) => {
                console.error('Failed to load drone GLB, using fallback:', error);
                createDroneFallback();
            });
        }

        // Fallback procedural drone if GLB fails to load
        function createDroneFallback() {
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7, roughness: 0.3 });
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.25, 1.0), bodyMat);
            robot.add(body);
            const armGeom = new THREE.BoxGeometry(0.12, 0.08, 1.6);
            [{ rY: Math.PI / 4 }, { rY: -Math.PI / 4 }].forEach(a => {
                const arm = new THREE.Mesh(armGeom, darkMat);
                arm.rotation.y = a.rY;
                robot.add(arm);
            });
            const propGeom = new THREE.CircleGeometry(0.42, 32);
            const propMat = new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
            [[0.9, 0.15, 0.9], [-0.9, 0.15, 0.9], [0.9, 0.15, -0.9], [-0.9, 0.15, -0.9]].forEach(pos => {
                const prop = new THREE.Mesh(propGeom, propMat);
                prop.position.set(pos[0], pos[1], pos[2]);
                prop.rotation.x = -Math.PI / 2;
                robot.add(prop);
            });
        }
        
        function createAUV() {
            // Submarine body - torpedo shape along Z axis (forward = -Z)
            const bodyGeom = new THREE.CylinderGeometry(0.5, 0.5, 2, 16, 1, false);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.6, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.rotation.x = Math.PI / 2; // Lay along Z axis
            robot.add(body);

            // Propeller housing — at back (+Z)
            const propHouse = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 0.4, 8),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            propHouse.rotation.x = Math.PI / 2;
            propHouse.position.set(0, 0, 1.3);
            robot.add(propHouse);

            // Propeller — at back
            const propGeom = new THREE.BoxGeometry(0.6, 0.05, 0.15);
            const propMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            for (let i = 0; i < 3; i++) {
                const blade = new THREE.Mesh(propGeom, propMat);

        // ============= ROBOT SWITCHING =============
        function switchRobot(type) {
            if (!ROBOTS[type]) return;
            
            const cfg = ROBOTS[type];
            
            // Check if robot is compatible with current environment
            if (!cfg.environments.includes(currentEnvironment)) {
                // Switch to first compatible environment
                const compatEnv = cfg.environments[0];
                loadEnvironment(compatEnv);
                document.querySelectorAll('#env-selector .selector-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.env === compatEnv);
                });
            }
            
            robotType = type;
            robotState.position.y = cfg.startHeight;
            robotState.velocity.set(0, 0, 0);
            
            createRobot(type);
            updateEnvironmentButtons();
            
            // Update underwater state
            isUnderwater = (type === 'auv' && currentEnvironment === 'ocean');
            document.getElementById('underwater-overlay').classList.toggle('active', isUnderwater);
            document.getElementById('alt-label').textContent = isUnderwater ? 'DEPTH' : 'ALT';

            const cfg = ROBOTS[robotType];

        // ============= ENVIRONMENT CREATION =============
        function clearEnvironment() {
            environmentObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                    else obj.material.dispose();
                }
            });
            environmentObjects = [];
            envBounds = null;
            // Reset camera constraints for procedural envs
            controls.minDistance = 5;
            controls.maxDistance = 500;
            // Clear 3D weather particles
            if (weatherParticles) { scene.remove(weatherParticles); weatherParticles = null; }
        }
        
        // Load HDRI environment map
        function loadHDRI(hdriPath, callback) {
            if (!hdriLoader) {
                console.warn('HDRI loader not initialized');
                if (callback) callback(null);
                return;
            }
            
            hdriLoader.load(hdriPath, (texture) => {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
                console.log('HDRI loaded:', hdriPath);
                if (callback) callback(texture);
            }, undefined, (err) => {
                console.error('HDRI load error:', err);
                // Fallback to solid color
                scene.background = new THREE.Color(0x87ceeb);
                if (callback) callback(null);
            });
        }
        
        // Load GLB environment (World Labs exports)
        function createGLBEnv(glbPath) {
            // Load GLB model
            const loader = new GLTFLoaderModule();
            loader.setDRACOLoader(dracoLoader);
            loader.load(glbPath, (gltf) => {
                const model = gltf.scene;

                // Get model bounds
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);

                // Compute vertex-weighted center (ignores outlier meshes with few vertices)
                let totalVerts = 0, wcx = 0, wcz = 0;
                model.traverse(child => {
                    if (child.isMesh && child.geometry && child.geometry.attributes.position) {
                        const vCount = child.geometry.attributes.position.count;
                        const meshBox = new THREE.Box3().setFromObject(child);
                        const mc = meshBox.getCenter(new THREE.Vector3());
                        wcx += mc.x * vCount;
                        wcz += mc.z * vCount;
                        totalVerts += vCount;
                    }
                });
                const weightedCenterX = totalVerts > 0 ? wcx / totalVerts : center.x;
                const weightedCenterZ = totalVerts > 0 ? wcz / totalVerts : center.z;

                // Center on geometry-weighted center and put bottom at y=0
                model.position.set(-weightedCenterX, -box.min.y, -weightedCenterZ);
                console.log('Model centering: bbox center:', center.x.toFixed(1), center.z.toFixed(1),
                    '→ weighted center:', weightedCenterX.toFixed(1), weightedCenterZ.toFixed(1));

                // Enable shadows + mark as collidable
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        child.userData.isCollidable = true;
                        collidableMeshes.push(child);
                    }
                });

                scene.add(model);
                environmentObjects.push(model);

                // --- Fog scaled to model size ---
                scene.fog = new THREE.FogExp2(0x888888, 2.0 / maxDim);

                // --- Lighting scaled to model ---
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambient);
                environmentObjects.push(ambient);

                const sun = new THREE.DirectionalLight(0xffffff, 1.0);
                sun.position.set(maxDim * 0.3, maxDim * 0.6, maxDim * 0.3);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 4096;
                sun.shadow.mapSize.height = 4096;
                const shadowSpan = maxDim * 0.4;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = maxDim * 2;
                sun.shadow.camera.left = -shadowSpan;
                sun.shadow.camera.right = shadowSpan;
                sun.shadow.camera.top = shadowSpan;
                sun.shadow.camera.bottom = -shadowSpan;
                scene.add(sun);
                environmentObjects.push(sun);

                // Force world matrix update so raycaster returns world-space coordinates
                model.updateMatrixWorld(true);

                // --- Find ground level using grid raycasting + Y-binning ---
                // Cast a grid of rays from above and collect all hit Y values.
                // Bin them: the Y bin with the MOST hits is the ground level,
                // because the ground surface is consistent across the whole model
                // while rooftops vary in height.
                const raycaster = new THREE.Raycaster();
                // After repositioning, model bottom is at Y=0, top at Y=size.y
                const sceneTop = size.y + 1;
                let groundY = -box.min.y; // Fallback: original Y=0 maps here

                const allHitYs = [];
                const gridN = 5;
                for (let gx = 0; gx < gridN; gx++) {
                    for (let gz = 0; gz < gridN; gz++) {
                        // Cover central 30% of model in XZ (where main city is)
                        const rx = ((gx / (gridN - 1)) - 0.5) * size.x * 0.3;
                        const rz = ((gz / (gridN - 1)) - 0.5) * size.z * 0.3;
                        raycaster.set(
                            new THREE.Vector3(rx, sceneTop, rz),
                            new THREE.Vector3(0, -1, 0)
                        );
                        const hits = raycaster.intersectObject(model, true);
                        for (const h of hits) allHitYs.push(h.point.y);
                    }
                }

                if (allHitYs.length > 0) {
                    // Bin hit Y values and find the mode (most populated bin = ground)
                    const binSize = 15;
                    const bins = {};
                    for (const y of allHitYs) {
                        const bin = Math.round(y / binSize) * binSize;
                        bins[bin] = (bins[bin] || 0) + 1;
                    }
                    let bestBin = 0, bestCount = 0;
                    for (const [bin, count] of Object.entries(bins)) {
                        if (count > bestCount) { bestCount = count; bestBin = Number(bin); }
                    }
                    groundY = bestBin;
                    console.log('Ground detected at Y:', groundY.toFixed(1),
                        '(from', allHitYs.length, 'ray hits across', gridN * gridN, 'rays,',
                        Object.keys(bins).length, 'Y-bins, best bin count:', bestCount, ')');
                    // Log top 5 bins for debugging
                    const sortedBins = Object.entries(bins).sort((a, b) => b[1] - a[1]).slice(0, 5);
                    console.log('Top Y-bins:', sortedBins.map(([b, c]) => `Y=${b}(${c})`).join(', '));
                } else {
                    console.log('No ray hits, using fallback ground Y:', groundY.toFixed(1));
                }

                // Store ground level for altitude display
                envGroundY = groundY;

                // Place drone just above the detected ground, at the center of the model
                const startHeight = groundY + 3;
                robotState.position.set(0, startHeight, 0);
                robotState.velocity.set(0, 0, 0);

                // Scale robot to be realistic in the environment
                // GLB drone is ~2m with scale 8. Env might be 1500 units ≈ 1500m.
                // We want the drone to appear realistic. envScale applies on TOP of the drone's own 8x scale.
                const envScale = Math.max(maxDim / 800, 0.5);
                robot.scale.setScalar(envScale);

                // --- Store environment bounds ---
                const margin = maxDim * 0.02;
                envBounds = {
                    min: new THREE.Vector3(-size.x / 2 + margin, groundY - 1, -size.z / 2 + margin),
                    max: new THREE.Vector3(size.x / 2 - margin, size.y - margin, size.z / 2 - margin)
                };

                // --- Update chase cam params based on env scale ---
                chaseCamDistance = 12 * envScale;
                chaseCamHeight = 5 * envScale;

                // --- Camera: third-person behind drone ---
                const camBehind = chaseCamDistance;
                camera.position.set(0, startHeight + chaseCamHeight, camBehind);
                controls.target.set(0, startHeight, 0);
                controls.update();

                console.log('GLB loaded:', glbPath,
                    'Size:', size.x.toFixed(1), 'x', size.y.toFixed(1), 'x', size.z.toFixed(1),
                    'BBox Y:', box.min.y.toFixed(1), '->', box.max.y.toFixed(1),
                    'Ground:', groundY.toFixed(1), 'Drone:', startHeight.toFixed(1),
                    'Scale:', envScale.toFixed(2));
            }, undefined, (err) => {
                console.error('GLB load error:', err);
                // Fallback lighting if GLB fails
                scene.fog = new THREE.FogExp2(0x888888, 0.002);
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambient);
                environmentObjects.push(ambient);
            });
        }
        
        function loadEnvironment(envName) {
            clearEnvironment();
            collidableMeshes = []; // Reset collidables
            envGroundY = 0; // Reset ground level
            currentEnvironment = envName;

            // Hide/show Maps container
            if (envName === 'maps') {
                document.getElementById('maps-city-selector').classList.add('visible');
                createMapsEnv(currentMapCity);
                // Start screen share for Gemini vision if voice is active
                if (isConnected && !screenStream) startScreenShare();
            } else {
                hideMapsEnv();
                document.getElementById('maps-city-selector').classList.remove('visible');
            }

            const envCfg = ENVIRONMENTS[envName];
            document.getElementById('env-name').textContent = envCfg.name;

            // Load HDRI skybox first
            if (envCfg.hdri) {
                loadHDRI(envCfg.hdri);
            }

            // Set weather
            weather = envCfg.weather[Math.floor(Math.random() * envCfg.weather.length)];
            updateWeatherUI();

            // Check robot compatibility
            const robotCfg = ROBOTS[robotType];
            if (!robotCfg.environments.includes(envName)) {
                // Auto-switch to compatible robot
                const compatRobot = envName === 'ocean' ? 'auv' : 'drone';
                switchRobot(compatRobot);
                document.querySelectorAll('#robot-selector .selector-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.robot === compatRobot);
                });
            }

            switch(envName) {
                case 'london': createGLBEnv('environments/london-city.glb'); break;
                case 'warehouse': createWarehouseEnv(); break;
                case 'city': createCityEnv(); break;
                case 'forest': createForestEnv(); break;
                case 'desert': createDesertEnv(); break;
                case 'ocean': createOceanEnv(); break;
                case 'tokyo': createTokyoEnv(); break;
                case 'maps': break; // Handled above
            }

            // Update underwater state
            isUnderwater = (robotType === 'auv' && envName === 'ocean');
            document.getElementById('underwater-overlay').classList.toggle('active', isUnderwater);
            document.getElementById('alt-label').textContent = isUnderwater ? 'DEPTH' : 'ALT';

            // Reset robot position (GLB envs handle their own positioning in the load callback)
            const isGLBEnv = envCfg.glb || envName === 'tokyo';
            if (!isGLBEnv && envName !== 'maps') {
                robotState.position.set(0, ROBOTS[robotType].startHeight, 0);
                robotState.velocity.set(0, 0, 0);
            }

            updateEnvironmentButtons();
            applyWeatherEffects();

            // Create 3D weather particles (Phase 3B)
            create3DWeatherParticles();
        }

        function createCityEnv() {

        // ============= UNDERWATER GLB ENVIRONMENT =============
        function createUnderwaterGLBEnv() {
            // Underwater atmosphere
            scene.fog = new THREE.FogExp2(0x003355, 0.008);

            // Dim blue-green underwater lighting
            const ambient = new THREE.AmbientLight(0x4488aa, 0.4);
            scene.add(ambient);
            environmentObjects.push(ambient);

            // Caustic-like directional light from above
            const sunBeam = new THREE.DirectionalLight(0x66ccff, 0.6);
            sunBeam.position.set(20, 80, 20);
            sunBeam.castShadow = true;
            scene.add(sunBeam);
            environmentObjects.push(sunBeam);

            // Subtle point lights for bioluminescence feel
            const bioLight1 = new THREE.PointLight(0x00ffaa, 0.3, 50);
            bioLight1.position.set(10, 5, -10);
            scene.add(bioLight1);
            environmentObjects.push(bioLight1);
            const bioLight2 = new THREE.PointLight(0x0088ff, 0.3, 50);
            bioLight2.position.set(-15, 3, 15);
            scene.add(bioLight2);
            environmentObjects.push(bioLight2);

            // Load underwater GLB
            const loader = new GLTFLoaderModule();
            loader.setDRACOLoader(dracoLoader);
            loader.load('environments/underwater.glb', (gltf) => {
                const model = gltf.scene;

                // Get bounds
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);

                // Scale: Minecraft worlds are large — normalize to ~200 units
                const targetSize = 200;
                const envScale = targetSize / maxDim;
                model.scale.setScalar(envScale);

                // Recalculate bounds after scaling
                const scaledBox = new THREE.Box3().setFromObject(model);
                const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
                const scaledSize = scaledBox.getSize(new THREE.Vector3());

                // Center horizontally, place AUV at mid-height
                model.position.set(-scaledCenter.x, -scaledBox.min.y - scaledSize.y * 0.3, -scaledCenter.z);
                model.updateMatrixWorld(true);

                scene.add(model);
                environmentObjects.push(model);

                // Add to collidable meshes
                model.traverse(child => {
                    if (child.isMesh) {
                        child.receiveShadow = true;
                        collidableMeshes.push(child);
                        // Apply underwater tint to materials
                        if (child.material) {
                            child.material.envMapIntensity = 0.3;
                        }
                    }
                });

                // Set environment bounds
                const finalBox = new THREE.Box3().setFromObject(model);
                envBounds = finalBox.clone();
                envBounds.expandByScalar(20);

                // Position AUV inside the scene
                const spawnY = (finalBox.min.y + finalBox.max.y) * 0.5;
                if (robot) {
                    robot.position.set(0, spawnY, 0);
                    robotState.position.set(0, spawnY, 0);
                }

                // Chase cam for this scale
                chaseCamDistance = 8 * envScale;
                chaseCamHeight = 3 * envScale;

                showToast('Underwater environment loaded');
                console.log('Underwater GLB: scale', envScale.toFixed(3), 'size', scaledSize.x.toFixed(0), 'x', scaledSize.y.toFixed(0), 'x', scaledSize.z.toFixed(0));
            }, undefined, (error) => {
                console.error('Failed to load underwater GLB:', error);
                showToast('Failed to load underwater — using fallback');
                createOceanEnv(); // Fallback to procedural
            });

            // Enable underwater overlay
            isUnderwater = true;
            document.getElementById('underwater-overlay').classList.add('active');
        }

        // ============= TOKYO GLB ENVIRONMENT =============
        function createTokyoEnv() {
            // HDRI provides background
            scene.fog = new THREE.FogExp2(0x888888, 0.002);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            environmentObjects.push(ambient);
            
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);
            environmentObjects.push(sun);
            
            // Ground (fallback)
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x444444 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            environmentObjects.push(ground);
            
            // Load Tokyo GLB
            const loader = new GLTFLoaderModule();
            loader.setDRACOLoader(dracoLoader);
            loader.load(
                'environments/tokyo.glb',
                function(gltf) {
                    const model = gltf.scene;
                    model.scale.set(0.5, 0.5, 0.5); // Adjust scale as needed
                    model.position.set(0, 0, 0);
                    model.traverse(function(child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    scene.add(model);
                    environmentObjects.push(model);
                    console.log('Tokyo GLB loaded!');
                },
                function(xhr) {
                    console.log('Loading: ' + (xhr.loaded / xhr.total * 100).toFixed(0) + '%');
                },
                function(error) {
                    console.error('Error loading GLB:', error);
                }
            );
        }
